/* ===== VB 2026 BROADCAST DESIGN SYSTEM ===== */
:root{
  --bg-page:#F2F0EB;
  --bg-page-grad:#F2F0EB;
  --bg-card:#FFFFFF;
  --bg-header:#0A0A0A;
  --bg-main:#F2F0EB;
  --bg-modal:rgba(0,0,0,.55);
  --bg-nav-overlay:#0A0A0A;
  --bg-auth-grad:linear-gradient(145deg,#0A0A0A 0%,#1a1a1a 100%);
  --border:rgba(10,10,10,.1);
  --border-gold:rgba(200,168,75,.35);
  --c-gold:#C8A84B;
  --c-red:#CC2929;
  --c-green:#2E9E5A;
  --text-color:#0A0A0A;
  --ink-rgb:10,10,10;
  --chrome-bg:#FFFFFF;
  --chrome-elev:#F4F2EC;
  --chrome-ink:10,10,10;
  --chrome-line:rgba(10,10,10,.08);
  --font-bc:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
  --std-adv:rgba(46,158,90,.15);
  --std-adv-border:#2E9E5A;
  --std-play:rgba(200,168,75,.1);
  --std-play-border:#C8A84B;
  --std-out:rgba(204,41,41,.06);
}

/* ===== DARK MODE ===== */
.dark-mode{
  --bg-page:#111111;
  --bg-page-grad:#111111;
  --bg-card:#1C1C1C;
  --bg-main:#111111;
  --border:rgba(255,255,255,.08);
  --text-color:#F0EDE6;
  --ink-rgb:240,237,230;
  --chrome-bg:#0A0A0A;
  --chrome-elev:#161616;
  --chrome-ink:255,255,255;
  --chrome-line:rgba(255,255,255,.07);
  --std-adv:rgba(46,158,90,.2);
  --std-play:rgba(200,168,75,.15);
  --std-out:rgba(204,41,41,.1);
}
.dark-mode .bc-center{background:#111111}
.dark-mode .bc-sidebar-r{background:#161616;border-left-color:rgba(255,255,255,.06)}
.dark-mode .bc-center,
.dark-mode .bc-center *:not([style*="color:#C8A84B"]):not([style*="color:#2E9E5A"]):not([style*="color:#CC2929"]):not([style*="color:#3EAD6A"]):not(.ptag){
  color:var(--text-color);
}
.dark-mode [style*="background:#fff"],
.dark-mode [style*="background:#FFFFFF"],
.dark-mode [style*="background:#F2F0EB"],
.dark-mode [style*="background:#FFFBF2"],
.dark-mode [style*="background:#F7F5F0"],
.dark-mode [style*="background:#FFFBF0"],
.dark-mode [style*="background:var(--bg-card)"],
.dark-mode [style*="background:var(--bg-page)"]{
  background:var(--bg-card) !important;
}
.dark-mode [style*="color:#0A0A0A"]{color:var(--text-color) !important}
.dark-mode [style*="color:rgba(10,10,10"]{color:var(--text-color) !important}
.dark-mode .sbox{background:#1C1C1C}
.dark-mode .inp,.dark-mode .inp-light{background:#1C1C1C;border-color:rgba(255,255,255,.12);color:var(--text-color)}
.dark-mode .mcard{background:#1C1C1C}
.dark-mode .mc-inp{background:#161616;border-top-color:rgba(255,255,255,.08)}
.dark-mode .modal-box{background:#1C1C1C;border-color:rgba(255,255,255,.15)}
.dark-mode .lg-card,.dark-mode .fun-card,.dark-mode .pre-card{background:#1C1C1C}
/* dark-mode: osztályból színezett, középső oszlopban renderelt komponensek (a szöveg krémre vált, ezért a hátteret is sötétíteni kell) */
.dark-mode .mc-top{background:#1C1C1C}
.dark-mode .mcard-active .mc-top{background:#241F12}
.dark-mode .mcard+.mcard{border-top-color:rgba(255,255,255,.07)}
.dark-mode .mc-date{background:#161616;border-top-color:rgba(255,255,255,.07)}
.dark-mode .mc-grp{background:#2A2A2A}
.dark-mode .mc-odds-pill{background:#222222;border-color:rgba(255,255,255,.1)}
.dark-mode .lb-card.me{background:#241F12}
.dark-mode .wk-box{background:#1C1C1C;border-color:rgba(255,255,255,.1)}
.dark-mode .wk-hdr{background:#161616;border-bottom-color:rgba(255,255,255,.07)}
.dark-mode .wk-sep{background:rgba(255,255,255,.08)}
.dark-mode .bk-mob-card{background:#1C1C1C;border-color:rgba(255,255,255,.1)}
.dark-mode .pred-third-btn{background:#1C1C1C;border-color:rgba(255,255,255,.15)}
.dark-mode .pred-third-btn.selected{background:#C8A84B;color:#0A0A0A !important}
.dark-mode .pred-third-btn.picked{background:rgba(46,158,90,.24);border-color:#2E9E5A;color:#43c97a !important}
/* dark-mode: osztály-akcentek visszaállítása (a széles .bc-center szabály különben krémre váltaná) */
.dark-mode .bc-center .mc-tip-v,
.dark-mode .bc-center .mc-tip-open,
.dark-mode .bc-center .mc-score-time,
.dark-mode .bc-center .mc-res,
.dark-mode .bc-center .bc-sec-more,
.dark-mode .bc-center .lg-code,
.dark-mode .bc-center .btn-gold,
.dark-mode .bc-center .btn-sm.gold{color:#C8A84B !important}
.dark-mode .bc-center .mc-tip-p,
.dark-mode .bc-center .mc-saved,
.dark-mode .bc-center .btn-green{color:#3EAD6A !important}
.dark-mode .bc-center .pred-group-h,
.dark-mode .bc-center .pred-grp-tag,
.dark-mode .bc-center .pred-ko-btn.picked,
.dark-mode .bc-center .pred-champion{color:#C8A84B !important}
.dark-mode .bc-center .pred-rank-badge.r1{color:#fff !important}
.dark-mode .bc-center .pred-rank-badge.r2{color:#fff !important}
.dark-mode .bc-center .pred-rank-badge.r3{color:#0A0A0A !important}
.dark-mode .bc-center .pred-rank-badge.r4{color:#fff !important}
/* dark-mode: fekete keretek/aláhúzások láthatóvá tétele sötét háttéren */
.dark-mode .sect,
.dark-mode .bc-sec{border-bottom-color:rgba(255,255,255,.15)}
.dark-mode .btn-sm{border-color:rgba(255,255,255,.25)}
.dark-mode .btn-sm:hover{background:rgba(255,255,255,.1)}
.dark-mode .modal-title{color:var(--text-color);border-bottom-color:rgba(255,255,255,.2)}
/* dark-mode: ligaszűrő fehér sáv + figyelmeztető doboz láthatóvá tétele */
.dark-mode .lg-sel-row{background:#1C1C1C;border:1px solid rgba(255,255,255,.16);border-radius:10px}
.dark-mode .lg-sel-row .pill{border-color:rgba(255,255,255,.22);color:rgba(255,255,255,.6)}
.dark-mode .lg-sel-row .pill.on{border-color:#C8A84B;color:#C8A84B;background:rgba(200,168,75,.12)}
.dark-mode .note-bar{background:#1C1C1C;border:1px solid rgba(255,255,255,.08);border-left:3px solid #C8A84B}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-page);color:var(--text-color);font-family:var(--font-b),system-ui,sans-serif;min-height:100vh}
#root{min-height:100vh}

/* ===== BROADCAST TOP BAR ===== */
.bc-topbar{
  background:var(--chrome-bg);height:54px;display:flex;align-items:stretch;
  position:sticky;top:0;z-index:100;border-bottom:1px solid var(--chrome-line);
  background-image:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(var(--chrome-ink),.022) 8px,rgba(var(--chrome-ink),.022) 9px);
}
.bc-logo{
  background:#C8A84B;display:flex;align-items:center;gap:10px;
  padding:0 36px 0 18px;flex-shrink:0;
  clip-path:polygon(0 0,100% 0,88% 100%,0 100%);
}
.bc-logo img{width:30px;height:30px;object-fit:contain}
.bc-logo-text{font-family:var(--font-bc);font-weight:700;font-size:16px;color:#0A0A0A;line-height:1.1}
.bc-logo-sub{font-size:9px;color:rgba(0,0,0,.5);letter-spacing:1.2px;text-transform:uppercase}
.bc-nav{display:flex;align-items:stretch;flex:1;overflow-x:auto;scrollbar-width:none}
.bc-nav::-webkit-scrollbar{display:none}
.bc-navlink{
  display:flex;align-items:center;gap:6px;padding:0 14px;
  font-family:var(--font-bc);font-weight:600;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(var(--chrome-ink),.45);cursor:pointer;border-bottom:3px solid transparent;
  white-space:nowrap;transition:color .15s;
}
.bc-navlink.on{color:#C8A84B;border-bottom-color:#C8A84B}
.bc-navlink:hover:not(.on){color:rgba(var(--chrome-ink),.75)}
.bc-navlink svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0}
.bc-user{display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0;margin-left:auto}
.bc-uinfo{font-family:var(--font-bc);font-size:11px;color:rgba(var(--chrome-ink),.5);letter-spacing:.5px;text-align:right;line-height:1.3}
.bc-av{width:32px;height:32px;background:#C8A84B;display:flex;align-items:center;justify-content:center;font-family:var(--font-bc);font-weight:700;font-size:13px;color:#0A0A0A;flex-shrink:0}

/* ===== LIVE TICKER ===== */
.bc-ticker{
  background:#C8A84B;height:30px;display:flex;align-items:center;overflow:hidden;
}
.bc-ticker-live{
  background:#0A0A0A;color:#C8A84B;height:100%;display:flex;align-items:center;gap:6px;
  padding:0 14px;flex-shrink:0;
  font-family:var(--font-bc);font-weight:700;font-size:10px;letter-spacing:2px;
}
.bc-ticker-dot{width:6px;height:6px;border-radius:50%;background:#C8A84B;animation:ldot 1s ease-in-out infinite}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.2}}
.bc-ticker-items{display:flex;gap:20px;padding:0 16px;font-family:var(--font-bc);font-weight:600;font-size:12px;color:#0A0A0A;white-space:nowrap}
.bc-ticker-sep{color:rgba(0,0,0,.3);margin:0 2px}

/* ===== 3-COLUMN DESKTOP LAYOUT ===== */
.bc-layout{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 54px)}
@media(max-width:900px){.bc-layout{grid-template-columns:1fr}.bc-sidebar-l,.bc-sidebar-r{display:none}}

/* ===== LEFT SIDEBAR ===== */
.bc-sidebar-l{background:var(--chrome-bg);border-right:1px solid var(--chrome-line);overflow-y:auto}
.bc-sidebar-r{background:#fff;border-left:1px solid #E5E3DE;overflow-y:auto;padding:18px}

/* LIVE HERO */
.live-hero{padding:18px;border-bottom:1px solid var(--chrome-line)}
.lh-badge{background:#CC2929;color:#fff;font-family:var(--font-bc);font-weight:700;font-size:10px;letter-spacing:2px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px;margin-bottom:14px}
.lh-meta{font-size:10px;color:rgba(var(--chrome-ink),.35);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;float:right;margin-top:-24px}
.lh-match{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
.lh-team{display:flex;flex-direction:column;align-items:center;gap:5px;width:85px}
.lh-flag{font-size:26px;line-height:1}
.lh-tname{font-family:var(--font-bc);font-weight:700;font-size:11px;color:rgba(var(--chrome-ink),.8);letter-spacing:.8px;text-transform:uppercase;text-align:center}
.lh-score{text-align:center}
.lh-nums{font-family:var(--font-bc);font-weight:900;font-size:48px;color:rgb(var(--chrome-ink));line-height:1;letter-spacing:-3px;display:flex;align-items:center;gap:2px}
.lh-dash{font-weight:300;color:rgba(var(--chrome-ink),.45);font-size:34px;margin:0 7px}
.lh-min{font-size:9px;color:rgba(var(--chrome-ink),.35);text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.lh-tip{background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.15);padding:9px 12px;display:flex;align-items:center;justify-content:space-between}
.lht-lbl{font-size:8px;font-weight:600;color:rgba(200,168,75,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.lht-val{font-family:var(--font-bc);font-weight:700;font-size:15px;color:#C8A84B}
.lht-pts{font-family:var(--font-bc);font-weight:700;font-size:18px;color:#3EAD6A;display:flex;align-items:baseline;gap:3px}
.lht-pl{font-size:9px;color:rgba(62,173,106,.6);font-weight:400;font-family:var(--font-b)}

/* SIDEBAR MATCH LIST */
.sml-hdr{padding:9px 18px 6px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid rgba(var(--chrome-ink),.05)}
.sml-title{font-family:var(--font-bc);font-weight:700;font-size:11px;color:rgba(var(--chrome-ink),.35);letter-spacing:1px;text-transform:uppercase}
.sml-all{font-size:10px;color:#C8A84B;font-family:var(--font-bc);font-weight:700;letter-spacing:.8px;cursor:pointer}
.sml-item{border-bottom:1px solid rgba(var(--chrome-ink),.04);padding:10px 18px;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;gap:7px}
.sml-item.active{background:rgba(204,41,41,.07);border-left:3px solid #CC2929;padding-left:15px}
.sml-top{display:flex;align-items:center;gap:8px}
.sml-time{font-family:var(--font-bc);font-weight:600;font-size:11px;color:rgba(var(--chrome-ink),.25);min-width:32px;flex-shrink:0}
.sml-teams{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.sml-t{font-family:var(--font-bc);font-weight:600;font-size:12.5px;color:rgba(var(--chrome-ink),.72);display:flex;align-items:center;gap:5px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sml-stat{display:flex;gap:6px}
.sml-st-cell{flex:1;display:flex;align-items:baseline;justify-content:center;gap:5px;background:rgba(var(--chrome-ink),.04);border-radius:7px;padding:5px 4px}
.sml-st-l{font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:rgba(var(--chrome-ink),.32);font-weight:700;font-family:var(--font-bc)}
.sml-st-v{font-size:16px;font-weight:800;color:rgba(var(--chrome-ink),.92);font-family:var(--font-bc)}
.sml-st-v.sml-pts{color:#C8A84B}
.sml-st-v.muted{color:rgba(var(--chrome-ink),.22)}
.n24-list .sml-item{padding:9px 0;border-bottom:1px solid rgba(var(--ink-rgb),.08)}
.n24-list .sml-item:last-child{border-bottom:none}
.n24-list .sml-item.active{padding-left:9px}
.n24-list .sml-time{color:rgba(var(--ink-rgb),.42);min-width:52px}
.n24-list .sml-t{color:var(--text-color)}
.n24-list .sml-st-cell{background:rgba(var(--ink-rgb),.06)}
.n24-list .sml-st-l{color:rgba(var(--ink-rgb),.4)}
.n24-list .sml-st-v{color:var(--text-color)}
.n24-list .sml-st-v.sml-pts{color:#C8A84B}
.n24-list .sml-st-v.muted{color:rgba(var(--ink-rgb),.25)}
.sb-seg{font-family:var(--font-bc);font-weight:700;font-size:9px;letter-spacing:.5px;text-transform:uppercase;padding:3px 7px;border:1px solid rgba(var(--chrome-ink),.15);background:none;color:rgba(var(--chrome-ink),.4);cursor:pointer;border-radius:5px}
.sb-seg.on{border-color:#C8A84B;color:#C8A84B;background:rgba(200,168,75,.12)}

/* ===== CENTER MAIN ===== */
.bc-center{background:#F2F0EB;padding:22px 26px;overflow-y:auto}

/* Section headers */
.bc-sec{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2px solid #0A0A0A;padding-bottom:6px;margin-bottom:14px}
.bc-sec-t{font-family:var(--font-bc);font-weight:700;font-size:20px;color:#0A0A0A;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.bc-sec-sub{font-size:11px;color:#888;font-weight:300;letter-spacing:.3px}
.bc-sec-more{font-size:11px;color:#C8A84B;font-family:var(--font-bc);font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase}

/* ===== MATCH CARDS – broadcast newspaper style ===== */
.match-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;align-items:start}
.match-grid .mcard{border:1px solid var(--border);border-left:3px solid transparent;border-radius:12px;overflow:hidden}
.match-grid .mcard+.mcard{border-top:1px solid var(--border)}
.dark-mode .match-grid .mcard{border-color:rgba(255,255,255,.08)}
@media(max-width:1100px){.match-grid{grid-template-columns:1fr;gap:10px}.match-grid .mcard{border-radius:12px;border:1px solid var(--border);border-left:3px solid transparent;overflow:hidden}}
.grp-mini-std{margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.grp-mini-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;align-items:start}
.grp-mini-wrap .grp-mini-std{margin-bottom:0}
@media(max-width:1100px){.grp-mini-wrap{grid-template-columns:1fr}}
.gms-row-pred{grid-template-columns:26px 1fr !important}
.gms-empty{padding:16px 10px;font-family:var(--font-bc);font-size:12px;color:rgba(var(--ink-rgb),.35);text-align:center}
.gms-row{display:grid;grid-template-columns:26px 1fr 28px 28px 28px 28px 40px 34px;align-items:center;gap:4px;padding:6px 10px;font-family:var(--font-bc);font-weight:600;font-size:13px;color:var(--text-color)}
.gms-row+.gms-row{border-top:1px solid rgba(var(--ink-rgb),.06)}
.gms-head{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:rgba(var(--ink-rgb),.45);font-weight:700;background:rgba(var(--ink-rgb),.03)}
.gms-cap{font-family:var(--font-bc);font-weight:800;font-size:11.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-color);padding:8px 10px;border-bottom:1px solid var(--border);background:rgba(var(--ink-rgb),.05)}
.mreg-div{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ink-rgb),.18),transparent);margin:22px 0 18px}
.chat-rchip{cursor:pointer;font-size:11px;background:rgba(var(--ink-rgb),.06);border:1px solid var(--border);border-radius:10px;padding:1px 7px;line-height:1.7;user-select:none}
.chat-rchip.mine{background:rgba(200,168,75,.18);border-color:rgba(200,168,75,.4);color:#C8A84B}
.chat-rpick{display:inline-flex;gap:2px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:2px 5px}
.chat-rpick span{cursor:pointer;font-size:16px;line-height:1;padding:1px 2px}
.prev-toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-family:var(--font-bc);font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:rgba(var(--ink-rgb),.6);background:rgba(var(--ink-rgb),.05);border:1px solid var(--border);border-radius:8px;padding:9px 15px;margin-bottom:16px;user-select:none}
.prev-toggle:hover{border-color:var(--border-gold);color:var(--text-color)}
.mn-item{position:relative}
.mn-badge{position:absolute;top:2px;right:14px;background:#CC2929;color:#fff;font-size:8px;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;line-height:1}
.gms-row>span:not(.gms-team):not(.gms-pos){text-align:center}
.gms-pos{font-weight:900;text-align:center}
.gms-team{display:flex;align-items:center;gap:7px;min-width:0;text-transform:uppercase;letter-spacing:.3px}
.gms-tnm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gms-pts{font-weight:900;color:var(--c-gold)}
.dark-mode .grp-mini-std{border-color:rgba(255,255,255,.08)}
.dark-mode .bc-center .gms-pts{color:var(--c-gold) !important}
.mcard{background:#fff;border-left:3px solid transparent;cursor:pointer;transition:border-color .12s}
.mcard.locked{opacity:1}
.mcard+.mcard{border-top:1px solid var(--border)}
.mcard:hover{border-left-color:rgba(200,168,75,.4)}
.mc-top{display:grid;grid-template-columns:28px 1fr 72px 1fr 68px;align-items:center;padding:10px 14px;gap:8px;background:#fff}
.mcard-active .mc-top{border-left:3px solid #C8A84B;background:#FFFBF2}
.mc-idx{font-family:var(--font-bc);font-weight:700;font-size:11px;color:#bbb;text-align:center}
.mc-team-col{display:flex;align-items:center;gap:6px}
.mc-team-col.away{justify-content:flex-end}
.mc-flag{font-size:16px;line-height:1}
.mc-tname{font-family:var(--font-bc);font-weight:600;font-size:14px;color:#0A0A0A;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-score-col{display:flex;align-items:center;justify-content:center;gap:3px}
.mc-score-n{font-family:var(--font-bc);font-weight:900;font-size:20px;color:#0A0A0A;letter-spacing:-.5px}
.mc-score-sep{font-size:14px;color:#ccc;font-weight:300}
.mc-tip-col{text-align:right}
.mc-tip-v{font-family:var(--font-bc);font-size:12px;color:#C8A84B;font-weight:700;letter-spacing:.3px}
.mc-tip-p{font-size:10px;color:#3EAD6A;font-weight:600}
.mc-tip-open{font-family:var(--font-bc);font-size:10px;color:#C8A84B;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.mc-score-time{font-family:var(--font-bc);font-weight:700;font-size:12px;color:#C8A84B;letter-spacing:.8px;text-align:center}
.mc-score-eta{font-size:9px;color:#aaa;text-align:center}

/* Live badge */
.mc-live-badge{background:#CC2929;color:#fff;font-family:var(--font-bc);font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:1.5px;display:inline-flex;align-items:center;gap:4px}
.pulse-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:ldot 1s ease-in-out infinite}

/* Tip inputs */
.mc-inp{background:#FFFBF2;border-top:1px solid #E5E3DE;padding:8px 14px;display:flex;align-items:center;gap:8px}
.sbox{width:54px;height:52px;border:2px solid rgba(var(--ink-rgb),.18);border-radius:13px;text-align:center;font-family:var(--font-bc);font-weight:800;font-size:25px;color:var(--text-color);background:var(--bg-card);outline:none;transition:border-color .12s,box-shadow .12s;-webkit-appearance:none;-moz-appearance:textfield;appearance:none}
.sbox::-webkit-outer-spin-button,.sbox::-webkit-inner-spin-button{-webkit-appearance:none;appearance:none;margin:0;display:none}
.sbox::placeholder{color:rgba(var(--ink-rgb),.25);font-weight:400}
.sbox:focus{border-color:#C8A84B;box-shadow:0 0 0 3px rgba(200,168,75,.25)}
.sbox.filled{border-color:#C8A84B}
.sbox:disabled{opacity:.45;cursor:not-allowed}
.sdash{font-family:var(--font-bc);font-size:24px;color:rgba(var(--ink-rgb),.3);font-weight:300}
.btn-gold{flex:1;height:36px;background:#0A0A0A;color:#C8A84B;border:none;font-family:var(--font-bc);font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;max-width:200px}
.mc-saved{font-size:11px;color:#3EAD6A;font-family:var(--font-bc);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.mc-date{font-size:10px;color:rgba(10,10,10,.35);display:flex;align-items:center;gap:5px;padding:4px 14px;background:#F7F5F0;border-top:1px solid #E5E3DE;font-family:var(--font-bc);letter-spacing:.3px}
.mc-meta{display:flex;align-items:center;gap:8px}
.mc-grp{font-size:10px;color:rgba(10,10,10,.45);font-family:var(--font-bc);font-weight:600;letter-spacing:.8px;text-transform:uppercase;background:#EDEAE3;padding:2px 7px}
.mc-ko{font-size:10px;background:#0A0A0A;color:#C8A84B;font-family:var(--font-bc);font-weight:700;padding:2px 7px;letter-spacing:.5px}
.mc-venue-info{font-size:10px;color:rgba(10,10,10,.4);font-family:var(--font-bc);font-weight:400;display:flex;align-items:center;gap:4px}
.mc-wx{font-size:10px;color:rgba(10,10,10,.5)}
.mc-odds{display:flex;gap:6px;padding:0 14px 8px;flex-wrap:wrap}
.mc-odds-pill{font-size:10px;font-family:var(--font-bc);font-weight:600;padding:2px 8px;background:#F2F0EB;border:1px solid #ddd;color:#555;letter-spacing:.3px}
.mc-odds-draw{color:#888}

/* Score display */
.actual-s{display:flex;align-items:center;gap:4px;font-family:var(--font-bc);font-weight:900;font-size:22px;color:#0A0A0A}
.actual-s span{color:#0A0A0A}
.mc-main{display:flex;align-items:center;padding:0 14px 0;gap:12px}
.mc-res{font-size:11px;font-family:var(--font-bc);font-weight:700;color:#C8A84B;letter-spacing:.3px}
.team-b{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.tname{font-family:var(--font-bc);font-weight:700;font-size:13px;text-align:center;text-transform:uppercase;letter-spacing:.3px;color:#0A0A0A}
.score-b{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px}
.sinputs{display:flex;align-items:center;gap:10px}
.mc-actions{display:flex;gap:8px;flex-wrap:wrap;padding:8px 14px}
.mc-actbtn{background:none;border:1px solid rgba(var(--ink-rgb),.2);padding:6px 14px;font-family:var(--font-bc);font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:rgba(var(--ink-rgb),.7);cursor:pointer;border-radius:7px}
.mc-actbtn:hover{border-color:rgba(200,168,75,.5);color:var(--text-color)}
.mc-tipsum{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;padding:0 16px 12px;margin-top:-2px}
.mc-tipsum-lbl{font-family:var(--font-bc);font-weight:700;font-size:15px;letter-spacing:.3px;color:rgba(var(--ink-rgb),.6)}
.mc-tipsum-none{font-size:13px;color:rgba(var(--ink-rgb),.4)}
.mc-tbd-main{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:22px 18px}
.mc-tbd-slot{font-family:var(--font-bc);font-weight:700;font-size:15px;letter-spacing:.3px;text-transform:uppercase;color:rgba(var(--ink-rgb),.72);text-align:center;line-height:1.25}
.mc-tbd-vs{font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:1px;color:rgba(var(--ink-rgb),.3);text-transform:uppercase}
.site-footer{margin-top:34px;padding:18px 4px 28px;border-top:1px solid var(--border)}
.foot-links{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.foot-link{background:none;border:none;cursor:pointer;font-family:var(--font-bc);font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:rgba(var(--ink-rgb),.5);padding:2px 4px}
.foot-link:hover{color:#C8A84B}
.foot-sep{color:rgba(var(--ink-rgb),.25)}
.foot-copy{text-align:center;margin-top:10px;font-size:11px;color:rgba(var(--ink-rgb),.35);font-family:var(--font-bc);letter-spacing:.5px}
@media(max-width:560px){
  .mt-hdr{display:none !important}
  .mt-row{
    grid-template-columns:46px 1fr 1fr 1fr 26px !important;
    grid-template-areas:"date match match match share" "tip tip res pts pts" !important;
    row-gap:7px;padding:11px 10px !important;
  }
  .mt-c-date{grid-area:date}
  .mt-c-match{grid-area:match;padding:0 !important}
  .mt-c-tip{grid-area:tip;text-align:left !important}
  .mt-c-res{grid-area:res}
  .mt-c-pts{grid-area:pts}
  .mt-c-share{grid-area:share}
  .mt-c-tip::before,.mt-c-res::before,.mt-c-pts::before{display:block;font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:rgba(var(--ink-rgb),.35);font-family:var(--font-bc);font-weight:600;margin-bottom:2px}
  .mt-c-tip::before{content:'Tippem'}
  .mt-c-res::before{content:'Eredmény'}
  .mt-c-pts::before{content:'Pont';text-align:right}
}
@media(max-width:560px){
  .mc-top{padding:8px 10px !important}
  .mc-main{gap:6px !important;padding:14px 8px 10px !important}
  .mc-main>div{gap:8px !important}
  .mc-main .flag-img{width:26px !important;height:18px !important}
  .mc-tname{font-size:14px !important;letter-spacing:.2px !important}
  .mc-score{font-size:32px !important}
  .mc-tbd-main{gap:8px !important;padding:16px 10px !important}
  .mc-tbd-slot{font-size:13px !important}
  .mc-tipsum-lbl{font-size:13px !important}
  .mc-actbtn{padding:6px 11px !important;font-size:10px !important}
  .sbox{width:46px !important;height:46px !important;font-size:22px !important}
}
.legal-overlay{position:fixed;inset:0;background:var(--bg-modal);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.legal-box{background:var(--bg-card);color:var(--text-color);max-width:640px;width:100%;max-height:85vh;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.legal-hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.legal-hdr h2{margin:0;font-family:var(--font-bc);font-weight:700;font-size:20px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-color)}
.legal-close{background:rgba(var(--ink-rgb),.06);border:1px solid var(--border);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text-color);flex-shrink:0}
.legal-close:hover{border-color:var(--border-gold)}
.legal-body{padding:18px 20px 24px;overflow-y:auto;font-size:13.5px;line-height:1.55;color:rgba(var(--ink-rgb),.82)}
.legal-body h3{font-family:var(--font-bc);font-weight:700;font-size:15px;letter-spacing:.3px;margin:16px 0 6px;color:var(--text-color)}
.legal-body h3:first-child{margin-top:0}
.legal-body p{margin:0 0 10px}
.legal-body a{color:#C8A84B;cursor:pointer;text-decoration:underline}

/* Tip categories */
.ptag{font-family:var(--font-bc);font-size:11px;font-weight:700;padding:1px 7px;letter-spacing:.3px}
.p8{background:rgba(200,168,75,.15);color:#8a6f1a}
.p5{background:rgba(62,173,106,.12);color:#1e6e3f}
.p3{background:rgba(10,10,10,.07);color:#444}
.p1{background:rgba(10,10,10,.04);color:#888}
.p0{background:rgba(204,41,41,.08);color:#993333}
.dark-mode .p8{background:rgba(200,168,75,.22);color:#E0C56F}
.dark-mode .p5{background:rgba(62,173,106,.2);color:#5FD494}
.dark-mode .p3{background:rgba(255,255,255,.09);color:#D8D2C6}
.dark-mode .p1{background:rgba(255,255,255,.05);color:#A8A29A}
.dark-mode .p0{background:rgba(204,41,41,.2);color:#FF8A80}
.dark-mode .prof-av-btn{background:#1C1C1C;border-color:rgba(255,255,255,.15)}
.dark-mode .prof-av-btn.sel{background:#241F12;border-color:#C8A84B}
.dark-mode .sg-row{border-bottom-color:rgba(255,255,255,.07)}
.dark-mode .h2h-row{border-bottom-color:rgba(255,255,255,.08)}
.dark-mode .lb-wrap{background:rgba(255,255,255,.08)}

/* ===== PROJECTED BRACKET ===== */
.proj-wrap{margin-bottom:24px;padding:14px;border:1px solid var(--border);border-radius:10px;background:rgba(var(--ink-rgb),.02)}
.proj-h{font-family:var(--font-bc);font-weight:800;font-size:15px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-color);margin-bottom:10px}
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.proj-card{border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg-card)}
.proj-mn{font-size:9px;font-weight:700;letter-spacing:1px;color:#C8A84B;text-transform:uppercase;margin-bottom:3px;font-family:var(--font-bc)}
.proj-teams{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.proj-team{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-bc);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.3px;color:var(--text-color)}
.proj-vs{color:rgba(var(--ink-rgb),.35);font-weight:700;font-size:11px}
.proj-slot{font-size:9.5px;color:rgba(var(--ink-rgb),.4);margin-top:4px;letter-spacing:.3px;text-transform:uppercase;font-family:var(--font-bc);font-weight:600}
@media(max-width:600px){.proj-grid{grid-template-columns:1fr}}
/* ===== STANDINGS ===== */
.std-groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(var(--ink-rgb),.1)}
.fcast-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:8px;padding:4px 0 8px}
@media(max-width:1200px){.fcast-grid{grid-template-columns:repeat(6,1fr)}}
@media(max-width:760px){.fcast-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.fcast-grid{grid-template-columns:repeat(2,1fr)}}
.center-live-mob{display:none}
@media(max-width:900px){.center-live-mob{display:block}}
@media(max-width:1200px){.std-groups-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.std-groups-grid{grid-template-columns:1fr}}
.sg-group{background:var(--bg-card);padding:0}
.sg-hdr{background:#0A0A0A;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.sg-title{font-family:var(--font-bc);font-weight:700;font-size:13px;color:#C8A84B;letter-spacing:1px;text-transform:uppercase}
.sg-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f0ede6;font-size:12px}
.sg-row:last-child{border-bottom:none}
.sg-pos{font-family:var(--font-bc);font-weight:700;font-size:12px;color:#bbb;min-width:14px;text-align:center}
.sg-team{flex:1;font-family:var(--font-bc);font-weight:600;font-size:13px;color:#0A0A0A;text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.sg-stats{display:flex;gap:12px;font-family:var(--font-bc);font-size:12px;color:#666}
.sg-pts{font-family:var(--font-bc);font-weight:900;font-size:14px;color:#0A0A0A;min-width:18px;text-align:center}
.tier-q{border-left:3px solid #3EAD6A}
.tier-p{border-left:3px solid #C8A84B}
.tier-o{border-left:3px solid transparent}

/* ===== LEADERBOARD ===== */
.lb-wrap{display:flex;flex-direction:column;gap:1px;background:#ddd;margin-bottom:16px}
.lb-card{background:var(--bg-card);display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.lb-card.me{background:rgba(200,168,75,.1);border-left:3px solid #C8A84B;padding-left:11px}
.lb-rank{font-family:var(--font-bc);font-weight:700;font-size:13px;color:rgba(var(--ink-rgb),.4);min-width:22px;text-align:center}
.lb-nm{flex:1;font-family:var(--font-bc);font-weight:600;font-size:14px;color:var(--text-color);text-transform:uppercase;letter-spacing:.3px}
.lb-sub{font-size:10px;color:rgba(var(--ink-rgb),.5);font-family:var(--font-bc);letter-spacing:.3px}
.lb-pts{font-family:var(--font-bc);font-weight:900;font-size:17px;color:var(--text-color)}

/* ===== BUTTONS ===== */
.btn-sm{padding:7px 14px;font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:1.5px solid #0A0A0A;background:transparent;color:#0A0A0A;transition:all .12s}
.btn-sm:hover{background:#0A0A0A;color:#C8A84B}
.btn-sm.gold{border-color:#C8A84B;color:#C8A84B}
.btn-sm.gold:hover{background:#C8A84B;color:#0A0A0A}
.btn-sm.red{border-color:#CC2929;color:#CC2929}
.btn-green{padding:8px 16px;background:#0A0A0A;color:#3EAD6A;border:none;font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer}

/* ===== PILLS ===== */
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill-row-nav{flex-wrap:nowrap;gap:6px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:3px}
.pill-row-nav::-webkit-scrollbar{display:none}
.pill-row-nav .pill{flex:0 0 auto;min-width:0;text-align:center;padding:7px 13px;white-space:nowrap;border:1px solid var(--border);background:rgba(var(--ink-rgb),.05);color:rgba(var(--ink-rgb),.7);border-radius:8px}
.pill-row-nav .pill.off{opacity:1}
.pill-row-nav .pill.on{border-color:#C8A84B;background:rgba(200,168,75,.16);color:#C8A84B}
.pill-row-nav .pill:hover{border-color:var(--border-gold)}
.lbhist-pill{font-family:var(--font-bc);font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border:1px solid var(--border);background:rgba(var(--ink-rgb),.04);color:rgba(var(--ink-rgb),.6);border-radius:6px;cursor:pointer}
.lbhist-pill.on{border-color:#C8A84B;background:rgba(200,168,75,.15);color:#C8A84B}
.tiprow-share{background:none;border:none;cursor:pointer;font-size:14px;opacity:.45;padding:2px;line-height:1}
.tiprow-share:hover{opacity:1}
.ko-pred-panel{background:rgba(var(--ink-rgb),.03);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.ko-pred-h{font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#C8A84B;margin-bottom:10px}
.ko-pred-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:6px}
.ko-pred-row{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:var(--font-bc);font-size:12px}
.ko-pred-team{flex:1;min-width:0;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(var(--ink-rgb),.55);text-transform:uppercase;letter-spacing:.3px}
.ko-pred-team:last-child{justify-content:flex-end;text-align:right}
.ko-pred-team.adv{color:#2E9E5A;font-weight:700}
.ko-pred-vs{color:rgba(var(--ink-rgb),.3);flex-shrink:0}
.pill{padding:5px 14px;font-family:var(--font-bc);font-weight:600;font-size:12px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:1.5px solid rgba(var(--ink-rgb),.18);color:rgba(var(--ink-rgb),.45);background:transparent;transition:all .12s}
.pill.on{border-color:var(--text-color);color:var(--text-color);background:transparent}
.pill.off{opacity:.6}

/* ===== SECTIONS ===== */
.sect{font-family:var(--font-bc);font-weight:700;font-size:22px;color:#0A0A0A;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #0A0A0A;padding-bottom:6px;margin-bottom:16px;margin-top:34px;line-height:1}
.sect:first-child{margin-top:0}

/* ===== INPUTS ===== */
.inp,.inp-light{width:100%;padding:10px 12px;border:1.5px solid rgba(10,10,10,.15);background:#fff;color:#0A0A0A;font-size:14px;font-family:var(--font-b);outline:none;border-radius:0;transition:border-color .12s}
.inp:focus,.inp-light:focus{border-color:#0A0A0A}
.ainp{width:100%;padding:10px 12px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:14px;font-family:var(--font-b);outline:none}
.ainp:focus{border-color:#C8A84B}
button:focus-visible,a:focus-visible,select:focus-visible,input:focus-visible,[data-v]:focus-visible,[tabindex]:focus-visible{outline:2px solid #C8A84B;outline-offset:2px;border-radius:4px}
select.inp,select.inp-light{appearance:none;cursor:pointer}

/* ===== AUTH PAGE ===== */
.auth-page{min-height:100vh;background:var(--bg-page);display:flex;align-items:center;justify-content:center;padding:20px;background-image:repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(var(--ink-rgb),.02) 10px,rgba(var(--ink-rgb),.02) 11px)}
.dark-mode .auth-page{background:#0A0A0A}
.auth-card{background:var(--bg-card);border:1px solid var(--border);padding:36px 32px;width:100%}
.dark-mode .auth-card{background:#141414;border-color:rgba(255,255,255,.08)}
.auth-hero{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.auth-hero img{width:40px;height:40px;object-fit:contain}
.auth-title{font-family:var(--font-bc);font-weight:700;font-size:22px;color:#C8A84B;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.auth-sub{font-size:11px;color:rgba(var(--ink-rgb),.4);letter-spacing:.5px;margin-top:2px}
.auth-or{display:flex;align-items:center;gap:10px;margin:16px 0;color:rgba(var(--ink-rgb),.4);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.auth-or::before,.auth-or::after{content:"";flex:1;height:1px;background:var(--border)}
.auth-google{width:100%;height:44px;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1f1f1f;border:1px solid var(--border);font-family:var(--font-b);font-weight:600;font-size:14px;cursor:pointer}
.dark-mode .auth-google{background:#1C1C1C;color:#F0EDE6;border-color:rgba(255,255,255,.15)}
.auth-google:active{opacity:.85}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border:1.5px solid #0A0A0A;padding:24px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-family:var(--font-bc);font-weight:700;font-size:20px;color:#0A0A0A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #0A0A0A}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal-c{background:var(--bg-card);color:var(--text-color);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-t{font-family:var(--font-bc);font-weight:800;font-size:20px;color:var(--text-color);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.exp-toggle{margin-top:10px;background:none;border:none;color:var(--c-gold);font-size:12px;font-weight:700;cursor:pointer;padding:4px 0;font-family:var(--font-bc);letter-spacing:.3px}

/* ===== ALERT BOXES ===== */
.err-box{background:rgba(204,41,41,.08);border-left:3px solid #CC2929;padding:10px 14px;font-size:13px;color:#8B1C1C;margin:8px 0;font-family:var(--font-bc);font-weight:600;letter-spacing:.3px}
.suc-box{background:rgba(62,173,106,.08);border-left:3px solid #3EAD6A;padding:10px 14px;font-size:13px;color:#1e5e35;margin:8px 0;font-family:var(--font-bc);font-weight:600;letter-spacing:.3px}
.note-bar{background:var(--chrome-elev);border-left:3px solid #C8A84B;padding:10px 14px;font-size:12px;color:rgba(var(--ink-rgb),.65);font-family:var(--font-bc);letter-spacing:.3px}

/* ===== BRACKET ===== */
.bk-desktop{overflow-x:auto}
.bk-mob{display:none}
@media(max-width:900px){.bk-desktop{display:none}.bk-mob{display:block}}
.wk-box{background:#fff;border:1px solid #ddd;padding:4px 0}
.wk-hdr{font-family:var(--font-bc);font-size:9px;font-weight:700;color:#bbb;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;background:#F7F5F0;border-bottom:1px solid #eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-team{padding:5px 8px;display:flex;align-items:center;gap:5px;font-family:var(--font-bc);font-weight:600;font-size:12px;color:#0A0A0A;letter-spacing:.3px}
.wk-tnm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-tbd{color:#bbb}
.wk-sep{height:1px;background:#eee}
.wk-score{font-family:var(--font-bc);font-weight:900;font-size:13px;color:#0A0A0A;min-width:20px;text-align:right;margin-left:auto}
.wk-win{font-weight:900;color:var(--text-color)}
button[data-predko].wk-win{color:#2E9E5A!important;background:rgba(46,158,90,.13)!important}
button[data-predko].wk-win .wk-tnm{color:#2E9E5A!important}
.bk-mob-card{background:#fff;border:1px solid #ddd;border-left:3px solid transparent;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.bk-mob-teams{display:flex;align-items:center;gap:10px}
.bk-mob-team{flex:1;font-family:var(--font-bc);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.3px;color:var(--text-color)}
.bk-mob-grid{display:flex;flex-direction:column;gap:6px}

/* ===== LEAGUE ===== */
.lg-card{background:#fff;border:1px solid #ddd;padding:14px;margin-bottom:8px;cursor:pointer}
.lg-code{font-family:'Courier New',monospace;font-size:18px;font-weight:700;color:#C8A84B;letter-spacing:3px;margin:8px 0 4px}
.lg-sel-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:#F7F5F0;border:1px solid #d8d4cb;border-radius:10px}
.lg-sel-row .pill{border-color:rgba(10,10,10,.22)}

/* ===== FUN / MISC ===== */
.fun-card{background:var(--bg-card);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.pre-card{background:var(--bg-card);border:1px solid var(--border);padding:16px;margin-bottom:10px}
.h2h-row{display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid #f0ede6}
.scoring-hint{font-size:11px;color:#888;padding:12px 0;font-family:var(--font-bc);letter-spacing:.3px}
.empty{text-align:center;padding:40px 20px;color:rgba(10,10,10,.4)}
.tier-hdr{font-family:var(--font-bc);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;padding:6px 0 3px;color:#888}
.pred-third-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pred-third-btn{padding:5px 12px;font-family:var(--font-bc);font-weight:600;font-size:12px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#0A0A0A}
.pred-third-btn.selected{border-color:#0A0A0A;background:#0A0A0A;color:#C8A84B}
.pred-third-count{font-size:11px;color:#888;font-family:var(--font-bc);margin-bottom:10px}
.pred-third-btn.picked{border-color:#2E9E5A;background:rgba(46,158,90,.16);color:#1f7a43}
.pred-grp-tag{font-family:var(--font-bc);font-weight:700;font-size:10px;color:#C8A84B;border:1px solid rgba(200,168,75,.4);padding:1px 5px;margin-left:4px}
.divider{height:1px;background:rgba(var(--ink-rgb),.12);margin:20px 0}
/* ===== PREDIKCIÓ FÜL ===== */
.pred-group-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,auto);grid-auto-flow:column;gap:10px;margin-bottom:8px}
@media(max-width:1000px){.pred-group-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:auto;grid-auto-flow:row}}
@media(max-width:560px){.pred-group-grid{grid-template-columns:1fr}}
.pred-group-card{background:var(--bg-card);border:1px solid var(--border)}
.pred-group-card.done{border-color:rgba(200,168,75,.4)}
.pred-group-h{background:#0A0A0A;font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#C8A84B;padding:7px 12px}
.pred-team-grid{display:flex;flex-direction:column}
.pred-team-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 12px;border:none;border-left:3px solid transparent;background:none;cursor:pointer;border-bottom:1px solid rgba(var(--ink-rgb),.06);text-align:left;transition:background .12s}
.pred-team-btn:last-child{border-bottom:none}
.pred-team-btn:hover{background:rgba(var(--ink-rgb),.04)}
.pred-team-btn.picked{border-left-color:#C8A84B;background:rgba(200,168,75,.08)}
.pred-team-btn.rank-1,.pred-team-btn.rank-2{border-left-color:#2E9E5A;background:rgba(46,158,90,.10)}
.pred-team-btn.rank-3{border-left-color:#C8A84B;background:rgba(200,168,75,.10)}
.pred-team-btn.rank-4{border-left-color:#e63329;background:rgba(230,51,41,.10)}
.pred-team-nm{font-family:var(--font-bc);font-weight:600;font-size:14px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-color);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pred-rank-badge{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-family:var(--font-bc);font-weight:900;font-size:12px;flex-shrink:0;color:rgba(var(--ink-rgb),.5);border:1px solid rgba(var(--ink-rgb),.2)}
.pred-rank-badge.r1{background:#2E9E5A;color:#fff;border:none}
.pred-rank-badge.r2{background:#2E9E5A;color:#fff;border:none}
.pred-rank-badge.r3{background:#C8A84B;color:#0A0A0A;border:none}
.pred-rank-badge.r4{background:#e63329;color:#fff;border:none}
.pred-mode-toggle{display:inline-flex;flex-wrap:wrap;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px}
.pred-mode-toggle button{font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:8px 14px;border:none;background:transparent;color:rgba(var(--ink-rgb),.55);cursor:pointer}
.pred-mode-toggle button.active{background:#C8A84B;color:#0A0A0A}
.pred-pts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
@media(max-width:900px){.pred-pts-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.pred-pts-grid{grid-template-columns:1fr}}
.pred-pts-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid rgba(var(--ink-rgb),.06)}
.pred-pts-row:last-child{border-bottom:none}
.pred-pts-row.r1,.pred-pts-row.r2{background:rgba(46,158,90,.08)}
.pred-pts-row.r3{background:rgba(200,168,75,.08)}
.pred-pts-nm{font-family:var(--font-bc);font-weight:600;font-size:13px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-color);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pred-pts-slider{width:80px;accent-color:#C8A84B;cursor:pointer}
.pred-pts-val{font-family:var(--font-bc);font-weight:800;font-size:14px;color:#C8A84B;width:16px;text-align:center;flex-shrink:0}
.pred-pts-stat{font-family:var(--font-bc);font-weight:800;font-size:13px;color:#C8A84B;flex-shrink:0}
.pred-pts-stat.gk{color:rgba(var(--ink-rgb),.55);min-width:32px;text-align:right}
.pred-gk-lbl{font-family:var(--font-bc);font-size:9px;font-weight:700;color:rgba(var(--ink-rgb),.4);letter-spacing:.5px;flex-shrink:0}
.pred-gk-inp{width:40px;font-family:var(--font-bc);font-weight:700;font-size:13px;text-align:center;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text-color);padding:3px 2px;flex-shrink:0}
.pred-3rd-table{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.pred-3rd-row{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;opacity:.5}
.pred-3rd-row.q{opacity:1;border-color:rgba(46,158,90,.4);background:rgba(46,158,90,.07)}
.pred-3rd-rank{font-family:var(--font-bc);font-weight:800;font-size:13px;width:20px;text-align:center;color:rgba(var(--ink-rgb),.5);flex-shrink:0}
.pred-3rd-pts{font-family:var(--font-bc);font-weight:800;font-size:13px;color:#C8A84B;margin-left:auto;flex-shrink:0}
.pred-3rd-tag{font-family:var(--font-bc);font-weight:700;font-size:9px;letter-spacing:.5px;padding:2px 7px;border-radius:5px;background:rgba(var(--ink-rgb),.08);color:rgba(var(--ink-rgb),.5);flex-shrink:0}
.pred-3rd-row.q .pred-3rd-tag{background:#2E9E5A;color:#fff}
.pred-lock-tag{float:right;font-weight:700;font-size:10px;color:#2E9E5A}
.pred-round-block{margin-bottom:14px}
.pred-round-h{font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(var(--ink-rgb),.45);margin-bottom:6px}
.pred-ko-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:8px;margin-bottom:7px}
.pred-ko-row.pending{display:block;font-family:var(--font-bc);font-size:12px;color:rgba(var(--ink-rgb),.3);padding:8px 12px;border:1px dashed rgba(var(--ink-rgb),.12)}
.pred-ko-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid rgba(var(--ink-rgb),.15);background:var(--bg-card);cursor:pointer;font-family:var(--font-bc);font-weight:600;font-size:13px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-color)}
.pred-ko-btn:hover{border-color:rgba(200,168,75,.4)}
.pred-ko-btn.picked{border-color:#C8A84B;background:rgba(200,168,75,.12);color:#C8A84B}
.pred-ko-row .pred-ko-btn:last-child{justify-content:flex-end}
.pred-ko-row.final .pred-ko-btn{border-color:rgba(200,168,75,.35)}
.pred-ko-vs{display:flex;align-items:center;justify-content:center;font-family:var(--font-bc);color:rgba(var(--ink-rgb),.3);font-size:13px}
.pred-champion{margin-top:10px;background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.4);border-left:3px solid #C8A84B;padding:12px 16px;font-family:var(--font-bc);font-weight:700;font-size:16px;letter-spacing:.5px;text-transform:uppercase;color:#C8A84B;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ===== NOTIF / COOKIE ===== */
.cookie-banner{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:660px;z-index:300;background:var(--chrome-bg);border:1px solid rgba(200,168,75,.4);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.4);padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;animation:ckUp .45s cubic-bezier(.16,1,.3,1)}
@keyframes ckUp{from{opacity:0;transform:translateX(-50%) translateY(22px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.cookie-banner .ck-ico{font-size:26px;line-height:1;flex-shrink:0}
.cookie-banner p{margin:0;flex:1;min-width:230px;font-family:var(--font-b);font-size:12.5px;line-height:1.55;color:rgba(var(--chrome-ink),.72)}
.cookie-banner p b{color:rgba(var(--chrome-ink),.92);font-weight:700}
.cookie-banner a{color:#C8A84B;font-weight:600;cursor:pointer;text-decoration:none;border-bottom:1px solid rgba(200,168,75,.4)}
.cookie-banner a:hover{border-bottom-color:#C8A84B}
.ck-actions{display:flex;gap:10px;flex-shrink:0;margin-left:auto}
.ck-btn{font-family:var(--font-bc);font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-size:13px;padding:9px 18px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:.15s}
.ck-decline{background:transparent;border-color:rgba(var(--chrome-ink),.2);color:rgba(var(--chrome-ink),.6)}
.ck-decline:hover{border-color:rgba(var(--chrome-ink),.45);color:rgba(var(--chrome-ink),.85)}
.ck-accept{background:#C8A84B;color:#0A0A0A;border-color:#C8A84B}
.ck-accept:hover{background:#d8b95c;box-shadow:0 4px 14px rgba(200,168,75,.35)}
@media(max-width:540px){.cookie-banner{flex-direction:column;align-items:stretch;text-align:center;gap:12px}.cookie-banner .ck-ico{display:none}.ck-actions{margin-left:0;justify-content:center}.ck-btn{flex:1}}
.notif-btn{padding:6px 14px;font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}

/* ===== PROFILE ===== */
.prof-av-sel{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.prof-av-btn{width:40px;height:40px;font-size:22px;background:#F2F0EB;border:1.5px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s}
.prof-av-btn.sel{border-color:#0A0A0A;background:#fff}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ddd}

/* ===== LOADING ===== */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0A0A0A;flex-direction:column;gap:16px}
.loading-screen p{font-family:var(--font-bc);font-size:12px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}

/* ===== ADMIN ===== */
.admin-wrap{padding:0}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}

/* ===== MOBILE NAV (hidden on desktop) ===== */
.mobile-nav{display:none;background:var(--chrome-bg);border-top:3px solid #C8A84B;position:fixed;left:0;right:0;bottom:0;top:auto;z-index:90;box-shadow:0 -4px 16px rgba(0,0,0,.12);transition:none}
.mobile-nav.mn-top{top:54px;bottom:auto;border-top:none;border-bottom:3px solid #C8A84B;box-shadow:0 4px 16px rgba(0,0,0,.12)}
@media(max-width:900px){
  .mobile-nav{display:flex}
  .bc-topbar .bc-nav{display:none}
}
@media(max-width:560px){
  .bc-logo{padding:0 22px 0 14px}
  .bc-logo-sub{display:none}
  .bc-uinfo{display:none}
}
.mn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer}
.mn-item svg{width:20px;height:20px;stroke:rgba(var(--chrome-ink),.4);stroke-width:1.8;fill:none}
.mn-item span{font-family:var(--font-bc);font-size:9px;color:rgba(var(--chrome-ink),.4);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.mn-item.on svg{stroke:#C8A84B}
.mn-item.on span{color:#C8A84B}
.mn-item.on::before{content:'';display:block;width:4px;height:4px;border-radius:50%;background:#C8A84B;margin-bottom:2px}

/* off-canvas "Több" drawer */
.oc-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;justify-content:flex-end;animation:ocFade .15s ease}
.oc-panel{background:var(--chrome-bg);width:min(280px,82vw);height:100%;box-shadow:-8px 0 28px rgba(0,0,0,.35);animation:ocSlide .2s ease;overflow-y:auto;border-left:3px solid #C8A84B}
@keyframes ocFade{from{opacity:0}to{opacity:1}}
@keyframes ocSlide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.oc-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--chrome-line);font-family:var(--font-bc);font-weight:700;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--text-color)}
.oc-x{background:none;border:none;font-size:18px;color:rgba(var(--chrome-ink),.5);cursor:pointer;line-height:1;padding:2px 4px}
.oc-item{width:100%;display:flex;align-items:center;gap:12px;padding:15px 18px;background:none;border:none;border-bottom:1px solid rgba(var(--chrome-ink),.06);font-family:var(--font-bc);font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:rgba(var(--chrome-ink),.72);cursor:pointer;text-align:left}
.oc-item svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0}
.oc-item.on{color:#C8A84B}
.oc-item:active{background:rgba(var(--chrome-ink),.06)}
.oc-badge{margin-left:auto;background:#CC2929;color:#fff;font-size:9px;font-family:var(--font-bc);font-weight:700;padding:1px 6px;border-radius:8px}
@media(max-width:900px){.bc-center{padding-bottom:74px}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="root"></div>

async function fetchTodayWeather(){
  const now=Date.now(),HD=8,horizon=now+HD*86400*1000;
  const venueOf=m=>{const wcId=S.wcIds?.[m.id];return (wcId?S.wcVenues?.[wcId]?.venue:null)||m.venue||null;};
  const ms=ALL.filter(m=>{
    if(m.tbd&&!S.mt[m.id])return false;
    if(S.results[m.id])return false;
    const v=venueOf(m);if(!v||!VENUE_COORDS[v])return false;
    const ko=S.ko[m.id]||m.koDefault;if(!ko)return false;
    const t=new Date(ko).getTime();
    return t>=now-3*3600*1000&&t<=horizon;
  });
  if(!ms.length)return;
  const byVenue={};
  ms.forEach(m=>{const v=venueOf(m);(byVenue[v]=byVenue[v]||[]).push(m);});
  const weather={...(S.weather||{})};
  await Promise.all(Object.entries(byVenue).map(async([venue,list])=>{
    const c=VENUE_COORDS[venue];if(!c)return;
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${c[0]}&longitude=${c[1]}&hourly=temperature_2m,precipitation_probability,weather_code&timezone=UTC&forecast_days=${HD+1}`;
      const r=await fetch(url);const d=await r.json();
      if(!d.hourly||!d.hourly.time)return;
      const times=d.hourly.time.map(t=>new Date(t+':00Z').getTime());
      list.forEach(m=>{
        const ko=new Date(S.ko[m.id]||m.koDefault).getTime();
        let bi=-1,bd=Infinity;
        for(let i=0;i<times.length;i++){const diff=Math.abs(times[i]-ko);if(diff<bd){bd=diff;bi=i;}}
        if(bi>=0&&bd<=2*3600*1000){
          weather[m.id]={temp:Math.round(d.hourly.temperature_2m[bi]),icon:WMO_ICON[d.hourly.weather_code[bi]]||'🌡️',precip:d.hourly.precipitation_probability?.[bi]??0};
        }
      });
    }catch(e){}
  }));
  SS({weather});
}

async function fetchTodayOdds(){
  const KEY=S.adminSpec?.oddsKey||'d2e76cddb77f1adbf0cc133c71abdd39';
  const today=new Date().toLocaleDateString('en-CA',{timeZone:userTz()});
  const todayMs=ALL.filter(m=>m.date===today&&!m.tbd);
  if(!todayMs.length)return;
  try{
    // Sport kulcs keresése
    const sRes=await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${KEY}&all=true`);
    const sports=await sRes.json();
    const soccerSports=sports.filter(s=>s.key.includes('soccer'));
    const wcKeys=['soccer_fifa_world_cup_2026','soccer_world_cup_2026','soccer_fifa_world_cup','soccer_world_cup'];
    const wcSport=soccerSports.find(s=>wcKeys.includes(s.key));
    const wcKey=wcSport?.key;
    if(!wcKey){console.log('VB kulcs nem található. Elérhető foci kulcsok:',soccerSports.map(s=>s.key));return;}
    const oRes=await fetch(`https://api.the-odds-api.com/v4/sports/${wcKey}/odds/?apiKey=${KEY}&regions=eu&markets=h2h&oddsFormat=decimal`);
    const data=await oRes.json();
    if(!Array.isArray(data)){console.log('Odds API h2h hiba:',data);return;}
    let bttsData=[];
    const odds={};
    for(const ev of data){
      const hCode=EN_TEAM[ev.home_team];
      const aCode=EN_TEAM[ev.away_team];
      if(!hCode||!aCode)continue;
      const match=todayMs.find(m=>(m.home===hCode&&m.away===aCode)||(m.home===aCode&&m.away===hCode));
      if(!match)continue;
      const bk=ev.bookmakers?.[0];if(!bk)continue;
      const h2h=bk.markets?.find(mk=>mk.key==='h2h');if(!h2h)continue;
      // BTTS keresés
      const bttsEv=bttsData.find(b=>b.id===ev.id);
      const bttsBk=bttsEv?.bookmakers?.[0];
      const bttsYes=bttsBk?.markets?.find(mk=>mk.key==='btts')?.outcomes?.find(o=>o.name==='Yes');
      const hO=h2h.outcomes.find(o=>EN_TEAM[o.name]===match.home||o.name===ev.home_team);
      const aO=h2h.outcomes.find(o=>EN_TEAM[o.name]===match.away||o.name===ev.away_team);
      const dO=h2h.outcomes.find(o=>o.name==='Draw');
      if(hO&&aO){
        const isSwapped=match.home===aCode;
        odds[match.id]={h:(isSwapped?aO:hO).price.toFixed(2),d:dO?.price?.toFixed(2)||null,a:(isSwapped?hO:aO).price.toFixed(2),btts:bttsYes?.price?.toFixed(2)||null,bk:bk.title};
      }
    }
    SS({odds});
  }catch(e){console.log('Odds hiba:',e);}
}

function tipCategory(tip,res,stage){
  if(!tip||!res||res.homeGoals==null)return null;
  const th=parseInt(tip.homeGoals),ta=parseInt(tip.awayGoals),rh=parseInt(res.homeGoals),ra=parseInt(res.awayGoals);
  if(isNaN(th)||isNaN(ta)||isNaN(rh)||isNaN(ra))return null;
  const gr=(h,a)=>h>a?'1':h===a?'X':'2';
  const tR=gr(th,ta),rR=gr(rh,ra),tGD=th-ta,rGD=rh-ra;
  if(th===rh&&ta===ra)return'p8';
  if(rR!=='X'&&tR===rR&&tGD===rGD)return'p5'; // döntetlennél a GK mindig 0, így nem számít önálló találatnak
  if(tR===rR)return'p3';
  if(th===rh||ta===ra)return'p1';
  return'p0';
}

  const byName={}; teams.forEach(t=>{byName[t.n]=t;});
  const gms=ALL.filter(m=>m.group===gid);
  gms.forEach(m=>{
    const r=results[m.id];if(!r)return;
    const ov=mt?.[m.id],hN=ov?.home||m.home,aN=ov?.away||m.away;
    const h=byName[hN],a=byName[aN];if(!h||!a)return;
    const rh=parseInt(r.homeGoals),ra=parseInt(r.awayGoals);
    h.p++;a.p++;h.gf+=rh;h.ga+=ra;a.gf+=ra;a.ga+=rh;
    if(rh>ra){h.w++;h.pts+=3;a.l++;}else if(rh===ra){h.d++;h.pts++;a.d++;a.pts++;}else{a.w++;a.pts+=3;h.l++;}
    h.gd=h.gf-h.ga;a.gd=a.gf-a.ga;
  });
  // FIFA holtverseny-sorrend: pont -> egymas elleni (pont, gk, lott gol; az erintettekre ujraalkalmazva)
  //   -> osszesitett gk -> osszesitett lott gol. (Fair play / FIFA-ranglista adat hianyaban azok kimaradnak.)
  function h2h(names){
    const s={}; names.forEach(n=>{s[n]={pts:0,gf:0,ga:0,gd:0};});
    const set=new Set(names);
    gms.forEach(m=>{
      const r=results[m.id];if(!r)return;
      const ov=mt?.[m.id],hN=ov?.home||m.home,aN=ov?.away||m.away;
      if(!set.has(hN)||!set.has(aN))return;
      const rh=parseInt(r.homeGoals),ra=parseInt(r.awayGoals);
      s[hN].gf+=rh;s[hN].ga+=ra;s[aN].gf+=ra;s[aN].ga+=rh;
      if(rh>ra)s[hN].pts+=3;else if(rh===ra){s[hN].pts++;s[aN].pts++;}else s[aN].pts+=3;
    });
    names.forEach(n=>{s[n].gd=s[n].gf-s[n].ga;});
    return s;
  }
  function rankTied(names,useH2H){
    if(names.length<=1)return names.slice();
    if(!useH2H)return names.slice().sort((a,b)=>byName[b].gd-byName[a].gd||byName[b].gf-byName[a].gf);
    const s=h2h(names);
    const key=n=>s[n].pts+'|'+s[n].gd+'|'+s[n].gf;
    const sorted=names.slice().sort((a,b)=>s[b].pts-s[a].pts||s[b].gd-s[a].gd||s[b].gf-s[a].gf);
    const out=[];let i=0;
    while(i<sorted.length){
      let j=i;while(j<sorted.length&&key(sorted[j])===key(sorted[i]))j++;
      const sub=sorted.slice(i,j);
      if(sub.length===1)out.push(sub[0]);
      else if(sub.length<names.length)out.push(...rankTied(sub,true)); // a meg holtversenyben allokra ujra a-c
      else out.push(...rankTied(sub,false));                          // teljes holtverseny -> ossz gk/gol
      i=j;
    }
    return out;
  }
  const names=teams.map(t=>t.n).sort((a,b)=>byName[b].pts-byName[a].pts);
  const ordered=[];let i=0;
  while(i<names.length){
    let j=i;while(j<names.length&&byName[names[j]].pts===byName[names[i]].pts)j++;
    ordered.push(...rankTied(names.slice(i,j),true));
    i=j;
  }
  return ordered.map(n=>byName[n]);
}

function _pwSalt(){return [...crypto.getRandomValues(new Uint8Array(12))].map(b=>b.toString(16).padStart(2,'0')).join('');}
async function _sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');}
function isHashedPw(pw){return typeof pw==='string'&&pw.startsWith('h1$');}
async function makePwField(plain){const s=_pwSalt();return 'h1$'+s+'$'+await _sha256(s+'|'+plain);}
async function verifyPw(plain,stored){if(!stored)return false;if(!isHashedPw(stored))return plain===stored;const p=stored.split('$');return (await _sha256(p[1]+'|'+plain))===p[2];}

      if(d&&d.ok&&d.token){
        const u=S.users.find(x=>x.id===d.user.id)||d.user;

        logAction('login','');
        return;
      }
      if(d&&d.ok===false&&d.error==='wrong'){SS({authErr:t('err_wrong_login'),authLoad:false});return;}
      if(d&&d.ok===false&&(d.error==='ratelimit'||d.error==='locked')){SS({authErr:S.lang==='en'?(d.error==='locked'?'Too many failed attempts. Try again later.':'Too many attempts — please wait a bit.'):(d.error==='locked'?'Túl sok hibás próbálkozás. Próbáld később.':'Túl sok próbálkozás — várj egy kicsit.'),authLoad:false});return;}
      // egyeb szerverhiba -> tartalek
    }
  }catch(e){/* halozat -> tartalek */}
  // 2) TARTALEK: eredeti kliensoldali belepes
  const u=S.users.find(x=>x.un===S.authU);
  if(!u||!(await verifyPw(S.authP,u.pw))){SS({authErr:t('err_wrong_login'),authLoad:false});return;}
  let ul=S.users;
  if(!isHashedPw(u.pw)){
    const up={...u,pw:await makePwField(S.authP)};
    ul=S.users.map(x=>x.id===u.id?up:x);
    u.pw=up.pw;
    try{await sS('wc_u',ul,true);}catch(e){}
  }
  await sS('wc_s',{uid:u.id},false);
  SS({user:u,users:ul,authErr:'',authLoad:false,view:'matches',profDN:u.dn,profAv:u.av||'⚽'});
  loadPredict(u.id);
}

async function applyFinishedMatches(apiMatches){
  const nr={...S.results};
  const live={};
  const wcIds={...S.wcIds||{}};
  const applied=[];
  apiMatches.forEach(am=>{
    const isSportAPI=am.h!=null||am.finished!=null;
    let huHome,huAway,hGoal,aGoal,isLive,isFinished;
    if(isSportAPI){
      huHome=am.home; huAway=am.away;
      hGoal=am.h??0; aGoal=am.a??0;
      isLive=am.live===true;
      isFinished=am.finished===true||am.status==='finished';
    } else {
      huHome=matchTeamByEng(am.home); huAway=matchTeamByEng(am.away);
      hGoal=am.homeScore??am.score?.fullTime?.home??0;
      aGoal=am.awayScore??am.score?.fullTime?.away??0;
      isLive=['IN_PLAY','PAUSED','inprogress'].includes(am.status);
      isFinished=['FINISHED','finished','Ended'].includes(am.status);
    }
    if(!huHome||!huAway)return;
    const lm=ALL.find(m=>{
      const mHome=S.mt[m.id]?.home||m.home;
      const mAway=S.mt[m.id]?.away||m.away;
      return (mHome===huHome&&mAway===huAway)||(mHome===huAway&&mAway===huHome);
    });
    if(!lm)return;
    const flip=(S.mt[lm.id]?.home||lm.home)===huAway;
    const h=flip?aGoal:hGoal, a=flip?hGoal:aGoal;
    if(isFinished&&!nr[lm.id]){
      nr[lm.id]={homeGoals:h,awayGoals:a};
      applied.push({mid:lm.id,home:lm.home,away:lm.away,h,a});
    } else if(isLive){
      // Gól detektálás: ha az állás változott az előző live állapothoz képest
      const prev=S.live[lm.id];
      if(prev&&(h!==prev.h||a!==prev.a)){
        const scorer=h>prev.h?lm.home:lm.away;
        const newH=lm.home===huHome?h:a, newA=lm.home===huHome?a:h;
        pushGoalNotif(lm,newH,newA,scorer,am.minute||'');
      }
      live[lm.id]={h,a,status:am.status,desc:am.desc||am.status,minute:am.minute||''};
    }
    if(am.matchId) wcIds[lm.id]=am.matchId;
  });

  // Eltűnés detektálás: ami VOLT élő de most NEM szerepel a feedben → valószínűleg vége
  const prevLive=S.live||{};
  const nowLiveIds=new Set(Object.keys(live).map(Number));
  Object.entries(prevLive).forEach(([mid,sc])=>{
    const matchId=parseInt(mid);
    if(nowLiveIds.has(matchId))return; // még mindig élő
    if(nr[matchId])return; // már van eredmény
    const m=ALL.find(x=>x.id===matchId);
    if(!m)return;
    const koTime=S.ko[m.id]||m.koDefault;
    if(!koTime)return;
    // Ha 100+ perce kezdődött és eltűnt a live feedből → befejezettnek vesszük
    const elapsed=(Date.now()-new Date(koTime).getTime())/60000;
    if(elapsed>=100){
      nr[matchId]={homeGoals:sc.h,awayGoals:sc.a};
      applied.push({mid:matchId,home:m.home,away:m.away,h:sc.h,a:sc.a});
    }
  });

  // A kliens MÁR NEM írja a wc_live-ot: az élő állást a szerveroldali cron írja egy
  // helyre (wc_live_feed), amit a kliensek csak OLVASNAK. Így megszűnik a percenkénti,
  // sok klienstől érkező írás-roham. Az új, befejezett eredményt (wc_r) továbbra is mentjük.
  const tasks=[];
  if(applied.length)tasks.push(sS('wc_r',nr,true));
  if(tasks.length)await Promise.all(tasks);
  if(applied.length){SS({results:nr});await autoFillKnockoutTeams();}
  return{applied,results:applied.length?nr:S.results,live};
}

async function refreshLiveIfStale(force=false){
  const last=S.liveUpdatedAt?new Date(S.liveUpdatedAt).getTime():0;
  if(!force&&Date.now()-last<60*1000)return; // 1 perc, kivéve force
  try{
    let matches=null;
    // 1) Elsődlegesen a szerveroldali cron-feed (1 Firestore-olvasás, nincs külön ESPN-hívás kliensenként).
    try{
      const feed=await sG('wc_live_feed',true);
      if(feed&&Array.isArray(feed.matches)&&feed.updatedAt&&(Date.now()-new Date(feed.updatedAt).getTime()<3*60*1000)){
        matches=feed.matches;
      }
    }catch(_){}
    // 2) Ha nincs friss feed (cron még nem futott / hiba): közvetlen ESPN — tartalék.
    if(!matches){
      const resp=await fetch((location.hostname.includes('netlify')?'/.netlify/functions/livescores':'https://vb2026-endre.netlify.app/.netlify/functions/livescores')+'?t='+Date.now(),{cache:'no-store'});
      const data=await resp.json();
      if(!resp.ok||data.error||!data.matches)return;
      matches=data.matches;
    }
    const{results,live}=await applyFinishedMatches(matches);
    SS({results,live,liveUpdatedAt:new Date().toISOString()});
  }catch(e){}
}

    const diff=Math.max(0,new Date(S.ko[nextM.id]||nextM.koDefault).getTime()-Date.now());
    const h=Math.floor(diff/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);

function exportPredImage(){
  const W=1200,pad=36;
  const gCols=4,gRows=3,gGap=16;
  const cardW=(W-2*pad-(gCols-1)*gGap)/gCols;
  const cardH=156;
  const groupsTop=118;
  const groupsH=gRows*cardH+(gRows-1)*gGap;
  const bracketTop=groupsTop+groupsH+64;
  const auto=S.predMode!=='click';
  let r32=null;
  if(auto){ if(autoAllSet()){try{r32=autoResolveR32();}catch(e){r32=null;}} }
  else { const third8Done=S.predThird8.length===8; if(third8Done){try{r32=resolvePredR32();}catch(e){r32=null;}} }
  const cache={};
  const rounds=[
    {fns:[74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87]},
    {fns:[89,90,93,94,91,92,95,96]},
    {fns:[97,98,99,100]},
    {fns:[101,102]},
    {fns:[104]},
  ];
  const bracketH=r32?940:50;
  const H=bracketTop+bracketH+(r32?70:40)+30;
  const c=document.createElement('canvas');c.width=W*2;c.height=H*2;
  const ctx=c.getContext('2d');ctx.scale(2,2);
  const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#0A0A0A');grad.addColorStop(1,'#171717');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#C8A84B';ctx.fillRect(0,0,W,6);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#C8A84B';ctx.font='bold 26px sans-serif';ctx.fillText('🏆 VB 2026 Tippelő – Predikció',pad,52);
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='14px sans-serif';ctx.fillText(S.user.dn,pad,78);
  ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.fillText(S.lang==='en'?'Group predictions':'Csoport-végeredmények',pad,groupsTop-14);
  const tierCol=i=>i<2?'#2E9E5A':i===2?'#C8A84B':'#e85d5d';
  GD.forEach((g,gi)=>{
    const col=gi%gCols,row=Math.floor(gi/gCols);
    const x=pad+col*(cardW+gGap),y=groupsTop+row*(cardH+gGap);
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(x,y,cardW,cardH);
    ctx.fillStyle='#C8A84B';ctx.font='bold 14px sans-serif';ctx.fillText((S.lang==='en'?'Group '+g.id:g.id+'. csoport'),x+12,y+24);
    const order=auto?(autoGroupOrder(g.id)||[]):(S.predGroups[g.id]||[]);
    if(order.length){
      order.forEach((tm,i)=>{
        const ty=y+48+i*26;
        ctx.fillStyle=tierCol(i);ctx.font='bold 13px sans-serif';ctx.fillText((i+1)+'.',x+12,ty);
        ctx.fillStyle='#fff';ctx.font='13px sans-serif';
        let nm=teamFlag(tm)+' '+teamName(tm);
        while(ctx.measureText(nm).width>cardW-44&&nm.length>4){nm=nm.slice(0,-1);}
        ctx.fillText(nm,x+34,ty);
      });
    } else {ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='12px sans-serif';ctx.fillText(S.lang==='en'?'no prediction':'nincs tipp',x+12,y+58);}
  });
  ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.fillText(S.lang==='en'?'Knockout bracket':'Kieséses ágrajz',pad,bracketTop-14);
  if(!r32){
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='14px sans-serif';ctx.fillText(S.lang==='en'?'Bracket prediction incomplete':'Az ágrajz-predikció még hiányos.',pad,bracketTop+22);
  } else {
    const colW=(W-2*pad)/5;
    const labels=S.lang==='en'?['R32','R16','QF','SF','Final']:['32 között','16 között','Negyeddöntő','Elődöntő','Döntő'];
    // elore kiszamolt fuggoleges kozeppontok koronkent (igy a parok pontosan illeszkednek)
    const centers=rounds.map(rd=>{
      const N=rd.fns.length,slot=bracketH/N;
      return rd.fns.map((_,i)=>bracketTop+28+i*slot+slot/2);
    });
    // osszekoto "konyok" vonalak a korok kozott (eloszor, hogy a dobozok rea rajzolodjanak)
    ctx.strokeStyle='rgba(200,168,75,.5)';ctx.lineWidth=1.5;
    for(let ri=0;ri<rounds.length-1;ri++){
      const rightEdge=pad+(ri+1)*colW-6,midX=pad+(ri+1)*colW,nextLeft=pad+(ri+1)*colW+6;
      for(let k=0;k<rounds[ri+1].fns.length;k++){
        const ca=centers[ri][2*k],cb=centers[ri][2*k+1],cn=centers[ri+1][k];
        ctx.beginPath();
        ctx.moveTo(rightEdge,ca);ctx.lineTo(midX,ca);
        ctx.moveTo(rightEdge,cb);ctx.lineTo(midX,cb);
        ctx.moveTo(midX,ca);ctx.lineTo(midX,cb);
        ctx.moveTo(midX,cn);ctx.lineTo(nextLeft,cn);
        ctx.stroke();
      }
    }
    rounds.forEach((rd,ri)=>{
      const cx=pad+ri*colW;
      ctx.fillStyle='#C8A84B';ctx.font='bold 12px sans-serif';ctx.textAlign='left';ctx.fillText(labels[ri],cx+6,bracketTop+12);
      const bw=colW-12;
      rd.fns.forEach((fn,i)=>{

        ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(cx+6,boxY,bw,38);
        if(teams){
          const pick=S.predKO[fn];
          const drawTeam=(tm,side,yy)=>{
            const picked=pick===side;
            ctx.fillStyle=picked?'#3ec46f':'rgba(255,255,255,.5)';
            ctx.font=(picked?'bold ':'')+'11px sans-serif';
            let nm=teamFlag(tm)+' '+teamName(tm);
            while(ctx.measureText(nm).width>bw-14&&nm.length>4){nm=nm.slice(0,-1);}
            ctx.fillText(nm,cx+13,yy);
          };
          drawTeam(teams.home,'home',cyc-3);
          drawTeam(teams.away,'away',cyc+14);
        } else {ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='11px sans-serif';ctx.fillText('?',cx+13,cyc+4);}
      });
    });
    const finalTeams=predTeamsForFifaNum(104,r32,cache),finalPick=S.predKO[104];
    const champ=finalTeams&&finalPick?(finalPick==='home'?finalTeams.home:finalTeams.away):null;
    if(champ){ctx.fillStyle='#C8A84B';ctx.font='bold 18px sans-serif';ctx.fillText('🏆 '+(S.lang==='en'?'Champion: ':'Bajnok: ')+teamFlag(champ)+' '+teamName(champ),pad,bracketTop+bracketH+46);}
  }
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='11px sans-serif';
  ctx.fillText(new Date().toLocaleDateString('hu-HU')+'  ·  '+location.href.split('?')[0].replace(/^https?:\/\//,''),pad,H-16);
  c.toBlob(blob=>{ if(blob)_imgOut(blob,'vb2026_predikcio.png'); });
}
function getLbBoard(){

let _bkResizeBound=false;
function fitBrackets(){
  document.querySelectorAll('.bk-scale').forEach(inner=>{
    const wrap=inner.closest('.bk-desktop');
    if(!wrap)return;
    inner.style.transform='none';
    const natW=Math.max(inner.offsetWidth,inner.scrollWidth);
    const availW=wrap.clientWidth;
    if(!natW||!availW){return;}
    const sc=Math.min(1,availW/natW);
    inner.style.transformOrigin='top left';
    inner.style.transform='scale('+sc+')';
    wrap.style.overflow='hidden';
    wrap.style.height=(inner.offsetHeight*sc)+'px';
  });
}
function bindBracketResize(){
  if(_bkResizeBound)return; _bkResizeBound=true;

function next24h(){
  const now=Date.now(),in24h=now+24*60*60*1000;
  return ALL.filter(m=>{
    if(m.tbd&&!S.mt[m.id])return false;
    if(S.results[m.id])return false;
    const ko=S.ko[m.id]||m.koDefault;
    if(!ko)return false;
    const kt=new Date(ko).getTime();
    return kt>=now&&kt<=in24h;
  }).sort((a,b)=>new Date(S.ko[a.id]||a.koDefault)-new Date(S.ko[b.id]||b.koDefault));
}
