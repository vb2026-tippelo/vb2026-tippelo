<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#011524">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VB 2026">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<title>VB 2026 Tippelő</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== FIFA 2026 DESIGN SYSTEM ===== */
:root{
  --bg-page:#07090f;
  --bg-page-grad:linear-gradient(160deg,#07090f 0%,#0b1020 60%,#07090f 100%);
  --bg-auth-grad:linear-gradient(145deg,#050709 0%,#0a0f1c 60%,#050709 100%);
  --bg-header:linear-gradient(90deg,#040608 0%,#080d18 100%);
  --bg-nav-overlay:rgba(0,0,0,.55);
  --bg-modal:#0c1424;
  --bg-card:#0d1525;
  --bg-card-2:#111d30;
  --ink-rgb:255,255,255;
  --text-color:#edf0fb;
  --c-gold:#D4AF37;
  --c-gold-light:#e8cc5a;
  --c-red:#E8212A;
  --c-blue:#1B4FC4;
  --c-green:#00B050;
  --border:rgba(255,255,255,0.07);
  --border-gold:rgba(212,175,55,0.3);
}
body.light-theme{
  --bg-page:#edf0f7;
  --bg-page-grad:linear-gradient(160deg,#edf0f7 0%,#e2e8f2 60%,#edf0f7 100%);
  --bg-auth-grad:linear-gradient(145deg,#e8ecf4 0%,#dde3ee 60%,#e8ecf4 100%);
  --bg-header:linear-gradient(90deg,#0d1525 0%,#111d30 100%);
  --bg-nav-overlay:rgba(255,255,255,0.95);
  --bg-modal:#ffffff;
  --bg-card:#ffffff;
  --bg-card-2:#f4f6fb;
  --ink-rgb:12,18,40;
  --text-color:#0c1228;
  --border:rgba(12,18,40,0.09);
  --border-gold:rgba(212,175,55,0.35);
}
body.light-theme .header{border-bottom-color:var(--c-gold)}
body.light-theme .modal-c{border-color:var(--border-gold)}
body.light-theme .nav{background:var(--bg-nav-overlay);border-bottom:1px solid rgba(0,0,0,.07)}
body.light-theme .ntab{color:rgba(12,18,40,.5)}
body.light-theme .ntab:hover{color:rgba(12,18,40,.85)}
body.light-theme .ntab.on{color:var(--c-gold)}
body.light-theme .mcard{box-shadow:0 2px 16px rgba(0,0,0,.08);background:#fff;border-color:rgba(0,0,0,.07)}
body.light-theme .tname{color:#0c1228}
body.light-theme .sbox{background:#fff;color:#0c1228;border-color:#dde1ed}
body.light-theme .actual-s{color:#0c1228}
body.light-theme .mc-ko{background:#0d1525;color:var(--c-gold)}
body.light-theme .std-head{background:#0d1525}
body.light-theme .stdt td{color:#0c1228;border-bottom-color:rgba(0,0,0,.05)}
body.light-theme .lb-card{background:#fff;border-color:rgba(0,0,0,.07)}
body.light-theme .lb-nm{color:#0c1228}
body.light-theme .lb-pts{color:#0c1228}
body.light-theme .pre-card{background:#fff}
body.light-theme .pred-group-card{background:#fff;border-color:rgba(0,0,0,.08)}
body.light-theme .sbox2{background:#fff;border-color:rgba(0,0,0,.07)}
body.light-theme .bk-match{background:#fff;border-color:rgba(0,0,0,.08)}
body.light-theme .bk-venue{background:rgba(0,0,0,.03)}
body.light-theme .pbk-box{background:#fff;border-color:rgba(0,0,0,.08)}
body.light-theme .pbk-btn{color:rgba(12,18,40,.65);border-bottom-color:rgba(0,0,0,.06)}
body.light-theme .std-card{background:#fff;border-color:rgba(0,0,0,.07)}
body.light-theme .adm-card{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.07)}

/* ===== BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-page);color:var(--text-color);min-height:100vh;transition:background .2s,color .2s}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit;outline:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{appearance:none;-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(var(--ink-rgb),0.15);border-radius:2px}

/* ===== AUTH PAGE ===== */
.auth-page{min-height:100vh;background:var(--bg-auth-grad);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.auth-page::before{content:'26';position:absolute;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:320px;color:rgba(212,175,55,.03);right:-40px;top:50%;transform:translateY(-50%);pointer-events:none;line-height:1}
.auth-card{width:100%;max-width:420px;background:rgba(255,255,255,.04);border:1px solid var(--border-gold);border-radius:20px;padding:32px;backdrop-filter:blur(12px)}
.auth-hero{text-align:center;margin-bottom:24px}
.auth-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--c-gold);margin-top:10px;letter-spacing:.5px;text-transform:uppercase}
.auth-sub{font-size:13px;color:rgba(var(--ink-rgb),.4);margin-top:5px}
.lbl{font-size:12px;color:rgba(var(--ink-rgb),.45);margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:12px 14px;background:rgba(var(--ink-rgb),.06);border:1.5px solid rgba(var(--ink-rgb),.1);border-radius:10px;color:var(--text-color);font-size:15px;transition:all .15s}
.inp:focus{border-color:rgba(212,175,55,.6);background:rgba(212,175,55,.04)}
.inp-light{width:100%;padding:12px 14px;background:rgba(var(--ink-rgb),.06);border:1.5px solid var(--border);border-radius:10px;color:var(--text-color);font-size:14px;transition:all .15s}
.inp-light:focus{border-color:rgba(212,175,55,.6)}

/* ===== BUTTONS ===== */
.btn-gold{background:linear-gradient(135deg,var(--c-gold),#b8922e);color:#07090f;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;width:100%;letter-spacing:.5px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;transition:filter .15s}
.btn-gold:hover:not(:disabled){filter:brightness(1.12)}
.btn-gold:disabled{opacity:.45}
.btn-green{background:linear-gradient(135deg,var(--c-green),#008c3a);color:white;border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:700;transition:filter .15s}
.btn-green:hover:not(:disabled){filter:brightness(1.1)}
.btn-green:disabled{opacity:.5}
.btn-sm{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn-sm.gold{background:rgba(212,175,55,.15);color:var(--c-gold);border:1px solid rgba(212,175,55,.3)}
.btn-sm.red{background:rgba(232,33,42,.15);color:#ff7070;border:1px solid rgba(232,33,42,.25)}
.btn-sm.white{background:rgba(var(--ink-rgb),.08);color:rgba(var(--ink-rgb),.7);border:1px solid var(--border)}
.err-box{background:rgba(232,33,42,.12);border:1px solid rgba(232,33,42,.3);border-radius:9px;padding:10px 14px;color:#ff8888;font-size:14px;margin-bottom:14px}
.suc-box{background:rgba(0,176,80,.1);border:1px solid rgba(0,176,80,.3);border-radius:9px;padding:10px 14px;color:#5de89a;font-size:14px;margin-bottom:14px}

/* ===== HEADER ===== */
.header{background:var(--bg-header);border-bottom:2px solid var(--c-gold);position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.5)}
.h-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-t{font-size:28px;filter:drop-shadow(0 2px 12px rgba(212,175,55,.6))}
.logo-txt{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff}
.logo-txt b{color:var(--c-gold)}
.logo-sub{font-weight:500;color:rgba(255,255,255,.55)}

/* ===== NAV ===== */
.nav{background:var(--bg-nav-overlay);border-bottom:1px solid var(--border);overflow-x:auto;backdrop-filter:blur(8px)}
.nav::-webkit-scrollbar{height:0}
.nav-in{max-width:960px;margin:0 auto;display:flex;padding:0 4px}
.ntab{padding:13px 13px;background:none;border:none;border-bottom:3px solid transparent;color:rgba(var(--ink-rgb),.45);font-size:12.5px;font-weight:600;white-space:nowrap;transition:all .15s;position:relative;cursor:pointer;letter-spacing:.2px}
.ntab:hover{color:rgba(var(--ink-rgb),.8)}
.ntab.on{border-bottom-color:var(--c-gold);color:var(--c-gold);font-weight:700}
.nbadge{position:absolute;top:8px;right:3px;background:var(--c-red);color:white;font-size:9px;font-weight:800;padding:2px 5px;border-radius:10px}
.content{max-width:960px;margin:0 auto;padding:20px 12px 60px}

/* ===== SECTION HEADERS ===== */
.sect{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;margin-bottom:14px;color:var(--text-color);text-transform:uppercase;letter-spacing:.5px}

/* ===== MATCH CARDS ===== */
.mcard{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:all .18s}
.mcard:hover{border-color:rgba(212,175,55,.2);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.mcard.locked{opacity:.9}
.mc-top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 0}
.mc-date{font-size:11.5px;color:rgba(var(--ink-rgb),.35);display:flex;align-items:center;gap:5px}
.mc-meta{display:flex;align-items:center;gap:6px}
.mc-grp{font-size:11px;color:rgba(var(--ink-rgb),.35);font-weight:600;letter-spacing:.3px}
.mc-ko{background:var(--c-gold);color:#07090f;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:.4px;font-family:'Rajdhani',sans-serif}
.mc-main{display:flex;align-items:center;padding:12px 14px 10px;gap:6px}
.team-b{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.team-b.home{justify-content:flex-start}
.team-b.away{justify-content:flex-end;flex-direction:row-reverse}
.flag-img{height:27px;object-fit:cover;border-radius:3px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.35)}
.tname{font-size:14px;font-weight:700;color:var(--text-color);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-b{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:120px;flex-shrink:0}
.sinputs{display:flex;align-items:center;gap:8px}
.sbox{width:52px;height:52px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--text-color);border:1.5px solid rgba(var(--ink-rgb),.2);border-radius:10px;background:rgba(var(--ink-rgb),.08);transition:all .15s;padding:0;-moz-appearance:textfield;appearance:textfield}
.sbox:focus{border-color:var(--c-gold);background:rgba(212,175,55,.07);color:var(--c-gold)}
.sbox:disabled{opacity:.5}
.sbox.filled{border-color:rgba(212,175,55,.4)}
.sdash{font-size:20px;font-weight:400;color:rgba(var(--ink-rgb),.4)}
.actual-s{display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--text-color)}
.mc-saved{font-size:11px;color:var(--c-green);font-weight:600;height:13px;text-align:center}
.mc-res{display:flex;align-items:center;justify-content:center;gap:10px;padding:5px 14px 9px;border-top:1px solid var(--border);font-size:12px;color:rgba(var(--ink-rgb),.45)}
.ptag{font-weight:700;padding:3px 10px;border-radius:12px;font-size:12px;font-family:'Rajdhani',sans-serif;letter-spacing:.3px}
.p8{background:rgba(212,175,55,.18);color:var(--c-gold)}.p5{background:rgba(27,79,196,.2);color:#6fa3ff}.p3{background:rgba(0,176,80,.15);color:#4de89a}
.p1{background:rgba(var(--ink-rgb),.07);color:rgba(var(--ink-rgb),.45)}.p0{background:rgba(232,33,42,.12);color:#ff7070}

/* ===== PILLS ===== */
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{padding:7px 14px;border-radius:20px;border:none;font-size:12.5px;font-weight:600;transition:all .15s;cursor:pointer;letter-spacing:.2px}
.pill.off{background:rgba(var(--ink-rgb),.07);color:rgba(var(--ink-rgb),.5)}
.pill.off:hover{background:rgba(var(--ink-rgb),.13);color:var(--text-color)}
.pill.on{background:var(--c-gold);color:#07090f;font-weight:700;box-shadow:0 2px 12px rgba(212,175,55,.3)}

/* ===== STANDINGS ===== */
.std-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.std-head{background:linear-gradient(90deg,#0d1525,#111d30);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.std-glbl{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--c-gold);letter-spacing:.8px;text-transform:uppercase}
.std-t{font-size:11px;color:rgba(255,255,255,.3)}
table.stdt{width:100%;border-collapse:collapse}
.stdt th{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:rgba(var(--ink-rgb),.3);padding:7px 10px;text-align:center;border-bottom:1px solid var(--border)}
.stdt th:nth-child(2){text-align:left;min-width:110px}
.stdt td{padding:10px;text-align:center;font-size:13px;border-bottom:1px solid var(--border);color:var(--text-color)}
.stdt td:nth-child(2){text-align:left;font-weight:700}
.stdt tr:last-child td{border-bottom:none}
.stdt tr.top2 td:nth-child(2){color:var(--c-gold)}
.adot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

/* ===== STAT BOXES ===== */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sbox2{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.sv2{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:3px}
.sl2{font-size:10.5px;color:rgba(var(--ink-rgb),.4);text-transform:uppercase;letter-spacing:.3px}

/* ===== LEADERBOARD ===== */
.lb-card{display:flex;align-items:center;gap:12px;border-radius:13px;padding:13px 16px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:7px;transition:all .15s}
.lb-card:hover{border-color:rgba(212,175,55,.2)}
.lb-card.me{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.06)}
.lb-rank{min-width:34px;text-align:center;font-family:'Rajdhani',sans-serif;font-weight:700}
.lb-nm{font-size:15px;font-weight:700;color:var(--text-color)}
.lb-sub{font-size:11.5px;color:rgba(var(--ink-rgb),.35);margin-top:2px}
.lb-pts{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--c-gold);min-width:50px;text-align:right}

/* ===== MODAL ===== */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(4px)}
.modal-c{background:var(--bg-modal);border:1px solid var(--border-gold);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-t{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--c-gold);margin-bottom:18px;text-transform:uppercase;letter-spacing:.5px}

/* ===== PROFILE ===== */
.prof-hdr{display:flex;align-items:center;gap:18px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:18px}
.av-big{width:76px;height:76px;font-size:42px;border-radius:50%;background:rgba(212,175,55,.1);border:2.5px solid var(--c-gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-opt{width:42px;height:42px;font-size:22px;border-radius:9px;border:2px solid transparent;background:rgba(var(--ink-rgb),.06);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.av-opt:hover{background:rgba(var(--ink-rgb),.12);transform:scale(1.08)}
.av-opt.sel{border-color:var(--c-gold);background:rgba(212,175,55,.12)}

/* ===== ADMIN ===== */
.adm-card{background:rgba(var(--ink-rgb),.04);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:7px}
.ainp{width:52px;padding:7px;background:rgba(var(--ink-rgb),.08);border:1.5px solid var(--border);border-radius:7px;color:var(--text-color);font-size:16px;font-weight:700;text-align:center}
.ainp:focus{border-color:var(--c-gold)}
.tinp{padding:8px 12px;background:rgba(var(--ink-rgb),.07);border:1.5px solid var(--border);border-radius:7px;color:var(--text-color);font-size:13px;width:140px}
.tinp:focus{border-color:#4a9eff}

/* ===== MISC ===== */
.divider{height:1px;background:var(--border);margin:18px 0}
.empty{text-align:center;padding:48px 20px;color:rgba(var(--ink-rgb),.3)}
.scoring-hint{background:rgba(var(--ink-rgb),.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:rgba(var(--ink-rgb),.4);margin-top:14px;line-height:1.7}
.tip-row{display:flex;align-items:center;gap:10px;background:rgba(var(--ink-rgb),.04);border:1px solid var(--border);border-radius:11px;padding:10px 14px;margin-bottom:7px;flex-wrap:wrap}
.lg-sel-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;background:rgba(var(--ink-rgb),.04);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.note-bar{background:rgba(var(--ink-rgb),.04);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:rgba(var(--ink-rgb),.4)}
.lg-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;transition:border-color .15s}
.lg-card:hover{border-color:rgba(212,175,55,.2)}
.lg-code{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--c-gold);letter-spacing:3px;margin-top:8px;margin-bottom:2px}
.lg-sub-row{display:flex;gap:8px;margin-bottom:14px;background:rgba(var(--ink-rgb),.04);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.pre-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(212,175,55,.1),rgba(212,175,55,.04));border:1px solid rgba(212,175,55,.25);border-radius:14px;padding:14px 16px;margin-bottom:14px;cursor:pointer;transition:all .15s}
.pre-banner:hover{border-color:rgba(212,175,55,.5);background:rgba(212,175,55,.15)}
.pre-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px}

/* ===== BRACKET ===== */
.bk-col{width:165px;flex-shrink:0}
.bk-colhead{text-align:center;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--c-gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px}
.bk-match{background:var(--bg-card);border:1px solid var(--border);border-radius:9px;overflow:hidden;font-size:12px}
.bk-team{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:7px 10px;color:rgba(var(--ink-rgb),.55);border-bottom:1px solid var(--border)}
.bk-team span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-team:last-child{border-bottom:none}
.bk-team.win{color:var(--c-gold);font-weight:700;background:rgba(212,175,55,.07)}
.bk-sc{font-family:'Rajdhani',sans-serif;font-weight:700;flex-shrink:0;font-size:13px}
.bk-team.bk-slot{color:rgba(var(--ink-rgb),.25);font-size:10.5px;font-style:italic}
.bk-venue{font-size:9px;color:rgba(var(--ink-rgb),.3);text-align:center;line-height:1.6;padding:5px 8px 7px;background:rgba(0,0,0,.2);border-top:1px solid var(--border)}
.bk-final-wrap .bk-match{border:1.5px solid var(--c-gold);box-shadow:0 0 20px rgba(212,175,55,.2)}

async function fetchTodayWeather(){
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Europe/Budapest'});
  const todayMatches=ALL.filter(m=>m.stage==='group'&&m.date===today);
  if(!todayMatches.length)return;
  const venues=[...new Set(todayMatches.map(m=>GROUP_VENUE[m.id]).filter(Boolean))];
  const weather={};
  await Promise.all(venues.map(async venue=>{
    const coords=VENUE_COORDS[venue];
    if(!coords)return;
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${coords[0]}&longitude=${coords[1]}&current=temperature_2m,precipitation_probability,weather_code&timezone=auto&forecast_days=1`;
      const r=await fetch(url);
      const d=await r.json();
      if(d.current){
        weather[venue]={
          temp:Math.round(d.current.temperature_2m),
          icon:WMO_ICON[d.current.weather_code]||'🌡️',
          precip:d.current.precipitation_probability??0
        };
      }
    }catch(e){}
  }));
  SS({weather});
}

async function fetchTodayOdds(){
  const KEY='d2e76cddb77f1adbf0cc133c71abdd39';
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Europe/Budapest'});
  const todayMs=ALL.filter(m=>m.date===today&&!m.tbd);
  if(!todayMs.length)return;
  try{
    // Sport kulcs keresése
    const sRes=await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${KEY}&all=true`);
    const sports=await sRes.json();
    const soccerSports=sports.filter(s=>s.key.includes('soccer'));
    console.log('Focis sportok:',soccerSports.map(s=>s.key));
    const wcKeys=['soccer_fifa_world_cup_2026','soccer_world_cup_2026','soccer_fifa_world_cup','soccer_world_cup'];
    const wcSport=soccerSports.find(s=>wcKeys.includes(s.key));
    const wcKey=wcSport?.key;
    if(!wcKey){console.log('VB kulcs nem található. Elérhető foci kulcsok:',soccerSports.map(s=>s.key));return;}
    console.log('VB kulcs:',wcKey);
    const oRes=await fetch(`https://api.the-odds-api.com/v4/sports/${wcKey}/odds/?apiKey=${KEY}&regions=eu&markets=h2h&oddsFormat=decimal`);
    const data=await oRes.json();
    if(!Array.isArray(data)){console.log('Odds API h2h hiba:',data);return;}
    let bttsData=[];
    try{
      const bRes=await fetch(`https://api.the-odds-api.com/v4/sports/${wcKey}/odds/?apiKey=${KEY}&regions=eu&markets=btts&oddsFormat=decimal`);
      const bd=await bRes.json();
      if(Array.isArray(bd))bttsData=bd;
    }catch(e){}
    const odds={};
    for(const ev of data){
      const hCode=EN_TEAM[ev.home_team];
      const aCode=EN_TEAM[ev.away_team];
      if(!hCode||!aCode){console.log('Ismeretlen csapat:',ev.home_team,'vs',ev.away_team);continue;}
      const match=todayMs.find(m=>(m.home===hCode&&m.away===aCode)||(m.home===aCode&&m.away===hCode));
      if(!match)continue;
      const bk=ev.bookmakers?.[0];if(!bk)continue;
      const h2h=bk.markets?.find(mk=>mk.key==='h2h');if(!h2h)continue;
      // BTTS keresés
      const bttsEv=bttsData.find(b=>b.id===ev.id);
      const bttsBk=bttsEv?.bookmakers?.[0];
      const bttsYes=bttsBk?.markets?.find(mk=>mk.key==='btts')?.outcomes?.find(o=>o.name==='Yes');
      const hO=h2h.outcomes.find(o=>EN_TEAM[o.name]===match.home||o.name===ev.home_team);
      const aO=h2h.outcomes.find(o=>EN_TEAM[o.name]===match.away||o.name===ev.away_team);
      const dO=h2h.outcomes.find(o=>o.name==='Draw');
      if(hO&&aO){
        const isSwapped=match.home===aCode;
        odds[match.id]={h:(isSwapped?aO:hO).price.toFixed(2),d:dO?.price?.toFixed(2)||null,a:(isSwapped?hO:aO).price.toFixed(2),btts:bttsYes?.price?.toFixed(2)||null,bk:bk.title};
      }
    }
    SS({odds});
    console.log('Odds betöltve:',Object.keys(odds).length,'mérkőzés');
  }catch(e){console.log('Odds hiba:',e);}
}

function tipCategory(tip,res,stage){
  if(!tip||!res||res.homeGoals==null)return null;
  const th=parseInt(tip.homeGoals),ta=parseInt(tip.awayGoals),rh=parseInt(res.homeGoals),ra=parseInt(res.awayGoals);
  if(isNaN(th)||isNaN(ta)||isNaN(rh)||isNaN(ra))return null;
  const gr=(h,a)=>h>a?'1':h===a?'X':'2';
  const tR=gr(th,ta),rR=gr(rh,ra),tGD=th-ta,rGD=rh-ra;
  if(th===rh&&ta===ra)return'p8';
  if(rR!=='X'&&tR===rR&&tGD===rGD)return'p5'; // döntetlennél a GK mindig 0, így nem számít önálló találatnak
  if(tR===rR)return'p3';
  if(th===rh||ta===ra)return'p1';
  return'p0';
}
function calcPts(tip,res,stage,cfg=DS){
  const cat=tipCategory(tip,res,stage);if(cat===null)return null;
  const base={p8:cfg.perfect,p5:cfg.resultGD,p3:cfg.result,p1:cfg.oneGoal,p0:0}[cat]||0;
  return KO.includes(stage)?base*(cfg.ko??2):base;
}
function ptsCat(tip,res,stage,cfg=DS){
  return tipCategory(tip,res,stage);
}
function calcUser(uid,tips,results,mt,special,adminSpec,cfg=DS){
  let pts=0,tipped=0,fin=0,pf=0,rgd=0,res3=0,og=0;
  ALL.forEach(m=>{
    const t=tips[`${uid}_${m.id}`],r=results[m.id];
    if(!t)return;tipped++;if(!r)return;fin++;
    const p=calcPts(t,r,m.stage,cfg)||0;pts+=p;
    const cat=ptsCat(t,r,m.stage,cfg);
    if(cat==='p8')pf++;else if(cat==='p5')rgd++;else if(cat==='p3')res3++;else if(cat==='p1')og++;
  });
  const uw=special?.[`${uid}_w`],ut=special?.[`${uid}_t`];
  const wPts=adminSpec?.winner&&uw===adminSpec.winner?cfg.winner:0;
  const tPts=adminSpec?.top&&ut&&ut.toLowerCase().trim()===adminSpec.top?.toLowerCase().trim()?cfg.topScorer:0;
  pts+=wPts+tPts;
  return{pts,tipped,fin,pf,rgd,res3,og,wPts,tPts};
}
function calcStd(gid,results,mt){
  const grp=GD.find(g=>g.id===gid);
  const teams=grp.teams.map(n=>({n,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
  ALL.filter(m=>m.group===gid).forEach(m=>{
    const r=results[m.id];if(!r)return;
    const ov=mt?.[m.id],hN=ov?.home||m.home,aN=ov?.away||m.away;
    const h=teams.find(t=>t.n===hN),a=teams.find(t=>t.n===aN);if(!h||!a)return;
    const rh=parseInt(r.homeGoals),ra=parseInt(r.awayGoals);
    h.p++;a.p++;h.gf+=rh;h.ga+=ra;a.gf+=ra;a.ga+=rh;
    if(rh>ra){h.w++;h.pts+=3;a.l++;}else if(rh===ra){h.d++;h.pts++;a.d++;a.pts++;}else{a.w++;a.pts+=3;h.l++;}
    h.gd=h.gf-h.ga;a.gd=a.gf-a.ga;
  });
  return teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

async function applyFinishedMatches(apiMatches){
  const nr={...S.results};
  const live={};
  const applied=[];
  apiMatches.forEach(am=>{
    const huHome=matchTeamByEng(am.home),huAway=matchTeamByEng(am.away);
    if(!huHome||!huAway)return;
    const lm=ALL.find(m=>m.stage==='group'&&((m.home===huHome&&m.away===huAway)||(m.home===huAway&&m.away===huHome)));
    if(!lm||nr[lm.id])return;
    const flip=lm.home===huAway;
    if(am.status==='FINISHED'&&am.homeScore!=null&&am.awayScore!=null){
      const h=flip?am.awayScore:am.homeScore,a=flip?am.homeScore:am.awayScore;
      nr[lm.id]={homeGoals:h,awayGoals:a};
      applied.push({mid:lm.id,home:lm.home,away:lm.away,h,a});
    }else if((am.status==='IN_PLAY'||am.status==='PAUSED')&&am.homeScore!=null&&am.awayScore!=null){
      live[lm.id]={h:flip?am.awayScore:am.homeScore,a:flip?am.homeScore:am.awayScore,status:am.status};
    }
  });
  const tasks=[sS('wc_live',{updatedAt:new Date().toISOString(),scores:live},true)];
  if(applied.length)tasks.push(sS('wc_r',nr,true));
  await Promise.all(tasks);
  if(applied.length){SS({results:nr});await autoFillKnockoutTeams();}
  return{applied,results:applied.length?nr:S.results,live};
}

  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'#011524');grad.addColorStop(1,'#012435');
  ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#c9a84c';ctx.font='bold 26px sans-serif';
  ctx.fillText('🏆 VB 2026 Tippelő',pad,42);
  ctx.fillStyle='rgba(var(--ink-rgb),.6)';ctx.font='14px sans-serif';
  ctx.fillText(`${lgN} – Tabella`,pad,66);
  ctx.fillStyle='rgba(var(--ink-rgb),.3)';ctx.font='11px sans-serif';
  ctx.fillText(new Date().toLocaleDateString('hu-HU'),pad,84);
  board.forEach((u,i)=>{
    const y=headerH+i*rowH;
    ctx.fillStyle=i%2===0?'rgba(var(--ink-rgb),.045)':'rgba(var(--ink-rgb),.015)';
    ctx.fillRect(pad-10,y,w-2*(pad-10),rowH-6);
    ctx.fillStyle=i===0?'#c9a84c':i===1?'#c7c7c7':i===2?'#cd7f32':'rgba(var(--ink-rgb),.8)';
    ctx.font='bold 17px sans-serif';
    ctx.fillText(i<3?['🥇','🥈','🥉'][i]:`${i+1}.`,pad,y+34);
    ctx.fillStyle='#fff';ctx.font='bold 15px sans-serif';
    ctx.fillText(u.dn,pad+54,y+27);
    ctx.fillStyle='rgba(var(--ink-rgb),.5)';ctx.font='11.5px sans-serif';
    ctx.fillText(`⭐${u.pf}  🎯${u.rgd}  ✓${u.res3}  ·  ${u.tipped} tipp`,pad+54,y+46);
    ctx.fillStyle='#c9a84c';ctx.font='bold 21px sans-serif';ctx.textAlign='right';
    ctx.fillText(`${u.pts}p`,w-pad,y+35);ctx.textAlign='left';
  });
  c.toBlob(blob=>{
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=`vb2026_${lgN.replace(/\s+/g,'_')}_tabella.png`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  });
}

function next24h(){
  const now=Date.now(),in24h=now+24*60*60*1000;
  return ALL.filter(m=>{

    if(S.results[m.id])return false;
    const ko=S.ko[m.id]||m.koDefault;
    if(!ko)return false;
    const kt=new Date(ko).getTime();
    return kt>=now&&kt<=in24h;
  }).sort((a,b)=>new Date(S.ko[a.id]||a.koDefault)-new Date(S.ko[b.id]||b.koDefault));
}

  const thirdTable=thirds.length?`<div class="std-card"><div class="std-head"><span class="std-glbl">🥉 ${t('third_table_t')}</span><span class="std-t">${t('third_table_s')}</span></div>

function resolveR32Teams(results){
  const groupMatches=ALL.filter(m=>m.stage==='group');
  if(groupMatches.some(m=>!results[m.id]))return null;
  const standings={};
  GD.forEach(g=>{standings[g.id]=calcStd(g.id,results,null);});
  const thirds=GD.map(g=>({grp:g.id,...standings[g.id][2]}));
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const best8=thirds.slice(0,8).map(x=>x.grp).sort();
  const comboKey=best8.join('');
  const row=ANNEX_C[comboKey];
  if(!row)return null;
  const hostOrder=['A','B','D','E','G','I','K','L'];
  const thirdFor={};
  hostOrder.forEach((h,i)=>{thirdFor[h]=row[i];});
  const out={};
  for(let fifaNum=73;fifaNum<=88;fifaNum++){
    const[hLbl,aLbl]=R32_SLOTS[fifaNum];
    const resolveSide=(lbl)=>{
      const m1=lbl.match(/^([12])([A-L])$/);
      if(m1)return m1[1]==='1'?standings[m1[2]][0].n:standings[m1[2]][1].n;
      return null;
    };
    let home=resolveSide(hLbl),away=resolveSide(aLbl);
    if(home===null){const hostLetter=aLbl.match(/^[12]([A-L])$/)[1];home=standings[thirdFor[hostLetter]][2].n;}
    if(away===null){const hostLetter=hLbl.match(/^[12]([A-L])$/)[1];away=standings[thirdFor[hostLetter]][2].n;}
    out[fifaNum]={home,away};
  }
  return out;
}

    const srcNums=wsrc||lsrc;
    if(!srcNums)continue;
    const[ma,mb]=srcNums.map(fifaMatchObj);
    if(!ma||!mb)continue;
    const ta=teamsOfMatch(ma,updates),tb=teamsOfMatch(mb,updates);
    if(!ta||!tb)continue;
    const ra=S.results[ma.id],rb=S.results[mb.id];
    if(!ra||!rb)continue;
    const wa=getWinnerSide(ma.id,ra),wb=getWinnerSide(mb.id,rb);
    if(!wa||!wb)continue;
    if(wsrc){
      updates[m.id]={home:wa==='home'?ta.home:ta.away,away:wb==='home'?tb.home:tb.away};
    }else{
      updates[m.id]={home:wa==='home'?ta.away:ta.home,away:wb==='home'?tb.away:tb.home};
    }
  }
  if(Object.keys(updates).length){
    const nm={...S.mt,...updates};
    await sS('wc_mt',nm,true);
    SS({mt:nm});
  }
}
function predGroupComplete(gid){
  const arr=S.predGroups[gid];
  if(!arr||arr.length!==4)return false;
  const g=GD.find(x=>x.id===gid);
  return new Set(arr).size===4&&arr.every(t=>g.teams.includes(t));
}
function predAllGroupsComplete(){
  return GD.every(g=>predGroupComplete(g.id));
}
function predThirdCandidates(){
  return GD.filter(g=>predGroupComplete(g.id)).map(g=>({grp:g.id,team:S.predGroups[g.id][2]}));
}
function resolvePredR32(){
  if(!predAllGroupsComplete()||S.predThird8.length!==8)return null;
  const comboKey=[...S.predThird8].sort().join('');
  const row=ANNEX_C[comboKey];
  if(!row)return null;
  const hostOrder=['A','B','D','E','G','I','K','L'];
  const thirdFor={};
  hostOrder.forEach((h,i)=>{thirdFor[h]=row[i];});
  const out={};
  for(let fifaNum=73;fifaNum<=88;fifaNum++){
    const[hLbl,aLbl]=R32_SLOTS[fifaNum];
    const resolveSide=(lbl)=>{
      const m1=lbl.match(/^([12])([A-L])$/);
      if(m1)return m1[1]==='1'?S.predGroups[m1[2]][0]:S.predGroups[m1[2]][1];
      return null;
    };
    let home=resolveSide(hLbl),away=resolveSide(aLbl);
    if(home===null){const hostLetter=aLbl.match(/^[12]([A-L])$/)[1];home=S.predGroups[thirdFor[hostLetter]][2];}
    if(away===null){const hostLetter=hLbl.match(/^[12]([A-L])$/)[1];away=S.predGroups[thirdFor[hostLetter]][2];}
    out[fifaNum]={home,away};
  }
  return out;
}
function predTeamsForFifaNum(fifaNum,r32,cache){
  if(cache[fifaNum]!==undefined)return cache[fifaNum];
  if(fifaNum<=88)return cache[fifaNum]=r32?r32[fifaNum]:null;
  const wsrc=WINNER_SOURCES[fifaNum],lsrc=LOSER_SOURCES[fifaNum];
  const srcNums=wsrc||lsrc;
  if(!srcNums)return cache[fifaNum]=null;
  const[na,nb]=srcNums;
  const ta=predTeamsForFifaNum(na,r32,cache),tb=predTeamsForFifaNum(nb,r32,cache);
  if(!ta||!tb)return cache[fifaNum]=null;
  const pa=S.predKO[na],pb=S.predKO[nb];
  if(!pa||!pb)return cache[fifaNum]=null;
  if(wsrc)return cache[fifaNum]={home:pa==='home'?ta.home:ta.away,away:pb==='home'?tb.home:tb.away};
  return cache[fifaNum]={home:pa==='home'?ta.away:ta.home,away:pb==='home'?tb.away:tb.home};
}

function rGlobalLb(){
  const eff=getEffectiveResults();
  const board=S.users.filter(u=>!u.isAdmin).map(u=>{
    const r=calcUser(u.id,S.tips,eff,S.mt,S.special,S.adminSpec,DS);return{...u,...r};
  }).sort((a,b)=>b.pts-a.pts||b.pf-a.pf||b.rgd-a.rgd||b.tipped-a.tipped);
  if(!board.length)return `<div class="empty"><div style="font-size:44px;margin-bottom:12px">🏅</div><p>Még nincs regisztrált játékos.</p></div>`;
  return board.map((u,i)=>{
    const exp=S.expandLb===`g_${u.id}`;
    return `<div class="lb-card" style="flex-direction:column;align-items:stretch;cursor:pointer" data-explb="g_${u.id}">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="lb-rank" style="color:${i===0?'#c9a84c':i===1?'silver':i===2?'#cd7f32':'#ccc'};font-size:${i<3?22:16}px">${i<3?medals[i]:`${i+1}.`}</div>
      <span style="font-size:20px">${u.av||'⚽'}</span>
      <div style="flex:1;min-width:0">
        <div class="lb-nm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.dn}</div>
        <div class="lb-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">⭐${u.pf} · 🎯${u.rgd} · ✓${u.res3} · ~${u.og} · ${u.tipped} ${t('tip_label')}</div>
      </div>
      <div class="lb-pts">${u.pts}<span style="font-size:13px;font-weight:400;color:#999">p</span></div>
      <span style="color:#bbb;font-size:11px">${exp?'▲':'▼'}</span>
    </div>
    ${exp?rUserHistory(u.id,DS):''}
  </div>`;
  }).join('');
}
