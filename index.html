function rCard(m){
  const uid=S.user.id,tip=S.tips[`${uid}_${m.id}`],res=S.results[m.id],ov=S.mt[m.id];
  const home=ov?.home||m.home,away=ov?.away||m.away;
  const koTime=S.ko[m.id]||m.koDefault,koDate=koTime?new Date(koTime):null;
  const lockMs=koDate?koDate.getTime()-5*60*1000:Infinity;
  const isKO=KO.includes(m.stage),isPast=Date.now()>=lockMs,locked=isPast||!!res||!!S.live[m.id],isTBD=m.tbd&&!ov;
  const koLbl=koDate?koDate.toLocaleTimeString(S.lang==='en'?'en-GB':'hu-HU',{hour:'2-digit',minute:'2-digit',timeZone:userTz()}).replace(/\./g,':'):'';  const pts=tip&&res?calcPts(tip,res,m.stage):null;
  const cat=tip&&res?ptsCat(tip,res,m.stage):null;
  const grpLbl=m.group?`${m.group} ${t('group_word')}`:(m.stage==='bronze'?'🥉 ':m.stage==='final'?'🏆 ':'')+stageLabel(m.stage);
  const wcId=S.wcIds?.[m.id];
  const apiVenue=wcId?S.wcVenues?.[wcId]?.venue:null;
  const venue=apiVenue||m.venue||null;
  const isToday=m.date===new Date().toLocaleDateString('en-CA',{timeZone:userTz()});
  const wx=venue?S.weather?.[m.id]:null;
  const mOdds=S.odds?.[m.id]||null;
  // Helyi idő
  const koDate2=koTime?new Date(koTime):null;
  const tz=venue?VENUE_TZ[venue]:null;
  const localTime=koDate2&&tz?koDate2.toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit',timeZone:tz}):'';
  const isDome=venue?!!VENUE_DOME[venue]:false;
  const saved=S.savedMsgs[m.id];
  const th=tip?.homeGoals??'',ta=tip?.awayGoals??'';
  const catLbl={p8:`⭐ ${t('perfect_full')}`,p5:`🎯 ${t('resultgd_full')}`,p3:`✓ ${t('outcome_full')}`,p1:`~ ${t('onegoal_full')}`,p0:'✗'};

  const live=!res?S.live[m.id]:null;
  const hl=S.highlightMatch===m.id;

  if(isTBD){
    const f=m.stage==='r32'?(r32Fixed()[m.id]||null):null;
    const hFix=f&&f.home?f.home:null, aFix=f&&f.away?f.away:null;
    const tbdSide=(fix,side)=>fix
      ?`<div class="mc-tbd-slot" style="display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-color)">${fImg(fix,24)} ${teamName(fix)} <span style="color:#2E9E5A;font-weight:800;font-size:13px">✓</span></div>`
      :`<div class="mc-tbd-slot">${slotLabel(m.id,side)}</div>`;
    return `<div class="mcard locked" id="match-${m.id}">
    <div class="mc-top" style="display:flex;align-items:center;gap:10px;padding:9px 14px;flex-wrap:wrap">
      <span style="font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#C8A84B;border:1px solid rgba(200,168,75,.4);padding:2px 8px">${grpLbl}</span>
      <span style="font-family:var(--font-bc);font-size:11px;letter-spacing:.5px;color:rgba(var(--ink-rgb),.45)">📅 ${fdLocal(m)}${localTime?` · ${localTime} ${S.lang==='en'?'(local)':'(helyi)'}`:''}${koLbl?` · 🇭🇺 ${koLbl}`:''}</span>
      ${isKO?'<span style="font-family:var(--font-bc);font-weight:700;font-size:10px;letter-spacing:.5px;background:rgba(var(--ink-rgb),.06);border:1px solid rgba(200,168,75,.4);color:#C8A84B;padding:2px 7px">×2 KO</span>':''}
      ${venue?`<span style="margin-left:auto;font-family:var(--font-bc);font-size:10px;letter-spacing:.3px;color:rgba(var(--ink-rgb),.4)">📍 ${venueFull(venue)}</span>`:''}
    </div>
    <div class="mc-tbd-main">
      ${tbdSide(hFix,0)}
      <div class="mc-tbd-vs">vs</div>
      ${tbdSide(aFix,1)}
    </div>
  </div>`;
  }

  return `<div class="mcard${locked?' locked':''}" id="match-${m.id}" style="${hl?'box-shadow:0 0 0 3px #c9a84c;':''}">
    <div class="mc-top" style="display:flex;align-items:center;gap:10px;padding:9px 14px;flex-wrap:wrap">
      <span style="font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#C8A84B;border:1px solid rgba(200,168,75,.4);padding:2px 8px">${grpLbl}</span>
      <span style="font-family:var(--font-bc);font-size:11px;letter-spacing:.5px;color:rgba(var(--ink-rgb),.45)">📅 ${fdLocal(m)}${localTime?` · ${localTime} ${S.lang==='en'?'(local)':'(helyi)'}`:''}${koLbl?` · 🇭🇺 ${koLbl}`:''}</span>
      ${live?`<span style="background:#CC2929;color:#fff;font-family:var(--font-bc);font-weight:800;font-size:10px;letter-spacing:1.5px;padding:2px 7px;display:inline-flex;align-items:center;gap:4px;animation:pulse 1.5s infinite"><span style="width:5px;height:5px;border-radius:50%;background:#fff"></span>${t('live_badge')}${live.minute!==undefined&&live.minute!==''?' '+live.minute:''}</span>`:''}
      ${isKO?'<span style="font-family:var(--font-bc);font-weight:700;font-size:10px;letter-spacing:.5px;background:rgba(var(--ink-rgb),.06);border:1px solid rgba(200,168,75,.4);color:#C8A84B;padding:2px 7px">×2 KO</span>':''}
      <span style="margin-left:auto;font-family:var(--font-bc);font-size:10px;letter-spacing:.3px;color:rgba(var(--ink-rgb),.4);display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">${venue?`<span>📍 ${venueFull(venue)} · <span style="color:${isDome?'#6fa3ff':'rgba(var(--ink-rgb),.4)'}">${isDome?'🏛️ fedett':'🏟️ nyitott'}</span></span>`:''}${wx?`<span>${wx.icon} ${wx.temp}°C${wx.precip>20?` · 💧${wx.precip}%`:''}</span>`:''}</span>
    </div>
    <div class="mc-main" style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:18px 18px 12px">
      <div style="display:flex;align-items:center;gap:12px;min-width:0">${fImg(home,38)}<span class="mc-tname" style="font-family:var(--font-bc);font-weight:700;font-size:18px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-color);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${S.favTeam&&S.favTeam===home?'⭐ ':''}${teamName(home)}</span></div>
      <div style="text-align:center">
        ${res?`<div class="mc-score" style="font-family:var(--font-bc);font-weight:900;font-size:42px;line-height:1;color:var(--text-color);display:flex;align-items:center;gap:8px;justify-content:center"><span>${res.homeGoals}</span><span style="color:rgba(var(--ink-rgb),.2);font-weight:300;font-size:30px">:</span><span>${res.awayGoals}</span></div><div style="font-family:var(--font-bc);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(var(--ink-rgb),.35);margin-top:5px">${S.lang==='en'?'Result':'Eredmény'}</div>`:live?`<div class="mc-score" style="font-family:var(--font-bc);font-weight:900;font-size:42px;line-height:1;color:#CC2929;display:flex;align-items:center;gap:8px;justify-content:center"><span>${live.h}</span><span style="color:rgba(var(--ink-rgb),.25);font-weight:300;font-size:30px">:</span><span>${live.a}</span></div><div style="font-family:var(--font-bc);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(var(--ink-rgb),.35);margin-top:5px">${S.lang==='en'?'Live':'Élő'}</div>`:`<div class="sinputs" style="justify-content:center">
          <input type="text" inputmode="numeric" class="sbox${(th!=='')?(' filled'):''}" id="sh_${m.id}" value="${th}" ${res?'disabled':isPast?'disabled':''} placeholder="–">
          <span class="sdash">–</span>
          <input type="text" inputmode="numeric" class="sbox${(ta!=='')?(' filled'):''}" id="sa_${m.id}" value="${ta}" ${res?'disabled':isPast?'disabled':''} placeholder="–">
        </div>`}
        <div class="mc-saved" id="sv_${m.id}" style="text-align:center">${saved?t('saved'):''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;justify-content:flex-end;min-width:0"><span class="mc-tname" style="font-family:var(--font-bc);font-weight:700;font-size:18px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-color);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${teamName(away)}${S.favTeam&&S.favTeam===away?' ⭐':''}</span>${fImg(away,38)}</div>
    </div>
    ${((res&&tip)||(live&&tip))?(()=>{
      const r=res||{homeGoals:live.h,awayGoals:live.a};
      const p=calcPts(tip,r,m.stage),c=ptsCat(tip,r,m.stage);
      return `<div class="mc-tipsum"><span class="mc-tipsum-lbl">${t('your_tip')} ${tip.homeGoals}–${tip.awayGoals}</span><span class="ptag ${c||'p0'}">${catLbl[c]||''} ${p}p${isKO?' (×2)':''}${live?' · '+t('live_badge'):''}</span></div>`;
    })():res?`<div class="mc-tipsum mc-tipsum-none">${t('no_tip_match')}</div>`:''}
    ${!res&&!isPast&&!live&&!isTBD?`<div style="text-align:center;padding:0 16px 14px"><button id="stb_${m.id}" data-mid="${m.id}" style="font-family:var(--font-bc);font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;background:#C8A84B;color:#0A0A0A;border:none;padding:9px 28px;cursor:pointer">${t('save_tip')}</button></div>`:''}
    ${mOdds?`<div class="mc-odds"><span class="mc-odds-pill">1 ${mOdds.h}</span><span class="mc-odds-pill mc-odds-draw">X ${mOdds.d||'–'}</span><span class="mc-odds-pill">2 ${mOdds.a}</span></div>`:''}
    ${(()=>{
      const allU=S.users.filter(u=>!u.isAdmin);
      const tipsCount=allU.map(u=>S.tips[`${u.id}_${m.id}`]).filter(Boolean).length;
      const koMs2=koDate?koDate.getTime():0;
      const luSoon=koMs2&&(koMs2-Date.now()<90*60*1000);
      const showLU=!isTBD&&(!!live||!!res||isPast||!!luSoon);
      const luData=`${encodeURIComponent(home)}|${encodeURIComponent(away)}|${m.date||''}`;
      const btns=[];
      if(tipsCount>=2)btns.push(`<button class="mc-actbtn" data-exptips="${m.id}">👥 ${S.expandTips===m.id?'Bezár ▴':'Mindenki tippje ▾'}</button>`);
      if(showLU){
        btns.push(`<button class="mc-actbtn" data-explineup="${m.id}" data-lu="${luData}">${S.expandLineup===m.id?'Bezár ▴':'👕 Felállás'}</button>`);
        btns.push(`<button class="mc-actbtn" data-expstats="${m.id}" data-lu="${luData}">${S.expandStats===m.id?'Bezár ▴':'📊 Statisztika'}</button>`);
      }
      return btns.length?`<div class="mc-actions">${btns.join('')}</div>`:'';
    })()}
    ${(()=>{
      const allU=S.users.filter(u=>!u.isAdmin);
      const tips=allU.map(u=>S.tips[`${u.id}_${m.id}`]).filter(Boolean);
      if(tips.length<2)return '';
      const hW=tips.filter(t=>t.homeGoals>t.awayGoals).length;
      const dr=tips.filter(t=>t.homeGoals===t.awayGoals).length;
      const aW=tips.filter(t=>t.homeGoals<t.awayGoals).length;
      const tot=tips.length;
      const pct=n=>Math.round(n/tot*100);
      const scoreMap={};
      tips.forEach(t=>{const k=`${t.homeGoals}-${t.awayGoals}`;scoreMap[k]=(scoreMap[k]||0)+1;});
      const topScore=Object.entries(scoreMap).sort((a,b)=>b[1]-a[1])[0];
      const isExp=S.expandTips===m.id;
      const myLgs=S.leagues.filter(l=>l.members?.includes(S.user.id));
      const filterLg=S.tipFilterLg||'all';
      const filteredUsers=filterLg==='all'?allU:allU.filter(u=>myLgs.find(l=>l.id===filterLg)?.members?.includes(u.id));
      const expHtml=isExp?`<div style="padding:6px 14px 10px;border-top:1px solid rgba(var(--ink-rgb),.06)">
        ${myLgs.length>1?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
          <button data-tipfilt="all" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid ${filterLg==='all'?'var(--c-gold)':'rgba(var(--ink-rgb),.15)'};background:${filterLg==='all'?'rgba(212,175,55,.15)':'none'};color:${filterLg==='all'?'var(--c-gold)':'rgba(var(--ink-rgb),.5)'};cursor:pointer">Mindenki</button>
          ${myLgs.map(l=>`<button data-tipfilt="${l.id}" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid ${filterLg===l.id?'var(--c-gold)':'rgba(var(--ink-rgb),.15)'};background:${filterLg===l.id?'rgba(212,175,55,.15)':'none'};color:${filterLg===l.id?'var(--c-gold)':'rgba(var(--ink-rgb),.5)'};cursor:pointer">${l.name}</button>`).join('')}
        </div>`:''}
        ${filteredUsers.sort((a,b)=>a.dn.localeCompare(b.dn,'hu')).map(u=>{
          const tip=S.tips[`${u.id}_${m.id}`];
          const r=getEffectiveResults()[m.id];
          const pts=tip&&r?calcPts(tip,r,m.stage,DS):null;
          const cat=tip&&r?ptsCat(tip,r,m.stage,DS):null;
          const catC={p8:'#c9a84c',p5:'#4a9eff',p3:'#00b050',p1:'#a78bfa',p0:'#e8212a'};
          return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(var(--ink-rgb),.04);font-size:12px">
            <span style="font-size:14px">${u.av||'⚽'}</span>
            <span style="flex:1;color:rgba(var(--ink-rgb),.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.dn}</span>
            ${tip?`<span style="font-weight:700;color:var(--text-color)">${tip.homeGoals}–${tip.awayGoals}</span>
            ${pts!=null?`<span style="font-size:11px;font-weight:700;color:${catC[cat]||'#888'};min-width:28px;text-align:right">${pts}p</span>`:''}`:
            `<span style="color:rgba(var(--ink-rgb),.25);font-size:11px">nincs tipp</span>`}
          </div>`;
        }).join('')}
      </div>`:'';
      return `<div>
        ${(locked||isExp)?`<div style="padding:0 14px 6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:10px;color:rgba(var(--ink-rgb),.35);font-weight:600">👥 ${tot} tipp</span>
          <div style="display:flex;gap:2px;flex:1;min-width:100px;height:6px;border-radius:3px;overflow:hidden">${hW?`<div style="width:${pct(hW)}%;background:#4a9eff"></div>`:''}${dr?`<div style="width:${pct(dr)}%;background:#c9a84c"></div>`:''}${aW?`<div style="width:${pct(aW)}%;background:#e8212a"></div>`:''}</div>
          <span style="font-size:10px;color:#4a9eff">${pct(hW)}%</span><span style="font-size:10px;color:#c9a84c">${pct(dr)}%</span><span style="font-size:10px;color:#e8212a">${pct(aW)}%</span>
          ${topScore&&topScore[1]>1?`<span style="font-size:10px;color:rgba(var(--ink-rgb),.4)">· legtöbb: <b>${topScore[0]}</b></span>`:''}
        </div>`:''}
        ${expHtml}
      </div>`;
    })()}
    ${(()=>{
      const koMs3=koDate?koDate.getTime():0;
      const showLU=!isTBD&&(!!live||!!res||isPast||(koMs3&&(koMs3-Date.now()<90*60*1000)));
      if(!showLU)return '';
      const isExp=S.expandLineup===m.id;
      const lu=S.lineups?.[m.id];
      const luEmpty=lu&&lu.empty;
      const expHtml=isExp&&lu&&!luEmpty?`<div style="padding:8px 14px 12px;border-top:1px solid rgba(var(--ink-rgb),.06)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${['home','away'].map(side=>{
            const starters=lu.startingXI?.[side]||[];
            const subs=lu.substitutes?.[side]||[];
            const coach=lu.coaches?.[side];
            const formation=lu.formation?.[side]||'';
            const teamName=side==='home'?home:away;
            return `<div>
              <div style="font-size:11px;font-weight:700;color:var(--c-gold);margin-bottom:6px">${teamName} ${formation?`<span style="font-weight:400;color:rgba(var(--ink-rgb),.4)">${formation}</span>`:''}</div>
              ${starters.map(p=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;padding:2px 0;border-bottom:1px solid rgba(var(--ink-rgb),.04)">
                <span style="color:rgba(var(--ink-rgb),.3);min-width:16px;font-size:10px">${p.number||''}</span>
                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||''}</span>
                ${p.rating?`<span style="font-size:10px;color:${p.rating>=7.5?'#00b050':p.rating>=6?'#c9a84c':'#e63329'};font-weight:700">${p.rating}</span>`:''}
                ${p.motm?'<span style="font-size:10px">⭐</span>':''}
              </div>`).join('')}
              ${subs.length?`<div style="font-size:10px;color:rgba(var(--ink-rgb),.3);margin-top:5px;margin-bottom:3px">Cserék</div>
              ${subs.map(p=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;padding:1px 0;color:rgba(var(--ink-rgb),.55)">
                <span style="color:rgba(var(--ink-rgb),.25);min-width:16px;font-size:10px">${p.number||''}</span>
                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||''}</span>
              </div>`).join('')}`:''}
              ${coach?`<div style="font-size:10px;color:rgba(var(--ink-rgb),.4);margin-top:5px">👔 ${coach.name}</div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`:isExp&&luEmpty?`<div style="padding:10px 14px;text-align:center;font-size:12px;color:rgba(var(--ink-rgb),.4)">${S.lang==='en'?'No lineup available yet':'Nincs még felállás'}</div>`:isExp?`<div style="padding:10px 14px;text-align:center;font-size:12px;color:rgba(var(--ink-rgb),.4)">Betöltés...</div>`:'';
      return `<div>
        ${expHtml}
        ${(()=>{
          if(S.expandStats!==m.id)return '';
          const st=S.stats?.[m.id];
          if(!st)return `<div style="padding:10px 14px;text-align:center;font-size:12px;color:rgba(var(--ink-rgb),.4)">Betöltés...</div>`;
          if(st.empty)return `<div style="padding:10px 14px;text-align:center;font-size:12px;color:rgba(var(--ink-rgb),.4)">${S.lang==='en'?'No stats available yet':'Nincs még statisztika'}</div>`;
          const STAT_HU={
            'Expected goals (xG)':'Várható gólok (xG)',
            'Ball possession':'Labdabirtoklás',
            'Total shots':'Összes lövés',
            'Shots on target':'Kapura lövés',
            'Shots off target':'Kapu mellé',
            'Blocked shots':'Blokkolt lövés',
            'Corner kicks':'Szögletek',
            'Offsides':'Lesek',
            'Fouls':'Szabálytalanságok',
            'Yellow cards':'Sárga lapok',
            'Red cards':'Piros lapok',
            'Free kicks':'Szabadrúgások',
            'Goal kicks':'Kapusrúgások',
            'Throw-ins':'Bedobások',
            'Throw ins':'Bedobások',
            'Passes':'Passz',
            'Long passes':'Hosszú passz',
            'Crosses':'Centerezések',
            'Dribbles':'Cselezések',
            'Tackles':'Szerelések',
            'Interceptions':'Elfogások',
            'Clearances':'Mentések',
            'Saves':'Védések',
            'Goalkeeper saves':'Kapusvédések',
            'Goals prevented':'Megakadályozott gól',
            'High claims':'Magas labda fogás',
            'Punches':'Kiütések',
            'Aerials won':'Légi párbaj nyert',
            'Pass accuracy':'Passz pontosság',
            'Shot accuracy':'Lövés pontosság',
            'Dribble success':'Csel siker',
            'Tackle success':'Szerelés siker',
            'Big chances':'Nagy helyzetek',
            'xG on target (xGOT)':'Kapura tartó xG (xGOT)',
            'xGOT faced':'Kapott xGOT',
            'Shots inside the box':'Lövés a 16-oson belül',
            'Shots outside the box':'Lövés a 16-oson kívül',
            'Hit the woodwork':'Kapufa/keresztléc',
            'Headed goals':'Fejes gól',
            'Touches in opposition box':'Érintés az ellenfél 16-osán',
            'Accurate through passes':'Pontos áttörő passz',
            'Passes in final third':'Passz az utolsó harmadban',
            'Expected assists (xA)':'Várható gólpassz (xA)',
            'Duels won':'Párbaj nyerve',
            'Errors leading to shot':'Hibából kapott lövés',
            'Errors leading to goal':'Hibából kapott gól',
          };
          const GRPHU={'Top stats':'Főbb statisztikák','Shots':'Lövések','Attack':'Támadás','Passes':'Passz','Defense':'Védekezés','Goalkeeping':'Kapus'};
          const matchSection=st.find(s=>s.section==='Match')||st[0];
          if(!matchSection)return '';
          return `<div style="padding:8px 14px 12px;border-top:1px solid rgba(var(--ink-rgb),.06)">
            ${matchSection.groups.map(g=>`
              <div style="font-size:10px;font-weight:700;color:rgba(var(--ink-rgb),.35);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px">${S.lang==='hu'?(GRPHU[g.group]||g.group):g.group}</div>
              ${g.stats.map(s=>{
                const label=S.lang==='hu'?(STAT_HU[s.name]||s.name):s.name;
                const hVal=parseFloat(s.home)||0,aVal=parseFloat(s.away)||0,tot=hVal+aVal;
                const hPct=tot>0?Math.round(hVal/tot*100):50;

function rGroupForecast(){
  const allTips=S.tips,users=S.users.filter(u=>!u.isAdmin);
  if(!users.length)return '';
  // Melyik csapatot tippelik legjobban továbbjutni csoportonként
  const forecastData=GD.map(g=>{
    const counts={};
    g.teams.forEach(tm=>{counts[tm]={top2:0,total:0};});
    users.forEach(u=>{
      const uid=u.id;
      g.teams.forEach((tm,pos)=>{
        // Számoljuk minden meccsüket a csoportban
        const gMs=ALL.filter(m=>m.group===g.id&&(m.home===tm||m.away===tm));
        let pts=0,played=0;
        gMs.forEach(m=>{
          const tip=allTips[`${uid}_${m.id}`];
          if(!tip)return;
          played++;
          const isHome=m.home===tm;
          const gs=isHome?tip.homeGoals:tip.awayGoals,gc=isHome?tip.awayGoals:tip.homeGoals;
          if(gs>gc)pts+=3;else if(gs===gc)pts+=1;
        });
        if(played>0)counts[tm].total++;
        counts[tm]._pts=(counts[tm]._pts||0)+pts;
      });
    });
    const sorted=g.teams.slice().sort((a,b)=>(counts[b]._pts||0)-(counts[a]._pts||0));
    return{g:g.id,sorted,counts};
  });
  return `<div class="std-card" style="margin-top:16px">
    <div class="std-head"><span class="std-glbl">🔮 Csoport előrejelzés</span><span class="std-t" style="font-size:11px;color:rgba(var(--ink-rgb),.4)">(tippek alapján)</span></div>
    <div class="fcast-grid">
      ${forecastData.map(({g,sorted,counts})=>`
        <div style="min-width:0;background:rgba(var(--ink-rgb),.04);border-radius:10px;padding:9px 8px">
          <div style="font-size:11px;font-weight:700;color:var(--c-gold);margin-bottom:7px">${g}. csoport</div>
          ${sorted.map((tm,i)=>{
            const bar=Math.round((counts[tm]._pts||0)/Math.max(...sorted.map(t=>counts[t]._pts||1))*100);
            return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span class="adot ${i<2?'g':i===2?'o':'r'}" style="flex-shrink:0"></span>
              ${fImg(tm,14)}
              <span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${teamName(tm)}</span>
              <div style="width:30px;height:4px;background:rgba(var(--ink-rgb),.1);border-radius:2px;flex-shrink:0"><div style="width:${bar}%;height:100%;background:${i<2?'#00b050':i===2?'#c9a84c':'#e8212a'};border-radius:2px"></div></div>
            </div>`;
          }).join('')}
        </div>`).join('')}
    </div>
  </div>`;
}

async function doSelfDelete(){
  const tok=localStorage.getItem('wc_tok');
  if(!tok){SS({delErr:S.lang==='en'?'You must be logged in.':'Be kell jelentkezned.'});return;}
  SS({delLoad:true,delErr:null});
  try{
    const r=await fetch(AUTH_BASE+'/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tok,action:'selfdelete'})});
    const d=await r.json();
    if(!d.ok){SS({delLoad:false,delErr:(S.lang==='en'?'Deletion failed: ':'Törlés sikertelen: ')+(d.error||'?')});return;}
    logAction('delete_account','');
    localStorage.removeItem('wc_tok');localStorage.removeItem('wc_s');
    location.reload();
  }catch(e){SS({delLoad:false,delErr:(S.lang==='en'?'Network error: ':'Hálózati hiba: ')+e.message});}
}

async function shareBracketImage(useProj){

  try{if(document.fonts&&document.fonts.ready)await document.fonts.ready;}catch(e){}
  const mode=S.projMode==='final'?'final':'live';
  let proj=null;
  if(useProj){
    const results=mode==='final'?{...S.results}:getEffectiveResults();
    proj=projectR32(results);
    if(!proj){alert(en?'Not enough data to project yet.':'Még nincs elég adat a projekcióhoz.');return;}
  }
  const BC='"Barlow Condensed",sans-serif';
  const boxW=250,boxH=72,vGap=22,gap=66,padX=60,headerH=150,footerH=84,sc=2;
  const rounds=[
    [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87],

  const contentBottom=yc[0][yc[0].length-1]+boxH/2;
  const bronzeY=yc[4][0]+170;
  const W=padX*2+5*boxW+4*gap;
  const H=Math.max(contentBottom,bronzeY+boxH/2)+footerH;
  const cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;
  const x=cv.getContext('2d');x.scale(sc,sc);
  x.fillStyle='#0A0A0A';x.fillRect(0,0,W,H);
  x.fillStyle='#C8A84B';x.fillRect(0,0,W,9);
  x.textBaseline='alphabetic';x.textAlign='left';
  x.fillStyle='#C8A84B';x.font='700 40px '+BC;

  const clip=(s,max)=>{let t=String(s);while(x.measureText(t).width>max&&t.length>2)t=t.slice(0,-2);return t===String(s)?t:t+'…';};

    return {fn,h,a,hName:isTBD?null:home,aName:isTBD?null:away,hs:res?String(res.homeGoals):'',as:res?String(res.awayGoals):'',win,isTBD,hSt,aSt};

  x.strokeStyle='rgba(212,175,55,.30)';x.lineWidth=1.5;

    try{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){}
  },'image/png');

function buildRecapText(){
  const uid=S.user.id,en=S.lang==='en';
  const eff=getEffectiveResults();
  const today=new Date().toLocaleDateString('en-CA',{timeZone:userTz()});
  const todayMs=ALL.filter(m=>{const d=(S.ko[m.id]&&new Date(S.ko[m.id]).toLocaleDateString('en-CA',{timeZone:userTz()}))||m.date;return d===today;});
  let pts=0,exact=0,n=0;
  todayMs.forEach(m=>{const tip=S.tips[`${uid}_${m.id}`],r=eff[m.id];if(!tip||!r||r.live)return;pts+=calcPts(tip,r,m.stage)||0;if(ptsCat(tip,r,m.stage)==='p8')exact++;n++;});
  const myNow=calcUser(uid,S.tips,eff,S.mt,S.special,S.adminSpec,DS).pts;let rank=1;
  S.users.forEach(u=>{if(u.id===uid||u.isAdmin)return;if(calcUser(u.id,S.tips,eff,S.mt,S.special,S.adminSpec,DS).pts>myNow)rank++;});
  if(!n)return en?`📋 No evaluated matches for me today yet. Overall rank: ${rank}.`:`📋 Ma még nincs értékelt meccsem. Összesített helyezésem: ${rank}.`;
  return `📋 ${en?'My day':'A napom'} — +${pts}p · ${exact}⭐ · ${en?'rank':'helyezés'} ${rank}.`;
}

function clientProfanity(text){
  const bad=['fasz','geci','picsa','kurva','buzi','szar','baszd','baszott','köcsög','segg','ribanc','kurvaanyád','nigger','néger','fuck','shit','bitch','asshole','cunt','bastard','slut','whore','faggot','retard','nigga'];
  const n=(text||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const toks=n.split(/[^a-z]+/).filter(Boolean);
  return bad.some(w=>{const bw=w.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');return toks.includes(bw);});
}

function resolveR32Teams(results){
  const groupMatches=ALL.filter(m=>m.stage==='group');
  if(groupMatches.some(m=>!results[m.id]))return null;
  const standings={};
  GD.forEach(g=>{standings[g.id]=calcStd(g.id,results,null);});
  const thirds=GD.map(g=>({grp:g.id,...standings[g.id][2]}));
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const best8=thirds.slice(0,8).map(x=>x.grp).sort();
  const comboKey=best8.join('');
  const row=ANNEX_C[comboKey];
  if(!row)return null;
  const hostOrder=['A','B','D','E','G','I','K','L'];
  const thirdFor={};
  hostOrder.forEach((h,i)=>{thirdFor[h]=row[i];});
  const out={};
  for(let fifaNum=73;fifaNum<=88;fifaNum++){
    const[hLbl,aLbl]=R32_SLOTS[fifaNum];
    const resolveSide=(lbl)=>{
      const m1=lbl.match(/^([12])([A-L])$/);
      if(m1)return m1[1]==='1'?standings[m1[2]][0].n:standings[m1[2]][1].n;
      return null;
    };
    let home=resolveSide(hLbl),away=resolveSide(aLbl);
    if(home===null){const hostLetter=aLbl.match(/^[12]([A-L])$/)[1];home=standings[thirdFor[hostLetter]][2].n;}
    if(away===null){const hostLetter=hLbl.match(/^[12]([A-L])$/)[1];away=standings[thirdFor[hostLetter]][2].n;}
    out[fifaNum]={home,away};
  }
  return out;
}
// Csoport-helyzet: ki van élő meccsben, lezárult-e a csoport, és matematikai bebiztosítás.
function groupSituation(results){
  const sit={};
  GD.forEach(g=>{
    const ms=ALL.filter(m=>m.group===g.id);
    const teams={}; g.teams.forEach(n=>teams[n]={pts:0,rem:0});
    let played=0,live=false;
    ms.forEach(m=>{
      const r=results[m.id];
      if(!r){ if(teams[m.home])teams[m.home].rem++; if(teams[m.away])teams[m.away].rem++; return; }
      played++; if(r.live)live=true;
      const rh=parseInt(r.homeGoals),ra=parseInt(r.awayGoals);
      if(teams[m.home]&&teams[m.away]){
        if(rh>ra)teams[m.home].pts+=3; else if(rh===ra){teams[m.home].pts++;teams[m.away].pts++;} else teams[m.away].pts+=3;
      }
    });
    sit[g.id]={finished:played===ms.length, live, teams, names:g.teams.slice()};
  });
  return sit;
}
function clinchPos(sit,gid,name,pos){ // pos: 0 = csoportgyőztes, 1 = 2. hely
  const s=sit[gid]; if(!s)return false;
  if(s.finished)return true;
  const T=s.teams[name]; if(!T)return false;
  const tmin=T.pts, tmax=T.pts+3*T.rem;
  const others=s.names.filter(n=>n!==name).map(n=>s.teams[n]);
  if(pos===0) return others.every(u=>(u.pts+3*u.rem)<tmin); // senki sem érheti el a jelenlegi pontját -> biztos 1.
  const canReach=others.filter(u=>(u.pts+3*u.rem)>=tmin).length; // legfeljebb 1 lehet felette
  const surelyAbove=others.some(u=>u.pts>tmax);                  // valaki biztosan felette -> nem lehet 1.
  return canReach<=1 && surelyAbove;                             // -> biztos 2.
}

// Menetrend-tudatos bebiztositas: felsorolja a hatralevo meccsek W/D/L kimeneteleit es minden
// forgatokonyvben ellenorzi a helyezest. Konzervativ: pont-holtversenyt rontonak veszi.
let _gcRef=null,_gcVal=null;
function groupClinch(results){
  if(_gcRef===results)return _gcVal;
  _gcRef=results; _gcVal=computeGroupClinch(results||{}); return _gcVal;
}
function computeGroupClinch(results){
  const out={};
  GD.forEach(g=>{
    const names=g.teams, ms=ALL.filter(m=>m.group===g.id);
    const base={}; names.forEach(n=>base[n]=0);
    const rem=[]; let live=false;
    ms.forEach(m=>{const r=results[m.id];
      if(r){ if(r.live)live=true; const rh=parseInt(r.homeGoals),ra=parseInt(r.awayGoals);
        if(base[m.home]!=null&&base[m.away]!=null){ if(rh>ra)base[m.home]+=3; else if(rh===ra){base[m.home]++;base[m.away]++;} else base[m.away]+=3; } }
      else rem.push(m);
    });
    const finished=rem.length===0;
    if(finished){
      // Lezart csoport: a holtverseny mar eldolt (gk/lott gol) -> a vegleges sorrend szamit.
      const std=calcStd(g.id,results,null);
      const res={}; names.forEach(n=>{res[n]={first:false,adv:false,second:false};});
      if(std[0]&&res[std[0].n])res[std[0].n]={first:true,adv:true,second:false};
      if(std[1]&&res[std[1].n])res[std[1].n]={first:false,adv:true,second:true};
      out[g.id]={res,finished:true,live}; return;
    }
    const fl={},ad={},ab={}; names.forEach(n=>{fl[n]=true;ad[n]=true;ab[n]=true;}); // firstOk(sole 1st), advOk(top-2), aboveAlways(sosem 1.)
    const k=rem.length;
    if(k>5){ names.forEach(n=>{fl[n]=false;ad[n]=false;ab[n]=false;}); }
    else{
      const total=Math.pow(3,k);
      for(let mask=0;mask<total;mask++){
        const pts={...base}; let xx=mask;
        for(let i=0;i<k;i++){ const o=xx%3; xx=(xx-o)/3; const m=rem[i];
          if(o===0)pts[m.home]+=3; else if(o===1){pts[m.home]++;pts[m.away]++;} else pts[m.away]+=3; }
        names.forEach(n=>{ let ge=0,gt=0; names.forEach(u=>{ if(u===n)return; if(pts[u]>=pts[n])ge++; if(pts[u]>pts[n])gt++; });
          if(ge>0)fl[n]=false; if(ge>1)ad[n]=false; if(gt===0)ab[n]=false; });
      }
    }
    const res={}; names.forEach(n=>{res[n]={first:fl[n],adv:ad[n],second:ad[n]&&ab[n]};});
    out[g.id]={res,finished,live};
  });
  return out;
}
function teamClinch(gid,name){ const g=groupClinch(S.results)[gid]; return (g&&g.res[name])||{first:false,adv:false,second:false}; }
// Projekcio: a jelenlegi (reszleges) allas alapjan kiszamolja a 32 koros parositasokat.
function projectR32(results){
  const standings={};
  GD.forEach(g=>{standings[g.id]=calcStd(g.id,results,null);});
  const thirds=GD.map(g=>({grp:g.id,...standings[g.id][2]}));
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const best8=thirds.slice(0,8).map(x=>x.grp).sort();
  const comboKey=best8.join('');
  const row=ANNEX_C[comboKey];
  if(!row)return null;
  const hostOrder=['A','B','D','E','G','I','K','L'];
  const thirdFor={};
  hostOrder.forEach((h,i)=>{thirdFor[h]=row[i];});
  const sit=groupSituation(results);
  const gc2=groupClinch(results);
  const allFin=GD.every(g=>sit[g.id].finished);
  const statusFor=(grp,pos,name)=>{
    if(!grp)return '';
    let sec;
    if(pos===2) sec=allFin; else { const c=gc2[grp].res[name]||{}; sec=pos===0?!!c.first:!!c.second; }
    const lv=sit[grp]&&sit[grp].live&&!sec;
    return sec?'secured':(lv?'live':'');
  };
  const out={};
  for(let fifaNum=73;fifaNum<=88;fifaNum++){
    const[hLbl,aLbl]=R32_SLOTS[fifaNum];
    const resolveSide=(lbl)=>{
      const m1=lbl.match(/^([12])([A-L])$/);
      if(m1)return m1[1]==='1'?standings[m1[2]][0].n:standings[m1[2]][1].n;
      return null;
    };
    let home=resolveSide(hLbl),away=resolveSide(aLbl);
    let hGrp=null,hPos,aGrp=null,aPos;
    const hm=hLbl.match(/^([12])([A-L])$/); if(hm){hGrp=hm[2];hPos=hm[1]==='1'?0:1;} else hPos=2;
    const am=aLbl.match(/^([12])([A-L])$/); if(am){aGrp=am[2];aPos=am[1]==='1'?0:1;} else aPos=2;
    if(home===null){const hl=aLbl.match(/^[12]([A-L])$/)[1];home=standings[thirdFor[hl]][2].n;hGrp=thirdFor[hl];hPos=2;}
    if(away===null){const hl=hLbl.match(/^[12]([A-L])$/)[1];away=standings[thirdFor[hl]][2].n;aGrp=thirdFor[hl];aPos=2;}
    out[fifaNum]={home,away,hLbl,aLbl,hStatus:statusFor(hGrp,hPos,home),aStatus:statusFor(aGrp,aPos,away)};
  }
  return {out,best8,thirdFor,standings,sit,allFin};
}
// A mar BIZTOS (matematikailag eldolt) R32 oldalak a vegleges (lezart) eredmenyek alapjan.
// 1X/2X slot: ha a csoportgyoztes/2. hely bebiztositva. 3. helyezett slot: csak ha minden csoport lezarult.
let _r32FixRef=null,_r32FixVal=null;
function r32Fixed(){
  if(_r32FixRef===S.results)return _r32FixVal||{};
  _r32FixRef=S.results; _r32FixVal=computeR32Fixed(); return _r32FixVal;
}
function computeR32Fixed(){
  const res=S.results||{};
  const gc=groupClinch(res);
  const std={}; GD.forEach(g=>{std[g.id]=calcStd(g.id,res,null);});
  const allFin=GD.every(g=>gc[g.id].finished);
  let thirdFor=null;
  if(allFin){const pj=projectR32(res);if(pj)thirdFor=pj.thirdFor;}
  const out={};
  for(let fn=73;fn<=88;fn++){
    const sl=R32_SLOTS[fn],hL=sl[0],aL=sl[1];
    const sideTeam=(lbl,otherLbl)=>{
      const mm=lbl.match(/^([12])([A-L])$/);
      if(mm){const g=mm[2],pos=mm[1]==='1'?0:1;const team=std[g][pos]&&std[g][pos].n; if(!team)return null; const c=gc[g].res[team]||{}; return (pos===0?c.first:c.second)?team:null;}
      if(allFin&&thirdFor){const host=otherLbl.match(/^[12]([A-L])$/)[1];const tg=thirdFor[host];return std[tg]&&std[tg][2]?std[tg][2].n:null;}
      return null;
    };
    const home=sideTeam(hL,aL),away=sideTeam(aL,hL);
    if(home||away)out[fn]={home,away};
  }
  return out;
}

function koTeams(m){

  if((!home||!away)&&m.stage==='r32'){const f=r32Fixed()[m.id];if(f){if(!home)home=f.home||null;if(!away)away=f.away||null;}}
  return {home,away};

function rBracketTree(){
  const BH=60,MW=172,sc='rgba(212,175,55,0.35)',sw=1.5;
  const _cw=(document.querySelector('.bc-center')?.clientWidth||document.getElementById('root')?.clientWidth||window.innerWidth)-44;
  const CW=Math.max(16,Math.min(340,Math.round((_cw-5*MW)/4)));
  const N=8,HC=BH+28,H=N*HC; // egy fél magassága (a +28 térköz, hogy a kártya tartalma elférjen, ne csússzon egymásra)
  const TH=H*2; // teljes magasság
  function cy(round,i){return (i*2+1)*Math.pow(2,round)*HC/2;}

  const halves=[
    {r32:[74,77,73,75,83,84,81,82],r16:[89,90,93,94],qf:[97,98],sf:101},
    {r32:[76,78,79,80,86,88,85,87],r16:[91,92,95,96],qf:[99,100],sf:102},
  ];

  const hdr=(l,w)=>`<div style="width:${w}px;flex-shrink:0;text-align:center;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:var(--c-gold);text-transform:uppercase;letter-spacing:.4px;padding-bottom:5px">${l}</div>`;
  const sp=w=>`<div style="width:${w}px;flex-shrink:0"></div>`;
  const hdrRow=`<div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:4px">
    ${hdr(t('bracket_round32'),MW)}${sp(CW)}${hdr(t('bracket_round16'),MW)}${sp(CW)}${hdr(t('bracket_qf'),MW)}${sp(CW)}${hdr(t('bracket_sf'),MW)}${sp(CW)}${hdr('🥉 '+t('bracket_bronze')+' · 🏆 '+t('bracket_final'),MW)}
  </div>`;

  function col(fns,round,yOffset=0){
    return `<div style="position:relative;width:${MW}px;flex-shrink:0;height:${H}px">
      ${fns.map((fn,i)=>wkBox(fn,cy(round,i),BH,MW,false)).join('')}</div>`;
  }
  function conn(fromFns,toFns,round){
    const lns=[];
    toFns.forEach((_,ti)=>{
      const tCy=cy(round+1,ti),f1=cy(round,ti*2),f2=cy(round,ti*2+1),xm=CW/2;
      lns.push(
        `<line x1="0" y1="${f1}" x2="${xm}" y2="${f1}" stroke="${sc}" stroke-width="${sw}"/>`,
        `<line x1="0" y1="${f2}" x2="${xm}" y2="${f2}" stroke="${sc}" stroke-width="${sw}"/>`,
        `<line x1="${xm}" y1="${f1}" x2="${xm}" y2="${f2}" stroke="${sc}" stroke-width="${sw}"/>`,
        `<line x1="${xm}" y1="${tCy}" x2="${CW}" y2="${tCy}" stroke="${sc}" stroke-width="${sw}"/>`
      );
    });
    return `<div style="position:relative;width:${CW}px;flex-shrink:0;height:${H}px">
      <svg width="${CW}" height="${H}" style="overflow:visible">${lns.join('')}</svg></div>`;
  }

  // SF-ek Y-pozíciói az összesített (TH) koordinátában
  const topSFy = cy(3,0);
  const botSFy = H + cy(3,0);
  const finalY = TH/2 - BH/2;
  const bronzeY = TH/2 - BH/2 + 150;
  const midX = CW/2, finMidY = finalY + BH/2;

  // 5. oszlop: mindkét SF → Döntő (klasszikus bracket), Bronz külön
  const rightColW = CW + MW;
  const connLines=[
    `<line x1="0" y1="${topSFy}" x2="${midX}" y2="${topSFy}" stroke="${sc}" stroke-width="${sw}"/>`,
    `<line x1="0" y1="${botSFy}" x2="${midX}" y2="${botSFy}" stroke="${sc}" stroke-width="${sw}"/>`,
    `<line x1="${midX}" y1="${topSFy}" x2="${midX}" y2="${botSFy}" stroke="${sc}" stroke-width="${sw}"/>`,
    `<line x1="${midX}" y1="${finMidY}" x2="${CW}" y2="${finMidY}" stroke="${sc}" stroke-width="${sw}"/>`,
  ];
  const rightCol=`<div style="position:relative;width:${rightColW}px;flex-shrink:0;height:${TH}px">
    <svg width="${CW}" height="${TH}" style="position:absolute;top:0;left:0;overflow:visible">${connLines.join('')}</svg>
    <div style="position:absolute;left:${CW}px;top:${finalY}px;width:${MW}px">${wkBox(104,BH/2,BH,MW,true)}</div>
    <div style="position:absolute;left:${CW}px;top:${bronzeY}px;width:${MW}px">${wkBox(103,BH/2,BH,MW,false)}</div>
  </div>`;

  // Bal oldal: két sor egymás alatt
  const leftCols=halves.map(half=>`<div style="display:flex">
    ${col(half.r32,0)}${conn(half.r32,half.r16,0)}
    ${col(half.r16,1)}${conn(half.r16,half.qf,1)}
    ${col(half.qf,2)}${conn(half.qf,[half.sf],2)}
    ${col([half.sf],3)}
  </div>`).join('');

  const bkW=5*MW+4*CW, bkH=TH+80;
  const avW=Math.max(600,(document.getElementById('root')?.clientWidth||window.innerWidth)-24);
  const avH=Math.max(400,window.innerHeight-220);
  const zoom=Math.min(1,_cw/bkW).toFixed(3);
  return `<div class="bk-desktop" style="overflow:hidden">
      <div class="bk-scale" style="display:inline-block;transform-origin:top left">
        ${hdrRow}
        <div style="display:flex">

function rFun(){
  const uid=S.user.id,eff=getEffectiveResults(),users=S.users.filter(u=>!u.isAdmin),cfg=DS;
  const en=S.lang==='en';
  const myLgs=S.leagues.filter(l=>l.members?.includes(uid));
  const funLg=myLgs.find(l=>l.id===S.funLg)?S.funLg:'all';
  const fLeague=funLg==='all'?null:myLgs.find(l=>l.id===funLg);
  const fMembers=fLeague?fLeague.members:null;
  const fCfg=fLeague?(fLeague.scoring||DS):DS;
  const usersF=fMembers?users.filter(u=>fMembers.includes(u.id)):users;
  const funLgPills=myLgs.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
    ${[{id:'all',name:en?'All':'Összes'},...myLgs].map(l=>`<button data-funlg="${l.id}" style="font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:6px 12px;cursor:pointer;border-radius:8px;border:1px solid ${funLg===l.id?'#C8A84B':'var(--border)'};background:${funLg===l.id?'rgba(200,168,75,.15)':'transparent'};color:${funLg===l.id?'#C8A84B':'rgba(var(--ink-rgb),.6)'}">${esc(l.name)}</button>`).join('')}
  </div>`:'';
  // ── 1. Napi kihívás ──────────────────────────────────────────────────────
  const todayStr=new Date().toISOString().slice(0,10);
  const todayMs=ALL.filter(m=>{
    const ko=S.ko[m.id]||m.koDefault;
    return ko&&ko.startsWith(todayStr)&&eff[m.id];
  });
  const dailyBoard=todayMs.length?usersF.map(u=>{
    let pts=0,tips=0;
    todayMs.forEach(m=>{
      const tip=S.tips[`${u.id}_${m.id}`],r=eff[m.id];
      if(tip&&r){pts+=calcPts(tip,r,m.stage,fCfg)||0;tips++;}
    });
    return{...u,pts,tips};
  }).filter(u=>u.tips>0).sort((a,b)=>b.pts-a.pts||b.tips-a.tips):[];

  // ── 2. Forma tracker (utolsó 8 értékelt meccs) ───────────────────────────
  const evalMs=ALL.filter(m=>eff[m.id]).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,20);
  const formaData=users.map(u=>{
    const last=[];
    for(const m of evalMs){
      const tip=S.tips[`${u.id}_${m.id}`],r=eff[m.id];
      if(!tip||!r)continue;
      const cat=ptsCat(tip,r,m.stage,cfg);
      last.push(cat);
      if(last.length>=8)break;
    }
    return{...u,forma:last.reverse()};
  }).filter(u=>u.forma.length>=3).sort((a,b)=>{
    const score=f=>f.forma.reduce((s,c)=>s+({p8:4,p5:3,p3:2,p1:1,p0:0}[c]||0),0);
    return score(b)-score(a);
  });

  // ── 3. Bolondok fala ─────────────────────────────────────────────────────
  const allTips=[];
  users.forEach(u=>{
    ALL.forEach(m=>{
      const tip=S.tips[`${u.id}_${m.id}`],r=eff[m.id];
      if(!tip||!r||r.live)return;
      const ov=S.mt[m.id],home=ov?.home||m.home,away=ov?.away||m.away;
      const diff=Math.abs((tip.homeGoals-tip.awayGoals)-(r.homeGoals-r.awayGoals));
      const totalDiff=Math.abs(tip.homeGoals-r.homeGoals)+Math.abs(tip.awayGoals-r.awayGoals);
      const pts=calcPts(tip,r,m.stage,cfg)||0;
      allTips.push({u,m,tip,r,home,away,diff,totalDiff,pts,cat:ptsCat(tip,r,m.stage,cfg)});
    });
  });
  const worst=allTips.filter(x=>x.totalDiff>=4).sort((a,b)=>b.totalDiff-a.totalDiff).slice(0,5);
  const best=allTips.filter(x=>x.cat==='p8').sort((a,b)=>b.pts-a.pts).slice(0,5);

  // ── 4. Head-to-head ──────────────────────────────────────────────────────
  const h2hUid=S.h2hOpp||null;
  const h2hOpp=h2hUid?users.find(u=>u.id===h2hUid):null;
  let h2hRows='',h2hMyW=0,h2hOppW=0,h2hDraw=0;const h2hRowData=[];
  if(h2hOpp){
    const both=ALL.filter(m=>{
      const r=eff[m.id];
      return r&&!r.live&&S.tips[`${uid}_${m.id}`]&&S.tips[`${h2hUid}_${m.id}`];
    });
    both.forEach(m=>{
      const r=eff[m.id],ov=S.mt[m.id],home=ov?.home||m.home,away=ov?.away||m.away;
      const myTip=S.tips[`${uid}_${m.id}`],oppTip=S.tips[`${h2hUid}_${m.id}`];
      const myP=calcPts(myTip,r,m.stage,cfg)||0,oppP=calcPts(oppTip,r,m.stage,cfg)||0;
      if(myP>oppP)h2hMyW++;else if(oppP>myP)h2hOppW++;else h2hDraw++;
      h2hRowData.push({label:`${teamName(home)} – ${teamName(away)}`,myP,oppP});
      h2hRows+=`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(var(--ink-rgb),.6)">${teamName(home)} – ${teamName(away)}</span>
        <span style="color:${myP>oppP?'#00b050':myP<oppP?'#e8212a':'#c9a84c'};font-weight:700;min-width:28px;text-align:right">${myP}p</span>
        <span style="color:rgba(var(--ink-rgb),.3);font-size:10px">vs</span>
        <span style="color:${oppP>myP?'#00b050':oppP<myP?'#e8212a':'#c9a84c'};font-weight:700;min-width:28px;text-align:left">${oppP}p</span>
      </div>`;
    });
  }

  const catDot={p8:'⭐',p5:'🎯',p3:'✓',p1:'~',p0:'✗'};
  const formaColor={p8:'#c9a84c',p5:'#4a9eff',p3:'#00b050',p1:'#a78bfa',p0:'#e8212a'};
  const legend=`<div style="background:rgba(var(--ink-rgb),.04);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:22px">
    <div style="font-size:11px;font-weight:700;color:rgba(var(--ink-rgb),.4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Jelmagyarázat</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${[
        {c:'#c9a84c',d:'⭐',l:'Pontos eredmény',s:'8p'},
        {c:'#4a9eff',d:'🎯',l:'Helyes eredmény + GK',s:'5p'},
        {c:'#00b050',d:'✓',l:'Helyes kimenetel',s:'3p'},
        {c:'#a78bfa',d:'~',l:'Egy gól egyezik',s:'1p'},
        {c:'#e8212a',d:'✗',l:'Teljesen mellé',s:'0p'},
      ].map(x=>`<div style="display:flex;align-items:center;gap:6px;background:rgba(var(--ink-rgb),.04);border-radius:8px;padding:5px 10px">
        <div style="width:22px;height:22px;border-radius:5px;background:${x.c};display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">${x.d}</div>
        <span style="font-size:12px;color:rgba(var(--ink-rgb),.7)">${x.l}</span>
        <span style="font-size:12px;font-weight:700;color:${x.c}">${x.s}</span>
      </div>`).join('')}
    </div>
    <div style="margin-top:8px;font-size:11.5px;color:rgba(var(--ink-rgb),.4)">🔄 Kieséses meccseken a pontok duplázódnak (×2)</div>
  </div>`;

  return `<div>
  ${legend}
  ${funLgPills}
  ${(()=>{
    const en=S.lang==='en';
    const todayIds=new Set(todayMs.map(m=>String(m.id)));
    const effBefore={};for(const k in eff){if(!todayIds.has(String(k)))effBefore[k]=eff[k];}
    const catC={p8:'#C8A84B',p5:'#2ea043',p3:'#00b050',p1:'#a78bfa',p0:'#e8212a'};
    const tipRow=(m,who,r)=>{const tip=S.tips[`${who}_${m.id}`];if(!tip||!r)return '';const ov=S.mt[m.id],h=teamName(ov?.home||m.home),a=teamName(ov?.away||m.away);const p=calcPts(tip,r,m.stage,fCfg)||0,cat=ptsCat(tip,r,m.stage,fCfg);return `<div style="display:flex;align-items:center;gap:8px;padding:7px 2px;border-top:1px solid var(--border);font-size:12.5px"><div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h} <b>${r.homeGoals}-${r.awayGoals}</b> ${a}</div><div style="color:rgba(var(--ink-rgb),.5);white-space:nowrap">${en?'tip':'tipp'} ${tip.homeGoals}-${tip.awayGoals}</div><div style="font-weight:800;color:${catC[cat]||'rgba(var(--ink-rgb),.5)'};min-width:34px;text-align:right">+${p}p</div></div>`;};
    let myToday=0,myExactToday=0,bestT=null;

function rGlobalLb(){
  const eff=getEffectiveResults();
  const board=S.users.filter(u=>!u.isAdmin).map(u=>{
    const r=calcUser(u.id,S.tips,eff,S.mt,S.special,S.adminSpec,DS);return{...u,...r};
  }).sort((a,b)=>b.pts-a.pts||b.pf-a.pf||b.rgd-a.rgd||b.tipped-a.tipped);
  if(!board.length)return `<div class="empty"><div style="font-size:44px;margin-bottom:12px">🏅</div><p>Még nincs regisztrált játékos.</p></div>`;
  return board.map((u,i)=>{
    const exp=S.expandLb===`g_${u.id}`;
    return `<div class="lb-card" style="flex-direction:column;align-items:stretch;cursor:pointer" data-explb="g_${u.id}">

      <span style="font-size:20px">${u.av||'⚽'}</span>
      <div style="flex:1;min-width:0">
        <div class="lb-nm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.dn}</div>
        <div class="lb-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">⭐${u.pf} · 🎯${u.rgd} · ✓${u.res3} · ~${u.og} · ${u.tipped} ${t('tip_label')}</div>

function showMsg(id,text){
  let el=document.getElementById('globalToast');
  if(!el){el=document.createElement('div');el.id='globalToast';el.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#0A0A0A;color:#fff;font-family:var(--font-bc);font-weight:600;font-size:13px;letter-spacing:.5px;padding:10px 18px;border-radius:10px;z-index:99999;opacity:0;transition:opacity .2s;box-shadow:0 6px 24px rgba(0,0,0,.35);pointer-events:none';document.body.appendChild(el);}
  el.textContent=text;
  requestAnimationFrame(()=>{el.style.opacity='1';});
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';},2200);
}
function fallbackCopy(text){
  try{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);showMsg('shareDone','\u2713 V\u00e1g\u00f3lapra m\u00e1solva!');}
  catch(e){showMsg('shareErr','A megoszt\u00e1s nem siker\u00fclt');}
}
function copyShare(text){
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(()=>showMsg('shareDone','\u2713 V\u00e1g\u00f3lapra m\u00e1solva!')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function doShare(title,text){
  const url=location.href.split('?')[0];
  if(navigator.share){
    navigator.share({title,text,url}).catch(err=>{ if(err&&err.name==='AbortError')return; copyShare(text); });
  } else copyShare(text);
}
function tipText(mid){
  const uid=S.user.id,eff=getEffectiveResults(),cfg=DS;
  const m=ALL.find(x=>x.id===mid);if(!m)return '';
  const tip=S.tips[`${uid}_${m.id}`];if(!tip)return '';
  const ov=S.mt[m.id],home=ov?.home||m.home,away=ov?.away||m.away;
  const r=eff[m.id],p=r!=null?calcPts(tip,r,m.stage,DS):null;
  return `${teamName(home)} ${tip.homeGoals}-${tip.awayGoals} ${teamName(away)}${r!=null?` (${r.homeGoals}-${r.awayGoals}, ${p}p)`:''}`;
}
function shareTipMatch(mid){
  const txt=tipText(mid);if(!txt)return;
  doShare('VB 2026 Tippelő',`\u{1F3C6} VB 2026 Tippel\u0151 \u00b7 ${S.user.dn}\n${txt}\n${location.href.split('?')[0]}`);
}
function shareTips(){
  const uid=S.user.id,eff=getEffectiveResults(),cfg=DS;
  const url=location.href.split('?')[0];
  const fg=(S.tipFilterG&&S.tipFilterG!=='all')?S.tipFilterG:null;
  if(fg){
    const ms=ALL.filter(m=>(m.group||m.stage||'ko')===fg&&S.tips[`${uid}_${m.id}`]).sort((a,b)=>a.id-b.id);
    if(ms.length){
      const lbl=GD.some(g=>g.id===fg)?(fg+'. csoport'):(stageLabel(fg)||fg);
      let gp=0;ms.forEach(m=>{const r=eff[m.id];if(r)gp+=calcPts(S.tips[`${uid}_${m.id}`],r,m.stage,cfg)||0;});
      const lines=ms.map(m=>'\u2022 '+tipText(m.id)).join('\n');
      doShare('VB 2026 Tippelő',`\u{1F3C6} VB 2026 Tippel\u0151 \u00b7 ${S.user.dn}\n\u{1F4CB} ${lbl} \u2013 ${gp} pont\n${lines}\n${url}`);
      return;
    }
  }
  const tipped=ALL.filter(m=>S.tips[`${uid}_${m.id}`]);
  let tp=0;
  tipped.forEach(m=>{const r=eff[m.id];if(r)tp+=calcPts(S.tips[`${uid}_${m.id}`],r,m.stage,cfg)||0;});
  const uw=S.special?.[`${uid}_w`],ut=S.special?.[`${uid}_t`];
  const text=`\u{1F3C6} VB 2026 Tippel\u0151\n\u{1F464} ${S.user.dn}\n\u{1F4CA} ${tipped.length} tipp \u00b7 ${tp} pont${uw?'\n\u{1F3C6} Gy\u0151ztes: '+teamName(uw):''}${ut?'\n\u26bd G\u00f3lkir\u00e1ly: '+ut:''}\n${url}`;
  doShare('VB 2026 Tippelő',text);
}

// Push értesítések
async function togglePushNotif(){
  if(!('Notification' in window)){alert('A böngésző nem támogatja az értesítéseket.');return;}
  if(Notification.permission==='denied'){alert('Az értesítések le vannak tiltva. Engedélyezd a böngésző beállításaiban.');return;}
  if(Notification.permission==='granted'&&S.notifOn){
    SS({notifOn:false});
    await sS('wc_notif_'+S.user.id,false,false);
    render();return;
  }
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    SS({notifOn:true});
    await sS('wc_notif_'+S.user.id,true,false);
    scheduleNotifs();
    render();
    new Notification('VB 2026 Tippelő 🏆',{body:'Az értesítések be vannak kapcsolva! Értesítünk a meccsek előtt.',icon:'/trophy.png'});
  }
}
function scheduleNotifs(){
  if(!S.notifOn||typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const now=Date.now();
  ALL.forEach(m=>{
    const ko=S.ko[m.id]||m.koDefault;
    if(!ko)return;
    const koMs=new Date(ko).getTime();
    const delay30=koMs-30*60*1000-now; // 30 perccel előtte
    const delay5=koMs-5*60*1000-now;   // 5 perccel előtte (utolsó tipp)
    const ov=S.mt[m.id],home=ov?.home||m.home,away=ov?.away||m.away;
    const hasTip=!!S.tips[`${S.user.id}_${m.id}`];
    if(delay30>0&&delay30<24*3600*1000){
      setTimeout(()=>{
        if(Notification.permission!=='granted')return;
        new Notification(`⚽ ${teamName(home)} – ${teamName(away)}`,{body:`30 perc múlva kezdődik!${!hasTip?' 📝 Még nincs tipped!':''}`,icon:'/trophy.png'});
      },delay30);
    }
    if(delay5>0&&delay5<24*3600*1000&&!hasTip){
      setTimeout(()=>{
        if(Notification.permission!=='granted')return;
        new Notification(`⚠️ ${teamName(home)} – ${teamName(away)}`,{body:'5 perc múlva zár a tippelés! Adj le tippet!',icon:'/trophy.png'});
      },delay5);
    }
  });
}

// Live frissítés: 60mp-ként, force=true ha van élő meccs
// Aktív időablak: van élő meccs, vagy max 10 percen belül kezdődik, vagy max 150 perce kezdődött.
// Ezen kívül szinte semmi nem változik, ezért ritkábban szinkronizálunk (Firestore-kvóta kímélése).
function liveWindow(){
  if(Object.keys(S.live||{}).length>0)return true;
  const now=Date.now();
  return ALL.some(m=>{
    const ko=S.ko[m.id]||m.koDefault;if(!ko)return false;
    const t=new Date(ko).getTime();
    return (t-now)<10*60*1000 && (now-t)<150*60*1000;
  });
}
// Élő eredmény (ESPN) frissítés — CSAK látható fülön és aktív időablakban.
setInterval(()=>{
  if(!S.user||document.hidden)return;
  if(!liveWindow())return;
  refreshLiveIfStale(Object.keys(S.live||{}).length>0);
},60*1000);
// Firestore háttér-szinkron — CSAK látható fülön. Aktívkor 30 mp-enként a gyakran változó
// kulcsok (eredmény/tipp/élő), egyébként ~3 percenként; a ritkán változó kulcsokat
// (special/ligák/mt) csak a lassú (~3 perces) körben olvassuk. Így ~6-8x kevesebb olvasás.
let _syncTick=0;
setInterval(async()=>{
  if(!S.user||document.hidden)return;
  _syncTick++;
  const active=liveWindow();
  if(!active && (_syncTick%6!==0))return;   // inaktívkor csak minden 6. kör (~3 perc)
  const slowCycle=(_syncTick%6===0);        // ritkán változó kulcsok ~3 percenként
  try{
    const[r,t]=await Promise.all([sG('wc_r',true),sG('wc_t',true)]);
    const patch={results:r||S.results,tips:t||S.tips};
    if(slowCycle){
      const[sp,lg,mt]=await Promise.all([sG('wc_sp',true),sG('wc_lg',true),sG('wc_mt',true)]);
      patch.special=sp||S.special;patch.leagues=lg||S.leagues;patch.mt=mt||S.mt;
    }
    SS(patch);
    if(active)refreshLiveIfStale();   // ez olvassa a szerveroldali élő-feedet (vagy ESPN-fallback)
    if(S.user?.isAdmin)autoFillKnockoutTeams();
  }catch(e){}
},30000);
// Amikor a felhasználó visszatér a fülre: azonnali élő-frissítés + a következő kör teljes olvasás.
document.addEventListener('visibilitychange',()=>{
  if(document.hidden||!S.user)return;
  _syncTick=5;
  if(liveWindow())refreshLiveIfStale(true);
});
