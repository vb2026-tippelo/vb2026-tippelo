/* ===== VB 2026 BROADCAST DESIGN SYSTEM ===== */
:root{
  --bg-page:#F2F0EB;
  --bg-page-grad:#F2F0EB;
  --bg-card:#FFFFFF;
  --bg-header:#0A0A0A;
  --bg-main:#F2F0EB;
  --bg-modal:rgba(0,0,0,.55);
  --bg-nav-overlay:#0A0A0A;
  --bg-auth-grad:linear-gradient(145deg,#0A0A0A 0%,#1a1a1a 100%);
  --border:rgba(10,10,10,.1);
  --border-gold:rgba(200,168,75,.35);
  --c-gold:#C8A84B;
  --c-red:#CC2929;
  --c-green:#2E9E5A;
  --text-color:#0A0A0A;
  --ink-rgb:10,10,10;
  --chrome-bg:#FFFFFF;
  --chrome-elev:#F4F2EC;
  --chrome-ink:10,10,10;
  --chrome-line:rgba(10,10,10,.08);
  --font-bc:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
  --std-adv:rgba(46,158,90,.15);
  --std-adv-border:#2E9E5A;
  --std-play:rgba(200,168,75,.1);
  --std-play-border:#C8A84B;
  --std-out:rgba(204,41,41,.06);
}

/* ===== DARK MODE ===== */
body.dark-mode{
  --bg-page:#111111;
  --bg-page-grad:#111111;
  --bg-card:#1C1C1C;
  --bg-main:#111111;
  --border:rgba(255,255,255,.08);
  --text-color:#F0EDE6;
  --ink-rgb:240,237,230;
  --chrome-bg:#0A0A0A;
  --chrome-elev:#161616;
  --chrome-ink:255,255,255;
  --chrome-line:rgba(255,255,255,.07);
  --std-adv:rgba(46,158,90,.2);
  --std-play:rgba(200,168,75,.15);
  --std-out:rgba(204,41,41,.1);
}
body.dark-mode .bc-center{background:#111111}
body.dark-mode .bc-sidebar-r{background:#161616;border-left-color:rgba(255,255,255,.06)}
body.dark-mode .bc-center,
body.dark-mode .bc-center *:not([style*="color:#C8A84B"]):not([style*="color:#2E9E5A"]):not([style*="color:#CC2929"]):not([style*="color:#3EAD6A"]):not(.ptag){
  color:var(--text-color);
}
body.dark-mode [style*="background:#fff"],
body.dark-mode [style*="background:#FFFFFF"],
body.dark-mode [style*="background:#F2F0EB"],
body.dark-mode [style*="background:#FFFBF2"],
body.dark-mode [style*="background:#F7F5F0"],
body.dark-mode [style*="background:#FFFBF0"],
body.dark-mode [style*="background:var(--bg-card)"],
body.dark-mode [style*="background:var(--bg-page)"]{
  background:var(--bg-card) !important;
}
body.dark-mode [style*="color:#0A0A0A"]{color:var(--text-color) !important}
body.dark-mode [style*="color:rgba(10,10,10"]{color:var(--text-color) !important}
body.dark-mode .sbox{background:#1C1C1C}
body.dark-mode .inp,.dark-mode .inp-light{background:#1C1C1C;border-color:rgba(255,255,255,.12);color:var(--text-color)}
body.dark-mode .mcard{background:#1C1C1C}
body.dark-mode .mc-inp{background:#161616;border-top-color:rgba(255,255,255,.08)}
body.dark-mode .modal-box{background:#1C1C1C;border-color:rgba(255,255,255,.15)}
body.dark-mode .lg-card,.dark-mode .fun-card,.dark-mode .pre-card{background:#1C1C1C}
/* dark-mode: osztályból színezett, középső oszlopban renderelt komponensek (a szöveg krémre vált, ezért a hátteret is sötétíteni kell) */
body.dark-mode .mc-top{background:#1C1C1C}
body.dark-mode .mcard-active .mc-top{background:#241F12}
body.dark-mode .mcard+.mcard{border-top-color:rgba(255,255,255,.07)}
body.dark-mode .mc-date{background:#161616;border-top-color:rgba(255,255,255,.07)}
body.dark-mode .mc-grp{background:#2A2A2A}
body.dark-mode .mc-odds-pill{background:#222222;border-color:rgba(255,255,255,.1)}
body.dark-mode .lb-card{background:#1C1C1C}
body.dark-mode .lb-card.me{background:#241F12}
body.dark-mode .wk-box{background:#1C1C1C;border-color:rgba(255,255,255,.1)}
body.dark-mode .wk-hdr{background:#161616;border-bottom-color:rgba(255,255,255,.07)}
body.dark-mode .wk-sep{background:rgba(255,255,255,.08)}
body.dark-mode .bk-mob-card{background:#1C1C1C;border-color:rgba(255,255,255,.1)}
body.dark-mode .pred-third-btn{background:#1C1C1C;border-color:rgba(255,255,255,.15)}
body.dark-mode .pred-third-btn.selected{background:#C8A84B;color:#0A0A0A !important}
body.dark-mode .pred-third-btn.picked{background:rgba(46,158,90,.24);border-color:#2E9E5A;color:#43c97a !important}
/* dark-mode: osztály-akcentek visszaállítása (a széles .bc-center szabály különben krémre váltaná) */
body.dark-mode .bc-center .mc-tip-v,
body.dark-mode .bc-center .mc-tip-open,
body.dark-mode .bc-center .mc-score-time,
body.dark-mode .bc-center .mc-res,
body.dark-mode .bc-center .bc-sec-more,
body.dark-mode .bc-center .lg-code,
body.dark-mode .bc-center .btn-gold,
body.dark-mode .bc-center .btn-sm.gold{color:#C8A84B !important}
body.dark-mode .bc-center .mc-tip-p,
body.dark-mode .bc-center .mc-saved,
body.dark-mode .bc-center .btn-green{color:#3EAD6A !important}
body.dark-mode .bc-center .pred-group-h,
body.dark-mode .bc-center .pred-grp-tag,
body.dark-mode .bc-center .pred-ko-btn.picked,
body.dark-mode .bc-center .pred-champion{color:#C8A84B !important}
body.dark-mode .bc-center .pred-rank-badge.r1{color:#fff !important}
body.dark-mode .bc-center .pred-rank-badge.r2{color:#fff !important}
body.dark-mode .bc-center .pred-rank-badge.r3{color:#0A0A0A !important}
body.dark-mode .bc-center .pred-rank-badge.r4{color:#fff !important}
/* dark-mode: fekete keretek/aláhúzások láthatóvá tétele sötét háttéren */
body.dark-mode .sect,
body.dark-mode .bc-sec{border-bottom-color:rgba(255,255,255,.15)}
body.dark-mode .btn-sm{border-color:rgba(255,255,255,.25)}
body.dark-mode .btn-sm:hover{background:rgba(255,255,255,.1)}
body.dark-mode .modal-title{color:var(--text-color);border-bottom-color:rgba(255,255,255,.2)}
/* dark-mode: ligaszűrő fehér sáv + figyelmeztető doboz láthatóvá tétele */
body.dark-mode .lg-sel-row{background:#1C1C1C;border:1px solid rgba(255,255,255,.16);border-radius:10px}
body.dark-mode .lg-sel-row .pill{border-color:rgba(255,255,255,.22);color:rgba(255,255,255,.6)}
body.dark-mode .lg-sel-row .pill.on{border-color:#C8A84B;color:#C8A84B;background:rgba(200,168,75,.12)}
body.dark-mode .note-bar{background:#1C1C1C;border:1px solid rgba(255,255,255,.08);border-left:3px solid #C8A84B}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-page);color:var(--text-color);font-family:var(--font-b),system-ui,sans-serif;min-height:100vh}
#root{min-height:100vh}

/* ===== BROADCAST TOP BAR ===== */
.bc-topbar{
  background:var(--chrome-bg);height:54px;display:flex;align-items:stretch;
  position:sticky;top:0;z-index:100;border-bottom:1px solid var(--chrome-line);
  background-image:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(var(--chrome-ink),.022) 8px,rgba(var(--chrome-ink),.022) 9px);
}
.bc-logo{
  background:#C8A84B;display:flex;align-items:center;gap:10px;
  padding:0 36px 0 18px;flex-shrink:0;
  clip-path:polygon(0 0,100% 0,88% 100%,0 100%);
}
.bc-logo img{width:30px;height:30px;object-fit:contain}
.bc-logo-text{font-family:var(--font-bc);font-weight:700;font-size:16px;color:#0A0A0A;line-height:1.1}
.bc-logo-sub{font-size:9px;color:rgba(0,0,0,.5);letter-spacing:1.2px;text-transform:uppercase}
.bc-nav{display:flex;align-items:stretch;flex:1;overflow-x:auto;scrollbar-width:none}
.bc-nav::-webkit-scrollbar{display:none}
.bc-navlink{
  display:flex;align-items:center;gap:6px;padding:0 14px;
  font-family:var(--font-bc);font-weight:600;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(var(--chrome-ink),.45);cursor:pointer;border-bottom:3px solid transparent;
  white-space:nowrap;transition:color .15s;
}
.bc-navlink.on{color:#C8A84B;border-bottom-color:#C8A84B}
.bc-navlink:hover:not(.on){color:rgba(var(--chrome-ink),.75)}
.bc-navlink svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0}
.bc-user{display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0}
.bc-uinfo{font-family:var(--font-bc);font-size:11px;color:rgba(var(--chrome-ink),.5);letter-spacing:.5px;text-align:right;line-height:1.3}
.bc-av{width:32px;height:32px;background:#C8A84B;display:flex;align-items:center;justify-content:center;font-family:var(--font-bc);font-weight:700;font-size:13px;color:#0A0A0A;flex-shrink:0}

/* ===== LIVE TICKER ===== */
.bc-ticker{
  background:#C8A84B;height:30px;display:flex;align-items:center;overflow:hidden;
}
.bc-ticker-live{
  background:#0A0A0A;color:#C8A84B;height:100%;display:flex;align-items:center;gap:6px;
  padding:0 14px;flex-shrink:0;
  font-family:var(--font-bc);font-weight:700;font-size:10px;letter-spacing:2px;
}
.bc-ticker-dot{width:6px;height:6px;border-radius:50%;background:#C8A84B;animation:ldot 1s ease-in-out infinite}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.2}}
.bc-ticker-items{display:flex;gap:20px;padding:0 16px;font-family:var(--font-bc);font-weight:600;font-size:12px;color:#0A0A0A;white-space:nowrap}
.bc-ticker-sep{color:rgba(0,0,0,.3);margin:0 2px}

/* ===== 3-COLUMN DESKTOP LAYOUT ===== */
.bc-layout{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 54px)}
@media(max-width:900px){.bc-layout{grid-template-columns:1fr}.bc-sidebar-l,.bc-sidebar-r{display:none}}

/* ===== LEFT SIDEBAR ===== */
.bc-sidebar-l{background:var(--chrome-bg);border-right:1px solid var(--chrome-line);overflow-y:auto}
.bc-sidebar-r{background:#fff;border-left:1px solid #E5E3DE;overflow-y:auto;padding:18px}

/* LIVE HERO */
.live-hero{padding:18px;border-bottom:1px solid var(--chrome-line)}
.lh-badge{background:#CC2929;color:#fff;font-family:var(--font-bc);font-weight:700;font-size:10px;letter-spacing:2px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px;margin-bottom:14px}
.lh-meta{font-size:10px;color:rgba(var(--chrome-ink),.35);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;float:right;margin-top:-24px}
.lh-match{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
.lh-team{display:flex;flex-direction:column;align-items:center;gap:5px;width:85px}
.lh-flag{font-size:26px;line-height:1}
.lh-tname{font-family:var(--font-bc);font-weight:700;font-size:11px;color:rgba(var(--chrome-ink),.8);letter-spacing:.8px;text-transform:uppercase;text-align:center}
.lh-score{text-align:center}
.lh-nums{font-family:var(--font-bc);font-weight:900;font-size:48px;color:rgb(var(--chrome-ink));line-height:1;letter-spacing:-3px;display:flex;align-items:center;gap:2px}
.lh-dash{font-weight:300;color:rgba(var(--chrome-ink),.45);font-size:34px;margin:0 7px}
.lh-min{font-size:9px;color:rgba(var(--chrome-ink),.35);text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.lh-tip{background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.15);padding:9px 12px;display:flex;align-items:center;justify-content:space-between}
.lht-lbl{font-size:8px;font-weight:600;color:rgba(200,168,75,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.lht-val{font-family:var(--font-bc);font-weight:700;font-size:15px;color:#C8A84B}
.lht-pts{font-family:var(--font-bc);font-weight:700;font-size:18px;color:#3EAD6A;display:flex;align-items:baseline;gap:3px}
.lht-pl{font-size:9px;color:rgba(62,173,106,.6);font-weight:400;font-family:var(--font-b)}

/* SIDEBAR MATCH LIST */
.sml-hdr{padding:9px 18px 6px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid rgba(var(--chrome-ink),.05)}
.sml-title{font-family:var(--font-bc);font-weight:700;font-size:11px;color:rgba(var(--chrome-ink),.35);letter-spacing:1px;text-transform:uppercase}
.sml-all{font-size:10px;color:#C8A84B;font-family:var(--font-bc);font-weight:700;letter-spacing:.8px;cursor:pointer}
.sml-item{border-bottom:1px solid rgba(var(--chrome-ink),.04);padding:10px 18px;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;gap:7px}
.sml-item.active{background:rgba(204,41,41,.07);border-left:3px solid #CC2929;padding-left:15px}
.sml-top{display:flex;align-items:center;gap:8px}
.sml-time{font-family:var(--font-bc);font-weight:600;font-size:11px;color:rgba(var(--chrome-ink),.25);min-width:32px;flex-shrink:0}
.sml-teams{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.sml-t{font-family:var(--font-bc);font-weight:600;font-size:12.5px;color:rgba(var(--chrome-ink),.72);display:flex;align-items:center;gap:5px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sml-stat{display:flex;gap:6px}
.sml-st-cell{flex:1;display:flex;align-items:baseline;justify-content:center;gap:5px;background:rgba(var(--chrome-ink),.04);border-radius:7px;padding:5px 4px}
.sml-st-l{font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:rgba(var(--chrome-ink),.32);font-weight:700;font-family:var(--font-bc)}
.sml-st-v{font-size:16px;font-weight:800;color:rgba(var(--chrome-ink),.92);font-family:var(--font-bc)}
.sml-st-v.sml-pts{color:#C8A84B}
.sml-st-v.muted{color:rgba(var(--chrome-ink),.22)}
.sb-seg{font-family:var(--font-bc);font-weight:700;font-size:9px;letter-spacing:.5px;text-transform:uppercase;padding:3px 7px;border:1px solid rgba(var(--chrome-ink),.15);background:none;color:rgba(var(--chrome-ink),.4);cursor:pointer;border-radius:5px}
.sb-seg.on{border-color:#C8A84B;color:#C8A84B;background:rgba(200,168,75,.12)}

/* ===== CENTER MAIN ===== */
.bc-center{background:#F2F0EB;padding:22px 26px;overflow-y:auto}

/* Section headers */
.bc-sec{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2px solid #0A0A0A;padding-bottom:6px;margin-bottom:14px}
.bc-sec-t{font-family:var(--font-bc);font-weight:700;font-size:20px;color:#0A0A0A;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.bc-sec-sub{font-size:11px;color:#888;font-weight:300;letter-spacing:.3px}
.bc-sec-more{font-size:11px;color:#C8A84B;font-family:var(--font-bc);font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase}

/* ===== MATCH CARDS – broadcast newspaper style ===== */
.match-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;align-items:start}
.match-grid .mcard{border:1px solid var(--border);border-left:3px solid transparent;border-radius:12px;overflow:hidden}
.match-grid .mcard+.mcard{border-top:1px solid var(--border)}
body.dark-mode .match-grid .mcard{border-color:rgba(255,255,255,.08)}
@media(max-width:1100px){.match-grid{grid-template-columns:1fr;gap:0}.match-grid .mcard{border-radius:0;border:none;border-left:3px solid transparent;border-bottom:1px solid var(--border)}}
.grp-mini-std{margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.grp-mini-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;align-items:start}
.grp-mini-wrap .grp-mini-std{margin-bottom:0}
@media(max-width:1100px){.grp-mini-wrap{grid-template-columns:1fr}}
.gms-row-pred{grid-template-columns:26px 1fr !important}
.gms-empty{padding:16px 10px;font-family:var(--font-bc);font-size:12px;color:rgba(var(--ink-rgb),.35);text-align:center}
.gms-row{display:grid;grid-template-columns:26px 1fr 28px 28px 28px 28px 40px 34px;align-items:center;gap:4px;padding:6px 10px;font-family:var(--font-bc);font-weight:600;font-size:13px;color:var(--text-color)}
.gms-row+.gms-row{border-top:1px solid rgba(var(--ink-rgb),.06)}
.gms-head{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:rgba(var(--ink-rgb),.45);font-weight:700;background:rgba(var(--ink-rgb),.03)}
.gms-row>span:not(.gms-team):not(.gms-pos){text-align:center}
.gms-pos{font-weight:900;text-align:center}
.gms-team{display:flex;align-items:center;gap:7px;min-width:0;text-transform:uppercase;letter-spacing:.3px}
.gms-tnm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gms-pts{font-weight:900;color:var(--c-gold)}
body.dark-mode .grp-mini-std{border-color:rgba(255,255,255,.08)}
body.dark-mode .bc-center .gms-pts{color:var(--c-gold) !important}
.mcard{background:#fff;border-left:3px solid transparent;cursor:pointer;transition:border-color .12s}
.mcard.locked{opacity:1}
.mcard+.mcard{border-top:1px solid #E5E3DE}
.mcard:hover{border-left-color:rgba(200,168,75,.4)}
.mc-top{display:grid;grid-template-columns:28px 1fr 72px 1fr 68px;align-items:center;padding:10px 14px;gap:8px;background:#fff}
.mcard-active .mc-top{border-left:3px solid #C8A84B;background:#FFFBF2}
.mc-idx{font-family:var(--font-bc);font-weight:700;font-size:11px;color:#bbb;text-align:center}
.mc-team-col{display:flex;align-items:center;gap:6px}
.mc-team-col.away{justify-content:flex-end}
.mc-flag{font-size:16px;line-height:1}
.mc-tname{font-family:var(--font-bc);font-weight:600;font-size:14px;color:#0A0A0A;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-score-col{display:flex;align-items:center;justify-content:center;gap:3px}
.mc-score-n{font-family:var(--font-bc);font-weight:900;font-size:20px;color:#0A0A0A;letter-spacing:-.5px}
.mc-score-sep{font-size:14px;color:#ccc;font-weight:300}
.mc-tip-col{text-align:right}
.mc-tip-v{font-family:var(--font-bc);font-size:12px;color:#C8A84B;font-weight:700;letter-spacing:.3px}
.mc-tip-p{font-size:10px;color:#3EAD6A;font-weight:600}
.mc-tip-open{font-family:var(--font-bc);font-size:10px;color:#C8A84B;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.mc-score-time{font-family:var(--font-bc);font-weight:700;font-size:12px;color:#C8A84B;letter-spacing:.8px;text-align:center}
.mc-score-eta{font-size:9px;color:#aaa;text-align:center}

/* Live badge */
.mc-live-badge{background:#CC2929;color:#fff;font-family:var(--font-bc);font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:1.5px;display:inline-flex;align-items:center;gap:4px}
.pulse-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:ldot 1s ease-in-out infinite}

/* Tip inputs */
.mc-inp{background:#FFFBF2;border-top:1px solid #E5E3DE;padding:8px 14px;display:flex;align-items:center;gap:8px}
.sbox{width:54px;height:52px;border:2px solid rgba(var(--ink-rgb),.18);border-radius:13px;text-align:center;font-family:var(--font-bc);font-weight:800;font-size:25px;color:var(--text-color);background:var(--bg-card);outline:none;transition:border-color .12s,box-shadow .12s;-webkit-appearance:none;-moz-appearance:textfield;appearance:none}
.sbox::-webkit-outer-spin-button,.sbox::-webkit-inner-spin-button{-webkit-appearance:none;appearance:none;margin:0;display:none}
.sbox::placeholder{color:rgba(var(--ink-rgb),.25);font-weight:400}
.sbox:focus{border-color:#C8A84B;box-shadow:0 0 0 3px rgba(200,168,75,.25)}
.sbox.filled{border-color:#C8A84B}
.sbox:disabled{opacity:.45;cursor:not-allowed}
.sdash{font-family:var(--font-bc);font-size:24px;color:rgba(var(--ink-rgb),.3);font-weight:300}
.btn-gold{flex:1;height:36px;background:#0A0A0A;color:#C8A84B;border:none;font-family:var(--font-bc);font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;max-width:200px}
.mc-saved{font-size:11px;color:#3EAD6A;font-family:var(--font-bc);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.mc-date{font-size:10px;color:rgba(10,10,10,.35);display:flex;align-items:center;gap:5px;padding:4px 14px;background:#F7F5F0;border-top:1px solid #E5E3DE;font-family:var(--font-bc);letter-spacing:.3px}
.mc-meta{display:flex;align-items:center;gap:8px}
.mc-grp{font-size:10px;color:rgba(10,10,10,.45);font-family:var(--font-bc);font-weight:600;letter-spacing:.8px;text-transform:uppercase;background:#EDEAE3;padding:2px 7px}
.mc-ko{font-size:10px;background:#0A0A0A;color:#C8A84B;font-family:var(--font-bc);font-weight:700;padding:2px 7px;letter-spacing:.5px}
.mc-venue-info{font-size:10px;color:rgba(10,10,10,.4);font-family:var(--font-bc);font-weight:400;display:flex;align-items:center;gap:4px}
.mc-wx{font-size:10px;color:rgba(10,10,10,.5)}
.mc-odds{display:flex;gap:6px;padding:0 14px 8px;flex-wrap:wrap}
.mc-odds-pill{font-size:10px;font-family:var(--font-bc);font-weight:600;padding:2px 8px;background:#F2F0EB;border:1px solid #ddd;color:#555;letter-spacing:.3px}
.mc-odds-draw{color:#888}

/* Score display */
.actual-s{display:flex;align-items:center;gap:4px;font-family:var(--font-bc);font-weight:900;font-size:22px;color:#0A0A0A}
.actual-s span{color:#0A0A0A}
.mc-main{display:flex;align-items:center;padding:0 14px 0;gap:12px}
.mc-res{font-size:11px;font-family:var(--font-bc);font-weight:700;color:#C8A84B;letter-spacing:.3px}
.team-b{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.tname{font-family:var(--font-bc);font-weight:700;font-size:13px;text-align:center;text-transform:uppercase;letter-spacing:.3px;color:#0A0A0A}
.score-b{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px}
.sinputs{display:flex;align-items:center;gap:10px}
.mc-actions{display:flex;gap:8px;flex-wrap:wrap;padding:8px 14px}
.mc-actbtn{background:none;border:1px solid rgba(var(--ink-rgb),.2);padding:6px 14px;font-family:var(--font-bc);font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:rgba(var(--ink-rgb),.7);cursor:pointer;border-radius:7px}
.mc-actbtn:hover{border-color:rgba(200,168,75,.5);color:var(--text-color)}
.mc-tipsum{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;padding:0 16px 12px;margin-top:-2px}
.mc-tipsum-lbl{font-family:var(--font-bc);font-weight:700;font-size:15px;letter-spacing:.3px;color:rgba(var(--ink-rgb),.6)}
.mc-tipsum-none{font-size:13px;color:rgba(var(--ink-rgb),.4)}

/* Tip categories */
.ptag{font-family:var(--font-bc);font-size:11px;font-weight:700;padding:1px 7px;letter-spacing:.3px}
.p8{background:rgba(200,168,75,.15);color:#8a6f1a}
.p5{background:rgba(62,173,106,.12);color:#1e6e3f}
.p3{background:rgba(10,10,10,.07);color:#444}
.p1{background:rgba(10,10,10,.04);color:#888}
.p0{background:rgba(204,41,41,.08);color:#993333}

/* ===== STANDINGS ===== */
.standings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:#ddd;margin-bottom:20px}
.std-groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(var(--ink-rgb),.1)}
.center-live-mob{display:none}
@media(max-width:900px){.center-live-mob{display:block}}
@media(max-width:1200px){.std-groups-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.std-groups-grid{grid-template-columns:1fr}}
.sg-group{background:#fff;padding:0}
.sg-hdr{background:#0A0A0A;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.sg-title{font-family:var(--font-bc);font-weight:700;font-size:13px;color:#C8A84B;letter-spacing:1px;text-transform:uppercase}
.sg-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f0ede6;font-size:12px}
.sg-row:last-child{border-bottom:none}
.sg-pos{font-family:var(--font-bc);font-weight:700;font-size:12px;color:#bbb;min-width:14px;text-align:center}
.sg-team{flex:1;font-family:var(--font-bc);font-weight:600;font-size:13px;color:#0A0A0A;text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.sg-stats{display:flex;gap:12px;font-family:var(--font-bc);font-size:12px;color:#666}
.sg-pts{font-family:var(--font-bc);font-weight:900;font-size:14px;color:#0A0A0A;min-width:18px;text-align:center}
.tier-q{border-left:3px solid #3EAD6A}
.tier-p{border-left:3px solid #C8A84B}
.tier-o{border-left:3px solid transparent}

/* ===== LEADERBOARD ===== */
.lb-wrap{display:flex;flex-direction:column;gap:1px;background:#ddd;margin-bottom:16px}
.lb-card{background:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.lb-card.me{background:#FFFBF2;border-left:3px solid #C8A84B;padding-left:11px}
.lb-rank{font-family:var(--font-bc);font-weight:700;font-size:13px;color:#bbb;min-width:22px;text-align:center}
.lb-nm{flex:1;font-family:var(--font-bc);font-weight:600;font-size:14px;color:#0A0A0A;text-transform:uppercase;letter-spacing:.3px}
.lb-sub{font-size:10px;color:#888;font-family:var(--font-bc);letter-spacing:.3px}
.lb-pts{font-family:var(--font-bc);font-weight:900;font-size:17px;color:#0A0A0A}

/* ===== BUTTONS ===== */
.btn-sm{padding:7px 14px;font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:1.5px solid #0A0A0A;background:transparent;color:#0A0A0A;transition:all .12s}
.btn-sm:hover{background:#0A0A0A;color:#C8A84B}
.btn-sm.gold{border-color:#C8A84B;color:#C8A84B}
.btn-sm.gold:hover{background:#C8A84B;color:#0A0A0A}
.btn-sm.red{border-color:#CC2929;color:#CC2929}
.btn-green{padding:8px 16px;background:#0A0A0A;color:#3EAD6A;border:none;font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer}

/* ===== PILLS ===== */
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill-row-nav{flex-wrap:nowrap;gap:4px;overflow:hidden}
.pill-row-nav .pill{flex:1 1 auto;min-width:0;text-align:center;padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{padding:5px 14px;font-family:var(--font-bc);font-weight:600;font-size:12px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:1.5px solid rgba(10,10,10,.15);color:rgba(10,10,10,.45);background:transparent;transition:all .12s}
.pill.on{border-color:#0A0A0A;color:#0A0A0A;background:transparent}
.pill.off{opacity:.6}

/* ===== SECTIONS ===== */
.sect{font-family:var(--font-bc);font-weight:700;font-size:22px;color:#0A0A0A;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #0A0A0A;padding-bottom:6px;margin-bottom:16px;line-height:1}

/* ===== INPUTS ===== */
.inp,.inp-light{width:100%;padding:10px 12px;border:1.5px solid rgba(10,10,10,.15);background:#fff;color:#0A0A0A;font-size:14px;font-family:var(--font-b);outline:none;border-radius:0;transition:border-color .12s}
.inp:focus,.inp-light:focus{border-color:#0A0A0A}
.ainp{width:100%;padding:10px 12px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:14px;font-family:var(--font-b);outline:none}
.ainp:focus{border-color:#C8A84B}
select.inp,select.inp-light{appearance:none;cursor:pointer}

/* ===== AUTH PAGE ===== */
.auth-page{min-height:100vh;background:#0A0A0A;display:flex;align-items:center;justify-content:center;padding:20px;background-image:repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(255,255,255,.015) 10px,rgba(255,255,255,.015) 11px)}
.auth-card{background:#141414;border:1px solid rgba(255,255,255,.08);padding:36px 32px;width:100%;max-width:380px}
.auth-hero{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.auth-hero img{width:40px;height:40px;object-fit:contain}
.auth-title{font-family:var(--font-bc);font-weight:700;font-size:22px;color:#C8A84B;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.auth-sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.5px;margin-top:2px}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border:1.5px solid #0A0A0A;padding:24px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-family:var(--font-bc);font-weight:700;font-size:20px;color:#0A0A0A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #0A0A0A}

/* ===== ALERT BOXES ===== */
.err-box{background:rgba(204,41,41,.08);border-left:3px solid #CC2929;padding:10px 14px;font-size:13px;color:#8B1C1C;margin:8px 0;font-family:var(--font-bc);font-weight:600;letter-spacing:.3px}
.suc-box{background:rgba(62,173,106,.08);border-left:3px solid #3EAD6A;padding:10px 14px;font-size:13px;color:#1e5e35;margin:8px 0;font-family:var(--font-bc);font-weight:600;letter-spacing:.3px}
.note-bar{background:var(--chrome-elev);border-left:3px solid #C8A84B;padding:10px 14px;font-size:12px;color:rgba(var(--ink-rgb),.65);font-family:var(--font-bc);letter-spacing:.3px}

/* ===== BRACKET ===== */
.bk-desktop{overflow-x:auto}
.bk-mob{display:none}
@media(max-width:900px){.bk-desktop{display:none}.bk-mob{display:block}}
.wk-box{background:#fff;border:1px solid #ddd;padding:4px 0}
.wk-hdr{font-family:var(--font-bc);font-size:9px;font-weight:700;color:#bbb;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;background:#F7F5F0;border-bottom:1px solid #eee}
.wk-team{padding:5px 8px;display:flex;align-items:center;gap:5px;font-family:var(--font-bc);font-weight:600;font-size:12px;color:#0A0A0A;letter-spacing:.3px}
.wk-tbd{color:#bbb}
.wk-sep{height:1px;background:#eee}
.wk-score{font-family:var(--font-bc);font-weight:900;font-size:13px;color:#0A0A0A;min-width:20px;text-align:right;margin-left:auto}
.wk-win{font-weight:900;color:#0A0A0A}
.bk-mob-card{background:#fff;border:1px solid #ddd;border-left:3px solid transparent;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.bk-mob-teams{display:flex;align-items:center;gap:10px}
.bk-mob-team{flex:1;font-family:var(--font-bc);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.3px;color:#0A0A0A}
.bk-mob-grid{display:flex;flex-direction:column;gap:6px}

/* ===== LEAGUE ===== */
.lg-card{background:#fff;border:1px solid #ddd;padding:14px;margin-bottom:8px;cursor:pointer}
.lg-code{font-family:'Courier New',monospace;font-size:18px;font-weight:700;color:#C8A84B;letter-spacing:3px;margin:8px 0 4px}
.lg-sel-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:#F7F5F0;border:1px solid #d8d4cb;border-radius:10px}
.lg-sel-row .pill{border-color:rgba(10,10,10,.22)}

/* ===== FUN / MISC ===== */
.fun-card{background:#fff;border:1px solid #ddd;padding:14px;margin-bottom:8px}
.pre-card{background:#fff;border:1px solid #ddd;padding:16px;margin-bottom:10px}
.h2h-row{display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid #f0ede6}
.scoring-hint{font-size:11px;color:#888;padding:12px 0;font-family:var(--font-bc);letter-spacing:.3px}
.empty{text-align:center;padding:40px 20px;color:rgba(10,10,10,.4)}
.tier-hdr{font-family:var(--font-bc);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;padding:6px 0 3px;color:#888}
.pred-third-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pred-third-btn{padding:5px 12px;font-family:var(--font-bc);font-weight:600;font-size:12px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#0A0A0A}
.pred-third-btn.selected{border-color:#0A0A0A;background:#0A0A0A;color:#C8A84B}
.pred-third-count{font-size:11px;color:#888;font-family:var(--font-bc);margin-bottom:10px}
.pred-third-btn.picked{border-color:#2E9E5A;background:rgba(46,158,90,.16);color:#1f7a43}
.pred-grp-tag{font-family:var(--font-bc);font-weight:700;font-size:10px;color:#C8A84B;border:1px solid rgba(200,168,75,.4);padding:1px 5px;margin-left:4px}
.divider{height:1px;background:rgba(var(--ink-rgb),.12);margin:20px 0}
/* ===== PREDIKCIÓ FÜL ===== */
.pred-group-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,auto);grid-auto-flow:column;gap:10px;margin-bottom:8px}
@media(max-width:1000px){.pred-group-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:auto;grid-auto-flow:row}}
@media(max-width:560px){.pred-group-grid{grid-template-columns:1fr}}
.pred-group-card{background:var(--bg-card);border:1px solid var(--border)}
.pred-group-card.done{border-color:rgba(200,168,75,.4)}
.pred-group-h{background:#0A0A0A;font-family:var(--font-bc);font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#C8A84B;padding:7px 12px}
.pred-team-grid{display:flex;flex-direction:column}
.pred-team-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 12px;border:none;border-left:3px solid transparent;background:none;cursor:pointer;border-bottom:1px solid rgba(var(--ink-rgb),.06);text-align:left;transition:background .12s}
.pred-team-btn:last-child{border-bottom:none}
.pred-team-btn:hover{background:rgba(var(--ink-rgb),.04)}
.pred-team-btn.picked{border-left-color:#C8A84B;background:rgba(200,168,75,.08)}
.pred-team-btn.rank-1,.pred-team-btn.rank-2{border-left-color:#2E9E5A;background:rgba(46,158,90,.10)}
.pred-team-btn.rank-3{border-left-color:#C8A84B;background:rgba(200,168,75,.10)}
.pred-team-btn.rank-4{border-left-color:#e63329;background:rgba(230,51,41,.10)}
.pred-team-nm{font-family:var(--font-bc);font-weight:600;font-size:14px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-color);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pred-rank-badge{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-family:var(--font-bc);font-weight:900;font-size:12px;flex-shrink:0;color:rgba(var(--ink-rgb),.5);border:1px solid rgba(var(--ink-rgb),.2)}
.pred-rank-badge.r1{background:#2E9E5A;color:#fff;border:none}
.pred-rank-badge.r2{background:#2E9E5A;color:#fff;border:none}
.pred-rank-badge.r3{background:#C8A84B;color:#0A0A0A;border:none}
.pred-rank-badge.r4{background:#e63329;color:#fff;border:none}
.pred-round-block{margin-bottom:14px}
.pred-round-h{font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(var(--ink-rgb),.45);margin-bottom:6px}
.pred-ko-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:8px;margin-bottom:7px}
.pred-ko-row.pending{display:block;font-family:var(--font-bc);font-size:12px;color:rgba(var(--ink-rgb),.3);padding:8px 12px;border:1px dashed rgba(var(--ink-rgb),.12)}
.pred-ko-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid rgba(var(--ink-rgb),.15);background:var(--bg-card);cursor:pointer;font-family:var(--font-bc);font-weight:600;font-size:13px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-color)}
.pred-ko-btn:hover{border-color:rgba(200,168,75,.4)}
.pred-ko-btn.picked{border-color:#C8A84B;background:rgba(200,168,75,.12);color:#C8A84B}
.pred-ko-row .pred-ko-btn:last-child{justify-content:flex-end}
.pred-ko-row.final .pred-ko-btn{border-color:rgba(200,168,75,.35)}
.pred-ko-vs{display:flex;align-items:center;justify-content:center;font-family:var(--font-bc);color:rgba(var(--ink-rgb),.3);font-size:13px}
.pred-champion{margin-top:10px;background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.4);border-left:3px solid #C8A84B;padding:12px 16px;font-family:var(--font-bc);font-weight:700;font-size:16px;letter-spacing:.5px;text-transform:uppercase;color:#C8A84B;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ===== NOTIF / COOKIE ===== */
.cookie-bar{position:fixed;bottom:0;left:0;right:0;background:#0A0A0A;border-top:3px solid #C8A84B;padding:14px 20px;z-index:300;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.cookie-bar p{font-size:12px;color:rgba(255,255,255,.7);font-family:var(--font-b)}
.notif-btn{padding:6px 14px;font-family:var(--font-bc);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}

/* ===== PROFILE ===== */
.prof-av-sel{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.prof-av-btn{width:40px;height:40px;font-size:22px;background:#F2F0EB;border:1.5px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s}
.prof-av-btn.sel{border-color:#0A0A0A;background:#fff}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ddd}

/* ===== LOADING ===== */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0A0A0A;flex-direction:column;gap:16px}
.loading-screen p{font-family:var(--font-bc);font-size:12px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}

/* ===== ADMIN ===== */
.admin-wrap{padding:0}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}

/* ===== MOBILE NAV (hidden on desktop) ===== */
.mobile-nav{display:none;background:#0A0A0A;border-top:3px solid #C8A84B;position:sticky;bottom:0;z-index:50}
@media(max-width:900px){
  .mobile-nav{display:flex}
  .bc-topbar .bc-nav{display:none}
}
.mn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer}
.mn-item svg{width:20px;height:20px;stroke:rgba(255,255,255,.3);stroke-width:1.8;fill:none}
.mn-item span{font-family:var(--font-bc);font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.mn-item.on svg{stroke:#C8A84B}
.mn-item.on span{color:#C8A84B}
.mn-item.on::before{content:'';display:block;width:4px;height:4px;border-radius:50%;background:#C8A84B;margin-bottom:2px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

function tipCategory(tip,res,stage){
  if(!tip||!res||res.homeGoals==null)return null;
  const th=parseInt(tip.homeGoals),ta=parseInt(tip.awayGoals),rh=parseInt(res.homeGoals),ra=parseInt(res.awayGoals);
  if(isNaN(th)||isNaN(ta)||isNaN(rh)||isNaN(ra))return null;
  const gr=(h,a)=>h>a?'1':h===a?'X':'2';
  const tR=gr(th,ta),rR=gr(rh,ra),tGD=th-ta,rGD=rh-ra;
  if(th===rh&&ta===ra)return'p8';
  if(rR!=='X'&&tR===rR&&tGD===rGD)return'p5'; // döntetlennél a GK mindig 0, így nem számít önálló találatnak
  if(tR===rR)return'p3';
  if(th===rh||ta===ra)return'p1';
  return'p0';
}
function calcPts(tip,res,stage,cfg=DS){
  const cat=tipCategory(tip,res,stage);if(cat===null)return null;
  const base={p8:cfg.perfect,p5:cfg.resultGD,p3:cfg.result,p1:cfg.oneGoal,p0:0}[cat]||0;
  return KO.includes(stage)?base*(cfg.ko??2):base;
}
function ptsCat(tip,res,stage,cfg=DS){
  return tipCategory(tip,res,stage);
}
function calcUser(uid,tips,results,mt,special,adminSpec,cfg=DS){
  let pts=0,tipped=0,fin=0,pf=0,rgd=0,res3=0,og=0;
  ALL.forEach(m=>{
    const t=tips[`${uid}_${m.id}`],r=results[m.id];
    if(!t)return;tipped++;if(!r)return;fin++;
    const p=calcPts(t,r,m.stage,cfg)||0;pts+=p;
    const cat=ptsCat(t,r,m.stage,cfg);
    if(cat==='p8')pf++;else if(cat==='p5')rgd++;else if(cat==='p3')res3++;else if(cat==='p1')og++;
  });
  const uw=special?.[`${uid}_w`],ut=special?.[`${uid}_t`];
  const wPts=adminSpec?.winner&&uw===adminSpec.winner?cfg.winner:0;
  const tPts=adminSpec?.top&&ut&&ut.toLowerCase().trim()===adminSpec.top?.toLowerCase().trim()?cfg.topScorer:0;
  pts+=wPts+tPts;
  return{pts,tipped,fin,pf,rgd,res3,og,wPts,tPts};
}
function calcStd(gid,results,mt){
  const grp=GD.find(g=>g.id===gid);
  const teams=grp.teams.map(n=>({n,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
  ALL.filter(m=>m.group===gid).forEach(m=>{
    const r=results[m.id];if(!r)return;
    const ov=mt?.[m.id],hN=ov?.home||m.home,aN=ov?.away||m.away;
    const h=teams.find(t=>t.n===hN),a=teams.find(t=>t.n===aN);if(!h||!a)return;
    const rh=parseInt(r.homeGoals),ra=parseInt(r.awayGoals);
    h.p++;a.p++;h.gf+=rh;h.ga+=ra;a.gf+=ra;a.ga+=rh;
    if(rh>ra){h.w++;h.pts+=3;a.l++;}else if(rh===ra){h.d++;h.pts++;a.d++;a.pts++;}else{a.w++;a.pts+=3;h.l++;}
    h.gd=h.gf-h.ga;a.gd=a.gf-a.ga;
  });
  return teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

async function applyFinishedMatches(apiMatches){
  const nr={...S.results};
  const live={};
  const wcIds={...S.wcIds||{}};
  const applied=[];
  apiMatches.forEach(am=>{
    const isSportAPI=am.h!=null||am.finished!=null;
    let huHome,huAway,hGoal,aGoal,isLive,isFinished;
    if(isSportAPI){
      huHome=am.home; huAway=am.away;
      hGoal=am.h??0; aGoal=am.a??0;
      isLive=am.live===true;
      isFinished=am.finished===true||am.status==='finished';
    } else {
      huHome=matchTeamByEng(am.home); huAway=matchTeamByEng(am.away);
      hGoal=am.homeScore??am.score?.fullTime?.home??0;
      aGoal=am.awayScore??am.score?.fullTime?.away??0;
      isLive=['IN_PLAY','PAUSED','inprogress'].includes(am.status);
      isFinished=['FINISHED','finished','Ended'].includes(am.status);
    }
    if(!huHome||!huAway)return;
    const lm=ALL.find(m=>{
      const mHome=S.mt[m.id]?.home||m.home;
      const mAway=S.mt[m.id]?.away||m.away;
      return (mHome===huHome&&mAway===huAway)||(mHome===huAway&&mAway===huHome);
    });
    if(!lm)return;
    const flip=(S.mt[lm.id]?.home||lm.home)===huAway;
    const h=flip?aGoal:hGoal, a=flip?hGoal:aGoal;
    if(isFinished&&!nr[lm.id]){
      nr[lm.id]={homeGoals:h,awayGoals:a};
      applied.push({mid:lm.id,home:lm.home,away:lm.away,h,a});
    } else if(isLive){
      // Gól detektálás: ha az állás változott az előző live állapothoz képest
      const prev=S.live[lm.id];
      if(prev&&(h!==prev.h||a!==prev.a)){
        const scorer=h>prev.h?lm.home:lm.away;
        const newH=lm.home===huHome?h:a, newA=lm.home===huHome?a:h;
        pushGoalNotif(lm,newH,newA,scorer,am.minute||'');
      }
      live[lm.id]={h,a,status:am.status,desc:am.desc||am.status,minute:am.minute||''};
    }
    if(am.matchId) wcIds[lm.id]=am.matchId;
  });

  // Eltűnés detektálás: ami VOLT élő de most NEM szerepel a feedben → valószínűleg vége
  const prevLive=S.live||{};
  const nowLiveIds=new Set(Object.keys(live).map(Number));
  Object.entries(prevLive).forEach(([mid,sc])=>{
    const matchId=parseInt(mid);
    if(nowLiveIds.has(matchId))return; // még mindig élő
    if(nr[matchId])return; // már van eredmény
    const m=ALL.find(x=>x.id===matchId);
    if(!m)return;
    const koTime=S.ko[m.id]||m.koDefault;
    if(!koTime)return;
    // Ha 100+ perce kezdődött és eltűnt a live feedből → befejezettnek vesszük
    const elapsed=(Date.now()-new Date(koTime).getTime())/60000;
    if(elapsed>=100){
      nr[matchId]={homeGoals:sc.h,awayGoals:sc.a};
      applied.push({mid:matchId,home:m.home,away:m.away,h:sc.h,a:sc.a});
    }
  });

  const tasks=[sS('wc_live',{updatedAt:new Date().toISOString(),scores:live},true)];
  if(applied.length)tasks.push(sS('wc_r',nr,true));
  if(Object.keys(wcIds).length)tasks.push(sS('wc_ids',wcIds,true));
  await Promise.all(tasks);
  SS({wcIds});
  if(applied.length){SS({results:nr});await autoFillKnockoutTeams();}
  return{applied,results:applied.length?nr:S.results,live};
}

async function syncKickoffTimes(apiMatches){
  const koUpdates={};
  const CDT_VENUES=new Set(['Houston','Kansas City','Arlington','Guadalupe','Mexikóváros']);
  apiMatches.forEach(am=>{
    // Új API: kickoff mező; régi API: utcDate mező
    let kickoff=am.kickoff||am.utcDate;
    if(!kickoff)return;
    const huHome=am.home||(am.homeEn?matchTeamByEng(am.homeEn):null);
    const huAway=am.away||(am.awayEn?matchTeamByEng(am.awayEn):null);
    if(!huHome||!huAway)return;
    // Keresés az összes meccsben (group + KO)
    const lm=ALL.find(m=>{
      const mHome=S.mt[m.id]?.home||m.home;
      const mAway=S.mt[m.id]?.away||m.away;
      return (mHome===huHome&&mAway===huAway)||(mHome===huAway&&mAway===huHome);
    });
    if(!lm)return;
    // Egységes -1h korrekció: az API minden (észak-amerikai) helyszínre 1 órával késő időt ad
    { const dt=new Date(kickoff); dt.setHours(dt.getHours()-1); kickoff=dt.toISOString(); }
    const cur=S.ko[lm.id]||lm.koDefault;
    if(cur&&new Date(kickoff).getTime()!==new Date(cur).getTime())
      koUpdates[lm.id]=kickoff;
    else if(!cur)
      koUpdates[lm.id]=kickoff;
  });
  const n=Object.keys(koUpdates).length;
  if(n){
    const newKo={...S.ko,...koUpdates};
    await sS('wc_ko',newKo,true);
    SS({ko:newKo});
  }
  return n;
}

    const diff=Math.max(0,new Date(S.ko[nextM.id]||nextM.koDefault).getTime()-Date.now());
    const h=Math.floor(diff/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);

  }

    ctx.fillRect(pad-10,y,w-2*(pad-10),rowH-6);
    ctx.fillStyle=i===0?'#c9a84c':i===1?'#c7c7c7':i===2?'#cd7f32':'rgba(var(--ink-rgb),.8)';

    ctx.fillText(i<3?['🥇','🥈','🥉'][i]:`${i+1}.`,pad,y+34);

    ctx.fillText(u.dn,pad+54,y+27);
    ctx.fillStyle='rgba(var(--ink-rgb),.5)';ctx.font='11.5px sans-serif';
    ctx.fillText(`⭐${u.pf}  🎯${u.rgd}  ✓${u.res3}  ·  ${u.tipped} tipp`,pad+54,y+46);
    ctx.fillStyle='#c9a84c';ctx.font='bold 21px sans-serif';ctx.textAlign='right';
    ctx.fillText(`${u.pts}p`,w-pad,y+35);ctx.textAlign='left';
  });
  c.toBlob(blob=>{
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=`vb2026_${lgN.replace(/\s+/g,'_')}_tabella.png`;

function getLbBoard(){
  const cfg=getLgCfg(),effLg=getEffectiveLgId();
  const eff=(S.lbMode==='official')?S.results:getEffectiveResults();

  const lgN=effLg?S.leagues.find(l=>l.id===effLg)?.name:'Összesített';
  const board=S.users.filter(u=>!u.isAdmin&&(!fIds||fIds.includes(u.id))).map(u=>{
    const r=calcUser(u.id,S.tips,eff,S.mt,S.special,S.adminSpec,cfg);return{...u,...r};

}

async function syncKickoffsFromAPI(){
  SS({kickoffLoading:true});
  // CDT helyszínek: az API 1 órával késő UTC-t ad vissza (CDT-t UTC-ként kezeli)
  const CDT_VENUES=new Set(['Houston','Kansas City','Arlington','Guadalupe','Mexikóváros']);
  try{
    const base=location.hostname.includes('netlify')?'':'https://vb2026-endre.netlify.app';
    const r=await fetch(`${base}/.netlify/functions/kickoffs`);
    const d=await r.json();
    if(!d.matches||!d.count){SS({kickoffLoading:false});return;}
    const newKo={...S.ko};
    let updated=0;
    d.matches.forEach(am=>{
      if(!am.kickoff||!am.home||!am.away)return;
      const lm=ALL.find(m=>{
        const mH=S.mt[m.id]?.home||m.home, mA=S.mt[m.id]?.away||m.away;
        return (mH===am.home&&mA===am.away)||(mH===am.away&&mA===am.home);
      });
      if(!lm)return;
      let kickoff=am.kickoff;
      // Egységes -1h korrekció: az API minden (észak-amerikai) helyszínre 1 órával késő időt ad
      { const dt=new Date(kickoff); dt.setHours(dt.getHours()-1); kickoff=dt.toISOString(); }
      newKo[lm.id]=kickoff;
      updated++;
    });
    await sS('wc_ko',newKo,true);
    SS({ko:newKo,kickoffSynced:updated,kickoffLoading:false});
  }catch(e){SS({kickoffLoading:false});}
}

let _bkResizeBound=false;
function fitBrackets(){
  document.querySelectorAll('.bk-scale').forEach(inner=>{
    const wrap=inner.closest('.bk-desktop');
    if(!wrap)return;
    inner.style.transform='none';
    const natW=Math.max(inner.offsetWidth,inner.scrollWidth);
    const availW=wrap.clientWidth;
    if(!natW||!availW){return;}
    const sc=Math.min(1,availW/natW);
    inner.style.transformOrigin='top left';
    inner.style.transform='scale('+sc+')';
    wrap.style.overflow='hidden';
    wrap.style.height=(inner.offsetHeight*sc)+'px';
  });
}
function bindBracketResize(){
  if(_bkResizeBound)return; _bkResizeBound=true;
  let raf=null;
  window.addEventListener('resize',()=>{ if(raf)cancelAnimationFrame(raf); raf=requestAnimationFrame(fitBrackets); });
}

function next24h(){
  const now=Date.now(),in24h=now+24*60*60*1000;
  return ALL.filter(m=>{
    if(m.tbd&&!S.mt[m.id])return false;
    if(S.results[m.id])return false;
    const ko=S.ko[m.id]||m.koDefault;
    if(!ko)return false;
    const kt=new Date(ko).getTime();
    return kt>=now&&kt<=in24h;
  }).sort((a,b)=>new Date(S.ko[a.id]||a.koDefault)-new Date(S.ko[b.id]||b.koDefault));
}

function rGroupForecast(){
  const allTips=S.tips,users=S.users.filter(u=>!u.isAdmin);
  if(!users.length)return '';
  // Melyik csapatot tippelik legjobban továbbjutni csoportonként
  const forecastData=GD.map(g=>{
    const counts={};
    g.teams.forEach(tm=>{counts[tm]={top2:0,total:0};});
    users.forEach(u=>{
      const uid=u.id;
      g.teams.forEach((tm,pos)=>{
        // Számoljuk minden meccsüket a csoportban
        const gMs=ALL.filter(m=>m.group===g.id&&(m.home===tm||m.away===tm));
        let pts=0,played=0;
        gMs.forEach(m=>{
          const tip=allTips[`${uid}_${m.id}`];
          if(!tip)return;
          played++;
          const isHome=m.home===tm;
          const gs=isHome?tip.homeGoals:tip.awayGoals,gc=isHome?tip.awayGoals:tip.homeGoals;
          if(gs>gc)pts+=3;else if(gs===gc)pts+=1;
        });
        if(played>0)counts[tm].total++;
        counts[tm]._pts=(counts[tm]._pts||0)+pts;
      });
    });
    const sorted=g.teams.slice().sort((a,b)=>(counts[b]._pts||0)-(counts[a]._pts||0));
    return{g:g.id,sorted,counts};
  });
  return `<div class="std-card" style="margin-top:16px">
    <div class="std-head"><span class="std-glbl">🔮 Csoport előrejelzés</span><span class="std-t" style="font-size:11px;color:rgba(var(--ink-rgb),.4)">(tippek alapján)</span></div>
    <div style="display:flex;flex-wrap:nowrap;gap:8px;padding:4px 0 8px">
      ${forecastData.map(({g,sorted,counts})=>`
        <div style="flex:1 1 0;min-width:0;background:rgba(var(--ink-rgb),.04);border-radius:10px;padding:9px 8px">
          <div style="font-size:11px;font-weight:700;color:var(--c-gold);margin-bottom:7px">${g}. csoport</div>
          ${sorted.map((tm,i)=>{
            const bar=Math.round((counts[tm]._pts||0)/Math.max(...sorted.map(t=>counts[t]._pts||1))*100);
            return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span class="adot ${i<2?'g':i===2?'o':'r'}" style="flex-shrink:0"></span>
              ${fImg(tm,14)}
              <span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${teamName(tm)}</span>
              <div style="width:30px;height:4px;background:rgba(var(--ink-rgb),.1);border-radius:2px;flex-shrink:0"><div style="width:${bar}%;height:100%;background:${i<2?'#00b050':i===2?'#c9a84c':'#e8212a'};border-radius:2px"></div></div>
            </div>`;
          }).join('')}
        </div>`).join('')}
    </div>
  </div>`;
}

function predTeamsForFifaNum(fifaNum,r32,cache){

async function savePredKO(fifaNum,side){
  // Downstream meccsek meghatározása WINNER_SOURCES alapján
  const down=new Set();
  const q=[fifaNum];
  while(q.length){
    const cur=q.shift();
    for(const[t,srcs] of Object.entries(WINNER_SOURCES)){
      if(srcs.includes(cur)){
        const tn=parseInt(t);
        if(!down.has(tn)){down.add(tn);q.push(tn);}
      }
    }
  }
  // Bronz is reset ha az elődöntők érintve vannak
  if(down.has(101)||down.has(102))down.add(103);
  // Toggle: ha ugyanaz kattintva újra → töröl
  const isSame=S.predKO[fifaNum]===side;
  const nko={};
  Object.entries(S.predKO).forEach(([k,v])=>{
    const kn=parseInt(k);
    if(kn!==fifaNum&&!down.has(kn))nko[k]=v;
  });
  if(!isSame)nko[fifaNum]=side;
  SS({predKO:nko});
  await savePredict();
}

function fifaNumOf(m){
  if(m.stage==='r32')return 72+m.mn;
  if(m.stage==='r16')return 88+m.mn;
  if(m.stage==='qf')return 96+m.mn;
  if(m.stage==='sf')return 100+m.mn;
  if(m.stage==='bronze')return 103;
  if(m.stage==='final')return 104;

function byFifaNum(fn){
  if(fn>=73&&fn<=88)return ALL.find(m=>m.stage==='r32'&&m.mn===fn-72)||null;
  if(fn>=89&&fn<=96)return ALL.find(m=>m.stage==='r16'&&m.mn===fn-88)||null;
  if(fn>=97&&fn<=100)return ALL.find(m=>m.stage==='qf'&&m.mn===fn-96)||null;
  if(fn===101)return ALL.find(m=>m.stage==='sf'&&m.mn===1)||null;
  if(fn===102)return ALL.find(m=>m.stage==='sf'&&m.mn===2)||null;
  if(fn===103)return ALL.find(m=>m.stage==='bronze')||null;
  if(fn===104)return ALL.find(m=>m.stage==='final')||null;
  return null;

function rankInScope(targetUid,memberIds,cfg,eff){
  const board=S.users.filter(u=>!u.isAdmin&&(!memberIds||memberIds.includes(u.id))).map(u=>{

  }).sort((a,b)=>b.pts-a.pts||b.pf-a.pf||b.rgd-a.rgd||b.tipped-a.tipped);
  const idx=board.findIndex(b=>b.id===targetUid);
  return{rank:idx+1,total:board.length,pts:board[idx]?.pts||0};
}

function rFun(){
  const uid=S.user.id,eff=getEffectiveResults(),users=S.users.filter(u=>!u.isAdmin),cfg=DS;
  // ── 1. Napi kihívás ──────────────────────────────────────────────────────
  const todayStr=new Date().toISOString().slice(0,10);
  const todayMs=ALL.filter(m=>{
    const ko=S.ko[m.id]||m.koDefault;
    return ko&&ko.startsWith(todayStr)&&eff[m.id];
  });
  const dailyBoard=todayMs.length?users.map(u=>{
    let pts=0,tips=0;
    todayMs.forEach(m=>{
      const tip=S.tips[`${u.id}_${m.id}`],r=eff[m.id];
      if(tip&&r){pts+=calcPts(tip,r,m.stage,cfg)||0;tips++;}
    });
    return{...u,pts,tips};
  }).filter(u=>u.tips>0).sort((a,b)=>b.pts-a.pts||b.tips-a.tips):[];

  // ── 2. Forma tracker (utolsó 8 értékelt meccs) ───────────────────────────
  const evalMs=ALL.filter(m=>eff[m.id]).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,20);
  const formaData=users.map(u=>{
    const last=[];
    for(const m of evalMs){
      const tip=S.tips[`${u.id}_${m.id}`],r=eff[m.id];
      if(!tip||!r)continue;
      const cat=ptsCat(tip,r,m.stage,cfg);
      last.push(cat);
      if(last.length>=8)break;
    }
    return{...u,forma:last.reverse()};
  }).filter(u=>u.forma.length>=3).sort((a,b)=>{
    const score=f=>f.forma.reduce((s,c)=>s+({p8:4,p5:3,p3:2,p1:1,p0:0}[c]||0),0);
    return score(b)-score(a);
  });

  // ── 3. Bolondok fala ─────────────────────────────────────────────────────
  const allTips=[];
  users.forEach(u=>{
    ALL.forEach(m=>{

      if(!tip||!r||r.live)return;
      const ov=S.mt[m.id],home=ov?.home||m.home,away=ov?.away||m.away;
      const diff=Math.abs((tip.homeGoals-tip.awayGoals)-(r.homeGoals-r.awayGoals));
      const totalDiff=Math.abs(tip.homeGoals-r.homeGoals)+Math.abs(tip.awayGoals-r.awayGoals);
      const pts=calcPts(tip,r,m.stage,cfg)||0;
      allTips.push({u,m,tip,r,home,away,diff,totalDiff,pts,cat:ptsCat(tip,r,m.stage,cfg)});

  const worst=allTips.filter(x=>x.totalDiff>=4).sort((a,b)=>b.totalDiff-a.totalDiff).slice(0,5);
  const best=allTips.filter(x=>x.cat==='p8').sort((a,b)=>b.pts-a.pts).slice(0,5);

      const myP=calcPts(myTip,r,m.stage,cfg)||0,oppP=calcPts(oppTip,r,m.stage,cfg)||0;

function showMsg(id,text){
  let el=document.getElementById('globalToast');
  if(!el){el=document.createElement('div');el.id='globalToast';el.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#0A0A0A;color:#fff;font-family:var(--font-bc);font-weight:600;font-size:13px;letter-spacing:.5px;padding:10px 18px;border-radius:10px;z-index:99999;opacity:0;transition:opacity .2s;box-shadow:0 6px 24px rgba(0,0,0,.35);pointer-events:none';document.body.appendChild(el);}
  el.textContent=text;
  requestAnimationFrame(()=>{el.style.opacity='1';});
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';},2200);
}
function fallbackCopy(text){
  try{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);showMsg('shareDone','\u2713 V\u00e1g\u00f3lapra m\u00e1solva!');}
  catch(e){showMsg('shareErr','A megoszt\u00e1s nem siker\u00fclt');}
}
function copyShare(text){
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(()=>showMsg('shareDone','\u2713 V\u00e1g\u00f3lapra m\u00e1solva!')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function shareTips(){
  const uid=S.user.id,eff=getEffectiveResults(),cfg=DS;
  const tipped=ALL.filter(m=>S.tips[`${uid}_${m.id}`]);
  let tp=0;
  tipped.forEach(m=>{const r=eff[m.id];if(r)tp+=calcPts(S.tips[`${uid}_${m.id}`],r,m.stage,cfg)||0;});
  const uw=S.special?.[`${uid}_w`],ut=S.special?.[`${uid}_t`];
  const url=location.href.split('?')[0];
  const text=`🏆 VB 2026 Tippelő\n👤 ${S.user.dn}\n📊 ${tipped.length} tipp · ${tp} pont${uw?'\n🏆 Győztes: '+teamName(uw):''}${ut?'\n⚽ Gólkirály: '+ut:''}\n${url}`;
  if(navigator.share){
    navigator.share({title:'VB 2026 Tippelő',text,url}).catch(err=>{ if(err&&err.name==='AbortError')return; copyShare(text); });
  } else {
    copyShare(text);
  }
}

// Push értesítések
async function togglePushNotif(){
  if(!('Notification' in window)){alert('A böngésző nem támogatja az értesítéseket.');return;}
  if(Notification.permission==='denied'){alert('Az értesítések le vannak tiltva. Engedélyezd a böngésző beállításaiban.');return;}
  if(Notification.permission==='granted'&&S.notifOn){
    SS({notifOn:false});
    await sS('wc_notif_'+S.user.id,false,false);
    render();return;
  }
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    SS({notifOn:true});
    await sS('wc_notif_'+S.user.id,true,false);
    scheduleNotifs();
    render();
    new Notification('VB 2026 Tippelő 🏆',{body:'Az értesítések be vannak kapcsolva! Értesítünk a meccsek előtt.',icon:'/trophy.png'});
  }
}
function scheduleNotifs(){
  if(!S.notifOn||Notification.permission!=='granted')return;
  const now=Date.now();
  ALL.forEach(m=>{
    const ko=S.ko[m.id]||m.koDefault;
    if(!ko)return;
    const koMs=new Date(ko).getTime();
    const delay30=koMs-30*60*1000-now; // 30 perccel előtte
    const delay5=koMs-5*60*1000-now;   // 5 perccel előtte (utolsó tipp)
    const ov=S.mt[m.id],home=ov?.home||m.home,away=ov?.away||m.away;
    const hasTip=!!S.tips[`${S.user.id}_${m.id}`];
    if(delay30>0&&delay30<24*3600*1000){
      setTimeout(()=>{
        if(Notification.permission!=='granted')return;
        new Notification(`⚽ ${teamName(home)} – ${teamName(away)}`,{body:`30 perc múlva kezdődik!${!hasTip?' 📝 Még nincs tipped!':''}`,icon:'/trophy.png'});
      },delay30);
    }
    if(delay5>0&&delay5<24*3600*1000&&!hasTip){
      setTimeout(()=>{
        if(Notification.permission!=='granted')return;
        new Notification(`⚠️ ${teamName(home)} – ${teamName(away)}`,{body:'5 perc múlva zár a tippelés! Adj le tippet!',icon:'/trophy.png'});
      },delay5);
    }
  });
}

// Live frissítés: 60mp-ként, force=true ha van élő meccs
setInterval(()=>{
  if(!S.user)return;
  const hasLive=Object.keys(S.live||{}).length>0;
  refreshLiveIfStale(hasLive);
},60*1000);
setInterval(async()=>{
  if(!S.user)return;
  try{
    const[r,t,sp,lg,mt,ko,live]=await Promise.all([sG('wc_r',true),sG('wc_t',true),sG('wc_sp',true),sG('wc_lg',true),sG('wc_mt',true),sG('wc_ko',true),sG('wc_live',true)]);
    SS({results:r||S.results,tips:t||S.tips,special:sp||S.special,leagues:lg||S.leagues,mt:mt||S.mt,ko:ko||S.ko,live:live?.scores||S.live,liveUpdatedAt:live?.updatedAt||S.liveUpdatedAt});
    refreshLiveIfStale();
    if(S.user?.isAdmin)autoFillKnockoutTeams();
  }catch(e){}
},30000);

_r=render;render();init();
</script>
