function tipCategory(tip,res,stage){
  if(!tip||!res||res.homeGoals==null)return null;
  const th=parseInt(tip.homeGoals),ta=parseInt(tip.awayGoals),rh=parseInt(res.homeGoals),ra=parseInt(res.awayGoals);
  if(isNaN(th)||isNaN(ta)||isNaN(rh)||isNaN(ra))return null;
  const gr=(h,a)=>h>a?'1':h===a?'X':'2';
  const tR=gr(th,ta),rR=gr(rh,ra),tGD=th-ta,rGD=rh-ra;
  if(th===rh&&ta===ra)return'p8';
  if(rR!=='X'&&tR===rR&&tGD===rGD)return'p5'; // döntetlennél a GK mindig 0, így nem számít önálló találatnak
  if(tR===rR)return'p3';
  if(th===rh||ta===ra)return'p1';
  return'p0';
}
function calcPts(tip,res,stage,cfg=DS){
  const cat=tipCategory(tip,res,stage);if(cat===null)return null;
  const base={p8:cfg.perfect,p5:cfg.resultGD,p3:cfg.result,p1:cfg.oneGoal,p0:0}[cat]||0;
  return KO.includes(stage)?base*(cfg.ko??2):base;
}
function ptsCat(tip,res,stage,cfg=DS){

}
function calcUser(uid,tips,results,mt,special,adminSpec,cfg=DS){

    const p=calcPts(t,r,m.stage,cfg)||0;pts+=p;
    const cat=ptsCat(t,r,m.stage,cfg);
    if(cat==='p8')pf++;else if(cat==='p5')rgd++;else if(cat==='p3')res3++;else if(cat==='p1')og++;
  });

function calcStd(gid,results,mt){
  const grp=GD.find(g=>g.id===gid);
  const teams=grp.teams.map(n=>({n,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
  ALL.filter(m=>m.group===gid).forEach(m=>{
    const r=results[m.id];if(!r)return;
    const ov=mt?.[m.id],hN=ov?.home||m.home,aN=ov?.away||m.away;
    const h=teams.find(t=>t.n===hN),a=teams.find(t=>t.n===aN);if(!h||!a)return;
    const rh=parseInt(r.homeGoals),ra=parseInt(r.awayGoals);
    h.p++;a.p++;h.gf+=rh;h.ga+=ra;a.gf+=ra;a.ga+=rh;
    if(rh>ra){h.w++;h.pts+=3;a.l++;}else if(rh===ra){h.d++;h.pts++;a.d++;a.pts++;}else{a.w++;a.pts+=3;h.l++;}
    h.gd=h.gf-h.ga;a.gd=a.gf-a.ga;
  });
  return teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

async function applyFinishedMatches(apiMatches){
  const nr={...S.results};
  const live={};
  const applied=[];
  apiMatches.forEach(am=>{
    const huHome=matchTeamByEng(am.home),huAway=matchTeamByEng(am.away);
    if(!huHome||!huAway)return;
    const lm=ALL.find(m=>m.stage==='group'&&((m.home===huHome&&m.away===huAway)||(m.home===huAway&&m.away===huHome)));
    if(!lm||nr[lm.id])return;
    const flip=lm.home===huAway;
    if(am.status==='FINISHED'&&am.homeScore!=null&&am.awayScore!=null){
      const h=flip?am.awayScore:am.homeScore,a=flip?am.homeScore:am.awayScore;
      nr[lm.id]={homeGoals:h,awayGoals:a};
      applied.push({mid:lm.id,home:lm.home,away:lm.away,h,a});
    }else if((am.status==='IN_PLAY'||am.status==='PAUSED')&&am.homeScore!=null&&am.awayScore!=null){
      live[lm.id]={h:flip?am.awayScore:am.homeScore,a:flip?am.homeScore:am.awayScore,status:am.status};
    }
  });
  const tasks=[sS('wc_live',{updatedAt:new Date().toISOString(),scores:live},true)];
  if(applied.length)tasks.push(sS('wc_r',nr,true));
  await Promise.all(tasks);
  return{applied,results:applied.length?nr:S.results,live};
}
async function fetchLiveScores(){
  SS({liveLoading:true,liveErr:'',liveFound:[],liveDebug:null});

    const resp=await fetch('/.netlify/functions/livescores');

    if(!resp.ok||data.error){SS({liveLoading:false,liveErr:data.error||'Hiba történt a lekérés során.'});return;}
    const byStatus={};
    (data.matches||[]).forEach(am=>{byStatus[am.status]=(byStatus[am.status]||0)+1;});
    const{applied,results,live}=await applyFinishedMatches(data.matches||[]);
    const koCount=await syncKickoffTimes(data.matches||[]);
    SS({liveLoading:false,liveFound:applied,results,live,liveUpdatedAt:new Date().toISOString(),
      liveDebug:{total:(data.matches||[]).length,byStatus,koSynced:koCount,sample:(data.matches||[]).slice(0,5).map(x=>`${x.home} ${x.homeScore??'-'}:${x.awayScore??'-'} ${x.away} (${x.status})`)},
      liveErr:applied.length?'':'Nincs új, automatikusan rögzíthető befejezett meccs.'});
  }catch(e){SS({liveLoading:false,liveErr:'Nem sikerült elérni a frissítő szolgáltatást.'});}
}
async function syncKickoffTimes(apiMatches){
  const koUpdates={};
  apiMatches.forEach(am=>{
    if(!am.utcDate)return;
    const huHome=matchTeamByEng(am.home),huAway=matchTeamByEng(am.away);
    if(!huHome||!huAway)return;
    const lm=ALL.find(m=>m.stage==='group'&&((m.home===huHome&&m.away===huAway)||(m.home===huAway&&m.away===huHome)));
    if(!lm)return;
    const cur=S.ko[lm.id]||lm.koDefault;
    if(new Date(am.utcDate).getTime()!==new Date(cur).getTime())koUpdates[lm.id]=am.utcDate;
  });
  const n=Object.keys(koUpdates).length;
  if(n){
    const newKo={...S.ko,...koUpdates};
    await sS('wc_ko',newKo,true);
    SS({ko:newKo});
  }
  return n;
}

function next24h(){
  const now=Date.now(),in24h=now+24*60*60*1000;
  return ALL.filter(m=>{
    if(m.tbd&&!S.mt[m.id])return false;
    if(S.results[m.id])return false;
    const ko=S.ko[m.id]||m.koDefault;
    if(!ko)return false;
    const kt=new Date(ko).getTime();
    return kt>=now&&kt<=in24h;
  }).sort((a,b)=>new Date(S.ko[a.id]||a.koDefault)-new Date(S.ko[b.id]||b.koDefault));
}

  const groupTables=GD.map(g=>{
    const std=calcStd(g.id,eff,S.mt);
    return `<div class="std-card"><div class="std-head"><span class="std-glbl">${g.id}. ${S.lang==='en'?'GROUP':'CSOPORT'}</span><span class="std-t">${g.teams.map(tm=>FL[tm]||'').join(' ')}</span></div>
    <table class="stdt"><thead><tr><th>#</th><th>${t('col_team')}</th><th>${t('col_played')}</th><th>${t('col_w')}</th><th>${t('col_d')}</th><th>${t('col_l')}</th><th>${t('col_gd')}</th><th>${t('col_pts')}</th></tr></thead>

const R32_SLOTS={73:['2A','2B'],74:['1E','3. A/B/C/D/F'],75:['1F','2C'],76:['1C','2F'],77:['1I','3. C/D/F/G/H'],78:['2E','2I'],79:['1A','3. C/E/F/H/I'],80:['1L','3. E/H/I/J/K'],81:['1D','3. B/E/F/I/J'],82:['1G','3. A/E/H/I/J'],83:['2K','2L'],84:['1H','2J'],85:['1B','3. E/F/G/I/J'],86:['1J','2H'],87:['1K','3. D/E/I/J/L'],88:['2D','2G']};
const WINNER_SOURCES={89:[74,77],90:[73,75],91:[76,78],92:[79,80],93:[83,84],94:[81,82],95:[86,88],96:[85,87],97:[89,90],98:[93,94],99:[91,92],100:[95,96],101:[97,98],102:[99,100],104:[101,102]};
const LOSER_SOURCES={103:[101,102]};
function slotLabel(matchId,side){

}
function bkBox(m){

    <div class="bk-team${r&&r.awayGoals>r.homeGoals?' win':''}${isTBD?' bk-slot':''}"><span>${isTBD?aLbl:`${FL[away]||''} ${teamName(away)}`}</span>${r?`<span class="bk-sc">${r.awayGoals}</span>`:''}</div>

function rBracket(){

    return `<div class="bk-col"><div class="bk-colhead">${rd.label}</div><div style="position:relative;height:${ROUND_H}px">${boxes}</div></div>`;

function rMyTips(){
  const uid=S.user.id,cfg=DS,eff=getEffectiveResults();
  const tipped=ALL.filter(m=>S.tips[`${uid}_${m.id}`]);
  let tp=0,fin=0,pf=0,rgd=0,r3=0;
  tipped.forEach(m=>{const tip=S.tips[`${uid}_${m.id}`],r=eff[m.id];if(!r)return;fin++;const p=calcPts(tip,r,m.stage,cfg)||0;tp+=p;const cat=ptsCat(tip,r,m.stage,cfg);if(cat==='p8')pf++;else if(cat==='p5')rgd++;else if(cat==='p3')r3++;});
  const uw=S.special?.[`${uid}_w`],ut=S.special?.[`${uid}_t`];
  const wPts=S.adminSpec?.winner&&uw===S.adminSpec.winner?cfg.winner:0;
  const tPts=S.adminSpec?.top&&ut&&ut.toLowerCase().trim()===S.adminSpec.top?.toLowerCase().trim()?cfg.topScorer:0;
  const totPts=tp+wPts+tPts;

function rGlobalLb(){
  const eff=getEffectiveResults();
  const board=S.users.filter(u=>!u.isAdmin).map(u=>{
    const r=calcUser(u.id,S.tips,eff,S.mt,S.special,S.adminSpec,DS);return{...u,...r};
  }).sort((a,b)=>b.pts-a.pts||b.pf-a.pf||b.rgd-a.rgd||b.tipped-a.tipped);
  if(!board.length)return `<div class="empty"><div style="font-size:44px;margin-bottom:12px">🏅</div><p>Még nincs regisztrált játékos.</p></div>`;
  return board.map((u,i)=>{
    const exp=S.expandLb===`g_${u.id}`;
    return `<div class="lb-card" style="flex-direction:column;align-items:stretch;cursor:pointer" data-explb="g_${u.id}">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="lb-rank" style="color:${i===0?'#c9a84c':i===1?'silver':i===2?'#cd7f32':'#ccc'};font-size:${i<3?22:16}px">${i<3?medals[i]:`${i+1}.`}</div>
      <span style="font-size:20px">${u.av||'⚽'}</span>
      <div style="flex:1">
        <div class="lb-nm">${u.dn}</div>
        <div class="lb-sub">⭐${u.pf} · 🎯${u.rgd} · ✓${u.res3} · ~${u.og} · ${u.tipped} tipp</div>
      </div>
      <div class="lb-pts">${u.pts}<span style="font-size:13px;font-weight:400;color:#999">p</span></div>
      <span style="color:#bbb;font-size:11px">${exp?'▲':'▼'}</span>
    </div>
    ${exp?rUserHistory(u.id,DS):''}
  </div>`;
  }).join('');
}
